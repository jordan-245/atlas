<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift Meridians</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 {
            font-size: 16px; font-weight: 600; color: var(--anthropic-dark);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button {
            background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px;
            border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s ease; width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20,20,19,0.1); background: white;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; height: 400px; font-size: 18px; color: var(--anthropic-mid-gray); }
        .progress-bar { width: 100%; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--anthropic-orange); border-radius: 2px; transition: width 0.1s linear; width: 0%; }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Drift Meridians</h1>
            <div class="subtitle">Invisible forces made visible through accumulated trajectories</div>

            <!-- Seed Section (FIXED) -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="1000" max="8000" step="500" value="4000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">4000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.01" step="0.0005" value="0.003" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.0030</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="driftSpeed" min="0.3" max="3.0" step="0.1" value="1.2" oninput="updateParam('driftSpeed', this.value)">
                        <span class="value-display" id="driftSpeed-value">1.2</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Meridian Strength</label>
                    <div class="slider-container">
                        <input type="range" id="meridianStrength" min="0.0" max="1.5" step="0.05" value="0.55" oninput="updateParam('meridianStrength', this.value)">
                        <span class="value-display" id="meridianStrength-value">0.55</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Trail Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="trailAlpha" min="3" max="40" step="1" value="14" oninput="updateParam('trailAlpha', this.value)">
                        <span class="value-display" id="trailAlpha-value">14</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Duration (frames)</label>
                    <div class="slider-container">
                        <input type="range" id="duration" min="200" max="1000" step="50" value="500" oninput="updateParam('duration', this.value)">
                        <span class="value-display" id="duration-value">500</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Palette</h3>
                <div class="color-group">
                    <label>Copper</label>
                    <div class="color-picker-container">
                        <input type="color" id="color0" value="#c17040" onchange="updateColor(0, this.value)">
                        <span class="color-value" id="color0-value">#c17040</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Indigo</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#2d5f8a" onchange="updateColor(1, this.value)">
                        <span class="color-value" id="color1-value">#2d5f8a</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Sage</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#738c5a" onchange="updateColor(2, this.value)">
                        <span class="color-value" id="color2-value">#738c5a</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Dusty Rose</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#a06868" onchange="updateColor(3, this.value)">
                        <span class="color-value" id="color3-value">#a06868</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Antique Gold</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#b89545" onchange="updateColor(4, this.value)">
                        <span class="color-value" id="color4-value">#b89545</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section (FIXED) -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="downloadImage()">Save PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing…</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════
        // PARAMETERS
        // ═══════════════════════════════════════════════════

        let params = {
            seed: 42,
            particleCount: 4000,
            noiseScale: 0.003,
            driftSpeed: 1.2,
            meridianStrength: 0.55,
            trailAlpha: 14,
            duration: 500,
            colorPalette: ['#c17040', '#2d5f8a', '#738c5a', '#a06868', '#b89545']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════
        // INTERNAL STATE
        // ═══════════════════════════════════════════════════

        let particles = [];
        let meridian = {};
        let paletteRGB = [];
        let isGenerating = false;

        // ═══════════════════════════════════════════════════
        // HELPERS
        // ═══════════════════════════════════════════════════

        function hexToRGB(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function rebuildPaletteRGB() {
            paletteRGB = params.colorPalette.map(hexToRGB);
        }

        // ═══════════════════════════════════════════════════
        // P5.JS — CORE ALGORITHM
        // ═══════════════════════════════════════════════════

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            document.querySelector('.loading').style.display = 'none';
            pixelDensity(1);
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            rebuildPaletteRGB();

            // Generate meridian parameters from the seed
            meridian = {
                freq1: random(0.003, 0.012),
                freq2: random(0.003, 0.012),
                freq3: random(0.004, 0.010),
                freq4: random(0.004, 0.010),
                phase1: random(TWO_PI),
                phase2: random(TWO_PI),
                oct2scale: random(1.8, 3.2),
                oct2weight: random(0.25, 0.5),
                drift: random(-0.3, 0.3)     // global directional bias
            };

            // Create particles
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle(true));
            }

            background(250, 249, 245);
            isGenerating = true;
            frameCount = 0;
            loop();
        }

        function getFlowAngle(x, y) {
            let ns = params.noiseScale;
            let m = meridian;

            // Primary noise octave
            let n1 = noise(x * ns, y * ns) * TWO_PI;

            // Secondary noise octave (different scale, offset)
            let n2 = noise(
                x * ns * m.oct2scale + 1000,
                y * ns * m.oct2scale + 1000
            ) * TWO_PI;

            // Combine noise layers
            let angle = n1 + n2 * m.oct2weight;

            // Meridian modulation — sinusoidal channels
            let ms = params.meridianStrength;
            angle += sin(x * m.freq1 + y * m.freq2 + m.phase1) * ms;
            angle += cos(x * m.freq3 - y * m.freq4 + m.phase2) * ms * 0.65;

            // Subtle global drift bias
            angle += m.drift;

            return angle;
        }

        function draw() {
            if (!isGenerating) return;

            for (let p of particles) {
                p.update();
                p.show();
            }

            // Progress
            let pct = min(frameCount / params.duration, 1.0);
            document.getElementById('progress').style.width = (pct * 100) + '%';

            if (frameCount >= params.duration) {
                isGenerating = false;
                noLoop();
                document.getElementById('progress').style.width = '100%';
            }
        }

        // ═══════════════════════════════════════════════════
        // PARTICLE CLASS
        // ═══════════════════════════════════════════════════

        class Particle {
            constructor(initial) {
                this.colorIdx = floor(random(paletteRGB.length));
                this.speedMult = random(0.6, 1.6);
                this.maxAge = floor(random(80, 350));
                this.age = initial ? floor(random(this.maxAge)) : 0;

                if (initial) {
                    // Initial: spread across entire canvas
                    this.x = random(width);
                    this.y = random(height);
                } else {
                    this.respawn();
                }
                this.px = this.x;
                this.py = this.y;
            }

            respawn() {
                // Respawn at random position
                this.x = random(width);
                this.y = random(height);
                this.px = this.x;
                this.py = this.y;
                this.age = 0;
                this.maxAge = floor(random(80, 350));
                this.speedMult = random(0.6, 1.6);
                this.colorIdx = floor(random(paletteRGB.length));
            }

            update() {
                this.px = this.x;
                this.py = this.y;

                let angle = getFlowAngle(this.x, this.y);
                let speed = params.driftSpeed * this.speedMult;

                this.x += cos(angle) * speed;
                this.y += sin(angle) * speed;
                this.age++;

                if (this.age > this.maxAge ||
                    this.x < -10 || this.x > width + 10 ||
                    this.y < -10 || this.y > height + 10) {
                    this.respawn();
                }
            }

            show() {
                let lifeRatio = this.age / this.maxAge;

                // Bell-curve alpha: thin at birth/death, peak at mid-life
                let a = sin(lifeRatio * PI) * params.trailAlpha;
                if (a < 0.5) return; // skip invisible segments

                // Bell-curve stroke weight
                let sw = 0.3 + sin(lifeRatio * PI) * 0.7;

                // Base color from palette
                let c = paletteRGB[this.colorIdx];

                // Subtle positional color shift (encodes direction)
                let xShift = (this.x / width - 0.5) * 18;
                let yShift = (this.y / height - 0.5) * 12;

                stroke(
                    constrain(c.r + xShift, 0, 255),
                    constrain(c.g + yShift, 0, 255),
                    constrain(c.b - xShift * 0.4, 0, 255),
                    a
                );
                strokeWeight(sw);
                line(this.px, this.py, this.x, this.y);
            }
        }

        // ═══════════════════════════════════════════════════
        // UI HANDLERS
        // ═══════════════════════════════════════════════════

        function updateParam(name, value) {
            let v = parseFloat(value);
            params[name] = v;
            let display = document.getElementById(name + '-value');
            if (display) {
                if (name === 'noiseScale') display.textContent = v.toFixed(4);
                else if (name === 'meridianStrength' || name === 'driftSpeed') display.textContent = v.toFixed(2);
                else display.textContent = v;
            }
            initializeSystem();
        }

        function updateColor(index, value) {
            params.colorPalette[index] = value;
            document.getElementById('color' + index + '-value').textContent = value;
            initializeSystem();
        }

        // ═══════════════════════════════════════════════════
        // SEED CONTROLS (FIXED)
        // ═══════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            updateSeedDisplay();

            // Sync all sliders
            const sliders = ['particleCount', 'noiseScale', 'driftSpeed', 'meridianStrength', 'trailAlpha', 'duration'];
            for (let s of sliders) {
                let el = document.getElementById(s);
                if (el) el.value = params[s];
                let disp = document.getElementById(s + '-value');
                if (disp) {
                    if (s === 'noiseScale') disp.textContent = params[s].toFixed(4);
                    else if (s === 'meridianStrength' || s === 'driftSpeed') disp.textContent = params[s].toFixed(2);
                    else disp.textContent = params[s];
                }
            }

            // Sync color pickers
            for (let i = 0; i < params.colorPalette.length; i++) {
                let el = document.getElementById('color' + i);
                if (el) el.value = params.colorPalette[i];
                let disp = document.getElementById('color' + i + '-value');
                if (disp) disp.textContent = params.colorPalette[i];
            }

            initializeSystem();
        }

        function downloadImage() {
            saveCanvas('drift-meridians-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
