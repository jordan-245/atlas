<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .box{fill:#f7f7f2;stroke:#2f2f2f;stroke-width:2;rx:12}.gate{fill:#fff4d6;stroke:#8a6500;stroke-width:2;rx:12}.go{fill:#e7f6ea;stroke:#2f7d3b;stroke-width:2;rx:12}.text{font-family:Arial,sans-serif;font-size:16px;fill:#222}.small{font-size:13px}.title{font-size:21px;font-weight:bold}.arrow{stroke:#333;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
  <text x="30" y="35" class="text title">Atlas Return Improvement Decision: Conditional Accept</text>
  <rect x="40" y="70" width="200" height="75" class="box"/><text x="60" y="100" class="text">Baseline issue</text><text x="60" y="122" class="text small">0/32 promotions + idle overlay</text>
  <line x1="240" y1="108" x2="315" y2="108" class="arrow"/>
  <rect x="315" y="70" width="230" height="75" class="gate"/><text x="335" y="98" class="text">Gate 1: Foundations</text><text x="335" y="120" class="text small">#219, #215, #354, SQLite shadow</text>
  <line x1="545" y1="108" x2="625" y2="108" class="arrow"/>
  <rect x="625" y="70" width="225" height="75" class="go"/><text x="645" y="98" class="text">Lever 1: Sizing</text><text x="645" y="120" class="text small">Volatility/fractional Kelly if DD passes</text>
  <line x1="735" y1="145" x2="735" y2="205" class="arrow"/>
  <rect x="625" y="205" width="225" height="75" class="go"/><text x="645" y="233" class="text">Lever 2: Overlay</text><text x="645" y="255" class="text small">Tighten-only, caps, kill switch</text>
  <line x1="625" y1="243" x2="545" y2="243" class="arrow"/>
  <rect x="315" y="205" width="230" height="75" class="go"/><text x="335" y="233" class="text">Lever 3: SP500 strategy</text><text x="335" y="255" class="text small">One additive OOS-validated strategy</text>
  <line x1="315" y1="243" x2="240" y2="243" class="arrow"/>
  <rect x="40" y="205" width="200" height="75" class="gate"/><text x="60" y="233" class="text">Defer</text><text x="60" y="255" class="text small">Live universe expansion</text>
  <rect x="190" y="330" width="520" height="55" class="box"/><text x="215" y="362" class="text">Rule: one axis at a time; no threshold softening; no capital scaling while approval=false.</text>
</svg>
