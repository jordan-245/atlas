  <rect x="665" y="190" width="255" height="82" class="ok"/>
  <text x="685" y="219">Future board review</text>
  <text x="685" y="243" class="small">Only after audit/backtest/testnet evidence</text>
  <line x1="792" y1="147" x2="792" y2="190" class="arrow"/>
  <rect x="40" y="315" width="880" height="105" class="stop"/>
  <text x="60" y="343">Live gates: Atlas approval=true + 30 SP500 trades + AUM &gt; $25K + #215/#399/#400 resolved</text>
  <text x="60" y="368">Edge gates: OOS Sharpe ≥0.8 after fees/funding/slippage, both long/short validated, paper/testnet clean</text>
  <text x="60" y="393">Risk gates: isolated margin, 1–2x preferred/3x cap, exchange-native stops, kill switch, liquidation monitor, reconciliation</text>
