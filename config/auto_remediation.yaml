# config/auto_remediation.yaml
# Atlas Autonomous Error Remediation — User-Ratified Configuration
# Source-of-truth specs: reports/auto-error-remediation-{planning,engineering,validation}-2026-04-29.md
# All settings reflect user decisions on 2026-04-29 + Option-C amendment 2026-04-30:
# Phase 3 enabled day-1, permanent_assist tier removed, graduation wait skipped.
# NEVER list, reviewer, 15 gates, kill switches, budget caps remain INTACT.

budget:
  max_commits_per_day: 10              # AGGRESSIVE
  reverts_to_halt: 2                   # 2 reverts in any 24h → auto-halt
  revert_rate_alert_pct: 15            # 15% revert rate / 24h → Telegram alert
  revert_rate_halt_pct: 25             # 25% revert rate / 24h → auto-halt

day1_auto_fix_whitelist:               # Phase 3 starter classes (6)
  - test_import_error
  - stale_fixture_datetime
  - lint_non_trading_files             # tests/, docs/, dashboard-ui/, scripts/healthz*
  - markdown_typos
  - dashboard_react_build_errors
  - healthz_section_logic              # non-trading paths only

telegram:
  on_success: never                    # SILENT on every success (digest AND per-fix)
  on_failure: immediate                # Alert when something breaks
  daily_digest: false                  # No daily digest either — failure-only

graduation:
  assist_to_auto_fix:                  # User Option-C 2026-04-30: skip the wait
    days_of_clean_assist: 0            # NO wait — Phase 3 enabled day-1
    min_merged_assist_fixes: 0         # NO merge requirement — promote immediately
  auto_fix_to_permanent_assist:        # SAFETY BRAKE — kept intact per user spec
    scope_violations_threshold: 5      # >5 scope-guard violations in...
    scope_violations_window_days: 60   # ...60 days → permanent revert to ASSIST

permanent_assist:                      # Tier removed 2026-04-30 (user Option-C). Per-file spec preserved:
  paths:                               #   monitor/lifecycle.py → never_fix below (trading-path-adjacent)
    - monitor/evaluator.py             #   monitor/evaluator.py → HERE (observability, assist allowed, no auto-merge)

never_fix:                             # Permanent ESCALATE — never even ASSIST
  paths:
    - brokers/**
    - risk/**
    - regime/**
    - signals/**
    - portfolio/**
    - overlay/**
    - strategies/**
    - core/reconcile.py
    - monitor/lifecycle.py             # NEVER — trading-path-adjacent, manages position lifecycle
    - "**/kill_switch*.py"
    - "**/live_executor*.py"
    - "**/plan*.py"
    - "**/approve*.py"
    - "**/halt*.py"
  patterns:
    - any_secrets_credentials
    - any_oauth_or_api_keys
    - any_broker_order_path

defaults_applied:
  scope: atlas_only                    # Phases 0-3 atlas/ only, never cross-project
  causal_chain_rule: true              # If root cause traces through trading code → ESCALATE even if patch is in safe file

# === Operational settings (engineering defaults, not user-locked) ===
phase:
  current: 3                           # Phase 3 ENABLED — autonomous AUTO_FIX active (user Option-C, 2026-04-30)
  phase_3_enabled: true                # Hard feature flag — ON immediately, no 14-day wait

monitor:
  rth_interval_minutes: 5              # During US RTH (09:30–16:00 ET), poll every 5 min
  off_hours_interval_minutes: 15       # Outside RTH, every 15 min
  dry_run: false                       # Phase 2: ASSIST mode active — flag fixes for human review, no auto-merge
  batch_size: 50                       # Errors processed per cycle
  market_hours_skip_classifier: false  # Phase 2: classify AND dispatch ASSIST fixes (no auto-merge)
  promotion_window_pause: true         # Pause during research/promoter.py runs

verify:
  diff_max_lines: 30                   # Hard cap (validation report's strict default)
  monitor_window_minutes: 30           # Post-merge observation window
  monitor_window_extended_paths:       # Extended 2h window for these path patterns
    - services/**
    - scripts/**
    - data/**
    - monitor/**

review:
  model: claude-opus-4-7                # Adversarial reviewer (was sonnet 4.6 — upgraded 2026-04-30 for parity with Fix Worker; decorrelation now via fresh-process + adversarial prompt + default-REJECT)
  default_verdict: REJECT
  approval_threshold_confidence: 0.75
  rejection_rate_alert_pct: 40         # Warn humans at 40%
  rejection_rate_halt_pct: 50          # Auto-halt at 50%

audit_log:
  retention_days: 365                  # 1 year forensic trail
  retention_critical_days: 365
  retention_error_days: 180
  retention_warning_days: 30

ignore_patterns:                       # Always-IGNORE (Engineering report §2.2 + Validation §2.3)
  - "Circuit breaker tripped"
  - "Execution blocked: Plan status is"
  - "Execution blocked: HALTED"
  - "Execution blocked: Not connected"
  - "Execution blocked: Pending preflight"
