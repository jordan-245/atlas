# config/auto_fix_classes.yaml
# Phase 3 AUTO_FIX whitelist — broad-pattern allowlist, user Option-C ratified 2026-04-30.
# Each entry MUST include: name, message_regex, file_path_globs, max_diff_lines,
# requires_test_file_added.
#
# Activation: phase.phase_3_enabled in config/auto_remediation.yaml must be true.
# Filtering precedence: NEVER list (auto_fix_deny.yaml#file_globs) is checked FIRST and
# wins over any whitelist match. The 15 merge gates + adversarial reviewer remain
# the binding safety perimeter.
#
# Updated: 2026-04-30 (user Option-C — broader Phase 3 surface area)

classes:
  # ===== Original 6 (kept; lint_non_trading_files globs expanded) =====
  - name: test_import_error
    message_regex: '(ImportError|ModuleNotFoundError):\s+'
    exc_type_regex: '^(ImportError|ModuleNotFoundError)$'
    file_path_globs:
      - tests/**
    max_diff_lines: 30
    requires_test_file_added: false
    notes: "Test files referencing modules that moved or were renamed"

  - name: stale_fixture_datetime
    message_regex: '(stale|outdated|expired).*(date|fixture|timestamp)'
    file_path_globs:
      - tests/fixtures/**
      - tests/data/**
    max_diff_lines: 30
    requires_test_file_added: false
    notes: "Fixture data with hardcoded dates that need refresh"

  - name: lint_non_trading_files
    message_regex: '(SyntaxError|IndentationError|ruff|black|flake8|mypy|pyflakes|pylint)'
    file_path_globs:
      - tests/**
      - docs/**
      - dashboard-ui/**
      - scripts/**
      - services/**
      - research/**
      - monitor/**
      - config/**
      - core/**
      - db/**
      - utils/**
      - universe/**
      - tasks/**
      - reports/**
    max_diff_lines: 30
    requires_test_file_added: false
    notes: "Lint failures in any non-NEVER-listed code path"

  - name: markdown_typos
    message_regex: '(broken[- ]link|markdown|typo|spell)'
    file_path_globs:
      - docs/**
      - "**/*.md"
      - tasks/**
      - tests/**
      - reports/**
    max_diff_lines: 30
    requires_test_file_added: false
    notes: "Doc and markdown errors — no runtime impact"

  - name: dashboard_react_build_errors
    message_regex: '(TS\d{4}|tsc|vite|rollup|recharts)'
    file_path_globs:
      - dashboard-ui/src/**
      - dashboard-ui/**/*.ts
      - dashboard-ui/**/*.tsx
    max_diff_lines: 30
    requires_test_file_added: false
    notes: "TypeScript / Vite / Rollup build errors — frontend only"

  - name: healthz_section_logic
    message_regex: '(healthz|healthcheck)\s.*(failed|threshold|stale)'
    file_path_globs:
      - scripts/healthz_*.sh
      - pi-package/**/skills/**/*.md
    max_diff_lines: 30
    requires_test_file_added: false
    file_path_block_globs:
      - scripts/healthz_*broker*
      - scripts/healthz_*risk*
      - scripts/healthz_*reconcile*
      - scripts/healthz_*kill*
    notes: "Non-trading healthcheck thresholds and section logic only"

  # ===== New broad-pattern classes (user Option-C 2026-04-30) =====
  - name: python_runtime_error_non_trading
    message_regex: '^(AttributeError|TypeError|ValueError|KeyError|IndexError|RuntimeError|NameError|UnboundLocalError|ZeroDivisionError|StopIteration):\s+'
    exc_type_regex: '^(AttributeError|TypeError|ValueError|KeyError|IndexError|RuntimeError|NameError|UnboundLocalError|ZeroDivisionError|StopIteration)$'
    file_path_globs:
      - tests/**
      - scripts/**
      - services/**
      - research/**
      - monitor/**
      - config/**
      - core/**
      - db/**
      - utils/**
      - universe/**
      - dashboard-ui/**
      - tasks/**
      - reports/**
    max_diff_lines: 30
    requires_test_file_added: true
    notes: "Standard Python runtime errors. NEVER list (auto_fix_deny.yaml) filters out brokers/, risk/, kill_switch.py, etc. before this pattern even runs."

  - name: assertion_or_state_error
    message_regex: '^(AssertionError|LookupError|StopAsyncIteration|GeneratorExit):\s+'
    exc_type_regex: '^(AssertionError|LookupError|StopAsyncIteration|GeneratorExit)$'
    file_path_globs:
      - tests/**
      - scripts/**
      - services/**
      - research/**
      - monitor/**
      - utils/**
      - universe/**
      - core/**
      - dashboard-ui/**
      - tasks/**
    max_diff_lines: 30
    requires_test_file_added: true
    notes: "Assertion/state errors that may need fixture or invariant updates"

  - name: file_or_data_error
    message_regex: '^(FileNotFoundError|IsADirectoryError|NotADirectoryError|PermissionError|JSONDecodeError|UnicodeDecodeError|YAMLError|EOFError):\s+'
    exc_type_regex: '^(FileNotFoundError|IsADirectoryError|NotADirectoryError|PermissionError|JSONDecodeError|UnicodeDecodeError|YAMLError|EOFError)$'
    file_path_globs:
      - tests/**
      - scripts/**
      - services/**
      - research/**
      - monitor/**
      - config/**
      - core/**
      - db/**
      - utils/**
      - universe/**
      - tasks/**
      - reports/**
    max_diff_lines: 30
    requires_test_file_added: false
    notes: "File and IO errors — usually missing fixtures, paths, or malformed JSON/YAML"

# Hard cap — entire whitelist
defaults:
  max_diff_lines: 30
  reviewer_confidence_threshold: 0.75
  post_merge_monitor_minutes: 30
