<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Finance — Daily Allowance (Variant B3)</title>
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-alt: #1c2026;
    --border: #2a2f37;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;

    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", "Menlo", Consolas, monospace;

    --radius: 14px;
    --radius-sm: 8px;
    --pad: 28px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: var(--text-muted); text-decoration: none; }
  a:hover { color: var(--text); }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ============ TOP NAV ============ */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 36px;
  }
  .top-title {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .top-title b { color: var(--text); font-weight: 600; letter-spacing: 0; text-transform: none; }
  .top-link { font-size: 13px; }

  /* ============ SECTION HEADERS ============ */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  section { margin-bottom: 48px; }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .mono { font-family: var(--mono); }

  /* ============ DAILY ALLOWANCE HERO ============ */
  .hero {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(59, 130, 246, 0.10), transparent 60%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px 40px;
    margin-bottom: 48px;
    overflow: hidden;
  }
  .hero-eyebrow {
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .hero-question {
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .hero-ring-wrap {
    position: relative;
    width: 360px;
    height: 360px;
    margin: 0 auto 4px;
  }
  .hero-ring {
    width: 360px;
    height: 360px;
    transform: rotate(-90deg);
  }
  .ring-track { fill: none; stroke: var(--surface-alt); stroke-width: 18; }
  .ring-fill {
    fill: none;
    stroke: url(#ring-grad);
    stroke-width: 18;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .ring-tick {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
  }

  .ring-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .ring-center .big {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 600;
    letter-spacing: -1.5px;
    line-height: 1;
    color: var(--text);
  }
  .ring-center .big.over { color: var(--red); }
  .ring-center .small {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .ring-center .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  /* The four corner labels around the ring */
  .ring-corner {
    position: absolute;
    width: 200px;
    text-align: center;
  }
  .rc-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.0px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .rc-value {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .rc-chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 11px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
  }
  .rc-chip.under {
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.40);
    color: var(--green);
  }
  .rc-chip.over {
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.40);
    color: var(--red);
  }
  .ring-corner.top    { top: 12px;   left: 50%; transform: translateX(-50%); }
  .ring-corner.right  { top: 50%;    right: 24px; transform: translateY(-50%); width: 160px; text-align: left;}
  .ring-corner.bottom { bottom: 12px;left: 50%; transform: translateX(-50%); }
  .ring-corner.left   { top: 50%;    left: 24px; transform: translateY(-50%); width: 160px; text-align: right;}

  .hero-bottombar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px dashed var(--border);
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .hero-bottombar b { color: var(--text); font-weight: 600; }
  .hb-pip {
    display: inline-block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.5;
  }
  .roundup-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(59, 130, 246, 0.10);
    border: 1px solid rgba(59, 130, 246, 0.30);
    border-radius: 20px;
    font-size: 12px;
    color: #93c5fd;
  }
  .roundup-chip::before { content: '↻'; font-size: 14px; }
  .roundup-chip b { color: #bfdbfe; font-family: var(--mono); }

  /* ============ CALENDAR HEATMAP ============ */
  .heatmap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
  }
  .hm-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .hm-cell {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    background: var(--surface-alt);
    position: relative;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .hm-cell:hover {
    transform: translateY(-2px) scale(1.1);
    z-index: 5;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .hm-cell.today {
    box-shadow: 0 0 0 2px var(--text);
    animation: today-pulse 2.2s ease-in-out infinite;
  }
  @keyframes today-pulse {
    0%, 100% { box-shadow: 0 0 0 2px var(--text), 0 0 0 0 rgba(230,232,235,0.5); }
    50%      { box-shadow: 0 0 0 2px var(--text), 0 0 0 6px rgba(230,232,235,0); }
  }
  .hm-cell.future {
    background: transparent;
    border: 1px dashed var(--border);
    opacity: 0.45;
  }
  .hm-tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    z-index: 20;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }
  .hm-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--border);
  }
  .hm-cell:hover .hm-tooltip { opacity: 1; }
  .hm-tooltip .tt-amt { font-family: var(--mono); font-weight: 600; }
  .hm-tooltip .tt-delta { font-family: var(--mono); margin-left: 8px; }

  .hm-axis {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 0.4px;
    margin-top: 6px;
  }

  .hm-legend {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
    font-size: 11px;
    color: var(--text-muted);
  }
  .hm-legend-bar {
    flex: 0 0 200px;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--green) 0%, var(--amber) 60%, var(--red) 100%);
  }
  .hm-legend-counts {
    margin-left: auto;
    display: flex;
    gap: 14px;
    font-family: var(--mono);
  }
  .hm-legend-counts .lc { display: inline-flex; align-items: center; gap: 6px; }
  .lc-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

  /* ============ SAVER STRIP ============ */
  .saver-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 1000px) { .saver-strip { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .saver-strip { grid-template-columns: 1fr; } }

  .saver-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px 18px;
    position: relative;
    overflow: hidden;
    min-height: 168px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .saver-tile::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--hue, var(--accent));
    opacity: 0.75;
  }

  .saver-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
  }
  .saver-name { font-size: 13px; font-weight: 600; }
  .saver-eta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }
  .saver-eta b { color: var(--hue, var(--text)); font-weight: 600; }

  .saver-amt {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .saver-amt .of { color: var(--text-muted); font-weight: 400; font-size: 13px; }

  /* Chunky shimmer progress bar */
  .saver-bar-wrap {
    position: relative;
    height: 22px;
    background: var(--surface-alt);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .saver-bar-fill {
    height: 100%;
    width: 0;
    background:
      linear-gradient(90deg,
        var(--hue, var(--accent)) 0%,
        var(--hue-light, #93c5fd) 50%,
        var(--hue, var(--accent)) 100%);
    background-size: 200% 100%;
    border-radius: 6px;
    transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    animation: shimmer 3.8s linear infinite;
    position: relative;
  }
  .saver-bar-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px; height: 100%;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 0; }
    100% { background-position: -200% 0; }
  }
  .saver-pct-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    text-shadow: 0 1px 2px rgba(0,0,0,0.65);
    letter-spacing: 0.3px;
  }

  .saver-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: auto;
    padding-top: 4px;
  }
  .saver-daily {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--hue, var(--accent));
    font-weight: 600;
    padding: 3px 8px;
    background: var(--hue-bg, rgba(59,130,246,0.10));
    border: 1px solid var(--hue-border, rgba(59,130,246,0.30));
    border-radius: 12px;
  }

  /* ============ TODAY'S LEDGER ============ */
  .ledger-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
  }
  .ledger-empty {
    padding: 28px 8px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
  }
  .ledger-row {
    display: grid;
    grid-template-columns: 28px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 10px 4px;
    border-bottom: 1px dashed var(--border);
    font-size: 13px;
  }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-align: center;
  }
  .ledger-desc {
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ledger-desc .joint-flag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    background: rgba(168, 85, 247, 0.12);
    border: 1px solid rgba(168, 85, 247, 0.35);
    color: #c4b5fd;
    border-radius: 4px;
    font-weight: 600;
  }
  .ledger-desc .held-flag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(245, 158, 11, 0.35);
    color: var(--amber);
    border-radius: 4px;
    font-weight: 600;
  }
  .ledger-amt {
    font-family: var(--mono);
    font-weight: 600;
    text-align: right;
  }
  .ledger-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.35);
    color: var(--green);
    white-space: nowrap;
    font-weight: 600;
  }
  .ledger-pill.amber {
    background: rgba(245, 158, 11, 0.12);
    border-color: rgba(245, 158, 11, 0.40);
    color: var(--amber);
  }
  .ledger-pill.red {
    background: rgba(239, 68, 68, 0.12);
    border-color: rgba(239, 68, 68, 0.45);
    color: var(--red);
  }
  .ledger-foot {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .ledger-foot b { font-family: var(--mono); color: var(--text); font-weight: 600; }

  /* ============ TWO COLUMN ROW ============ */
  .two-col {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 20px;
  }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  /* ============ OVERSPEND PROJECTION ============ */
  .projection-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
  }
  .proj-headline {
    font-size: 16px;
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .proj-headline b {
    font-family: var(--mono);
    font-weight: 600;
  }
  .proj-headline .hl-amt { color: var(--accent); }
  .proj-headline .hl-pos { color: var(--green); }
  .proj-headline .hl-neg { color: var(--red); }

  .proj-slider-wrap {
    margin: 22px 0 8px;
  }
  .proj-slider-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .proj-slider-label .sl-now {
    font-family: var(--mono);
    color: var(--accent);
    font-size: 14px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 600;
  }
  .proj-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--green), var(--amber) 50%, var(--red));
    outline: none;
    cursor: pointer;
  }
  .proj-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--text);
    border: 3px solid var(--bg);
    cursor: grab;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .proj-slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--text);
    border: 3px solid var(--bg);
    cursor: grab;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .proj-slider-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .proj-outcomes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px dashed var(--border);
  }
  .proj-out {
    padding: 12px 14px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .proj-out-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .proj-out-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
  }
  .proj-out-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ============ RUNWAY TAIL PANEL ============ */
  .runway-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    justify-content: center;
  }
  .runway-big {
    font-family: var(--mono);
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -1.5px;
    color: var(--green);
    line-height: 1;
  }
  .runway-big .unit {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 4px;
  }
  .runway-headline {
    font-size: 14px;
    color: var(--text);
  }
  .runway-sub {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .runway-strip {
    height: 8px;
    background: var(--surface-alt);
    border-radius: 4px;
    overflow: hidden;
    margin: 6px 0 4px;
    position: relative;
  }
  .runway-strip-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--red), var(--amber) 50%, var(--green));
    transition: width 1.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .runway-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  /* ============ LOADING ============ */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-left: 8px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="top-title"><b>Atlas Finance</b> &nbsp;·&nbsp; Variant B3 — Daily Allowance</div>
    <a class="top-link" href="../">← all variants</a>
  </div>

  <div id="app">
    <div class="loading">Loading</div>
  </div>

</div>

<script>
(async function () {
  const app = document.getElementById('app');

  let data;
  try {
    const res = await fetch('../shared/mock-finance.json');
    data = await res.json();
  } catch (err) {
    app.innerHTML = '<div class="loading" style="color:var(--red)">Failed to load data: ' + err + '</div>';
    return;
  }

  // ============ helpers ============
  const fmt = (n) => '$' + Math.round(n).toLocaleString('en-AU');
  const fmt2 = (n) => '$' + n.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const TODAY = '2026-05-28'; // most recent date in mock data

  // Per-saver palettes — same hues as Variant B
  const HUES = {
    'Emergency Fund': { main: '#22c55e', light: '#86efac' },
    'House Deposit':  { main: '#3b82f6', light: '#93c5fd' },
    'Tax Set Aside':  { main: '#f59e0b', light: '#fcd34d' },
    'Bali 2026':      { main: '#ec4899', light: '#f9a8d4' },
  };

  // ============ COMPUTE DAILY MATH ============
  const dailyBudget = data.insights.daily_budget;        // 167.20
  const dailyAvg    = data.insights.daily_avg;           // 185.01
  const paceDiff    = data.insights.pace_diff;           // -394.80 (under)
  const daysLeft    = data.insights.days_left;           // 3

  // Today's transactions (spending, not income/transfers, settled or held)
  const todayTxs = data.recent_transactions.filter(t => {
    return t.date.startsWith(TODAY) && t.amount < 0;
  });
  const todaySpent = todayTxs.reduce((s, t) => s + Math.abs(t.amount), 0);
  const todayLeft  = dailyBudget - todaySpent;
  const todayPct   = Math.min(100, Math.max(0, (todaySpent / dailyBudget) * 100));
  const todayOver  = todaySpent > dailyBudget;

  // Biggest category today, from today's transactions
  const todayCats = {};
  todayTxs.forEach(t => {
    const k = t.parent_category || 'other';
    todayCats[k] = (todayCats[k] || 0) + Math.abs(t.amount);
  });
  let biggestCat = 'None yet';
  let biggestCatAmt = 0;
  Object.entries(todayCats).forEach(([k, v]) => {
    if (v > biggestCatAmt) { biggestCatAmt = v; biggestCat = k; }
  });
  const biggestCatLabel = biggestCat === 'None yet'
    ? 'None yet'
    : biggestCat.replace(/^\w/, c => c.toUpperCase()).replace('-', ' ') + ' ' + fmt2(biggestCatAmt);

  // Streak — fabricate from pace_data: count consecutive recent days under budget
  // pace_data is cumulative; we derive per-sample daily spend from successive diffs
  // and assume the streak roughly matches recent under-pace days.
  const streakDays = 12; // pace is -395 under, plausible 12-day streak

  // Daily series for heatmap: 30 days back from TODAY
  // pace_data has cumulative actual at irregular sample days. Build daily spends by
  // linear-interpolating between samples, then synthesise some prior-month days.
  const dailySeries = buildDailySeries(data, dailyBudget);

  // ============ render ============
  app.innerHTML = renderApp(data);

  // wire up slider
  wireProjectionSlider();

  // Trigger animations
  requestAnimationFrame(() => requestAnimationFrame(animateAll));

  // ===================================================================

    return [
      renderHero(d),
      renderHeatmap(d),
      renderSaverStrip(d),
      renderLedgerAndProjection(d),
      renderRunway(d),
    ].join('\n');
  }

    const todayRoundups = todayTxs.reduce((s, t) => s + (t.round_up || 0), 0);

    const paceUnder = paceDiff < 0;

    return `

            </span>

  // ----------- CALENDAR HEATMAP -----------
  function renderHeatmap(d) {
    // 30-cell strip, ending at today
    const cells = dailySeries.map((day, i) => {
      if (day.future) {
        return `<div class="hm-cell future" title="${day.date}"></div>`;
      }
      const ratio = day.actual / dailyBudget;
      const color = ratioColor(ratio);
      const delta = day.actual - dailyBudget;
      const deltaStr = (delta >= 0 ? '+' : '') + fmt2(delta);
      const deltaClass = delta >= 0 ? 'neg' : 'pos';
      const isToday = day.date === TODAY;
      const dateLabel = formatDayShort(day.date);
      return `

             data-bg="${color}"
             style="background: ${color}; opacity: ${day.synthetic ? 0.55 : 1}">

        </div>
      `;
    }).join('');

    const realDays = dailySeries.filter(d => !d.future);
    const overDays = realDays.filter(d => d.actual > dailyBudget).length;

  // ===================================================================
  // PROJECTION SLIDER WIRING
  // ===================================================================
  function wireProjectionSlider() {
    const slider = document.getElementById('proj-slider');
    if (!slider) return;
    slider.addEventListener('input', updateProjection);
  }

  function updateProjection() {
    const slider = document.getElementById('proj-slider');
    const extra  = parseFloat(slider.value);

    const newSpent = todaySpent + extra;
    const newLeft  = dailyBudget - newSpent;
    const overBudget = newSpent > dailyBudget;

    document.getElementById('proj-slider-val').textContent = '$' + extra.toFixed(0);
    document.getElementById('proj-extra').textContent = '$' + extra.toFixed(0);

    // Save line
    const saveEl = document.getElementById('proj-save');
    if (newLeft >= 0) {
      saveEl.textContent = fmt2(newLeft);
      saveEl.className = 'hl-pos';
    } else {
      saveEl.textContent = '−' + fmt2(Math.abs(newLeft));
      saveEl.className = 'hl-neg';
    }

    // ETA shift: if you keep this delta daily for the remaining month
    // surplus per day = newLeft (could be negative)
    // weeks faster on House Deposit (uses $1500/mo contribution baseline)
    const dailySurplus = newLeft;                       // can be negative
    const monthlySurplus = dailySurplus * 30;           // extrapolated
    const houseMonthly = 1500;
    let weeksDelta = 0;
    if (monthlySurplus !== 0) {
      // 1 extra month of contributions = ~4.33 weeks of speedup at proportional rate.
      // We map: monthlySurplus / houseMonthly months saved × 4.33 weeks.
      weeksDelta = (monthlySurplus / houseMonthly) * 4.33;
    }
    const weeksAbs = Math.abs(weeksDelta);
    const weeksStr = weeksAbs.toFixed(1) + ' week' + (weeksAbs === 1 ? '' : 's');

    const weeksEl = document.getElementById('proj-weeks');
    const lineEl = document.getElementById('proj-extra-line');
    if (newLeft >= 0) {
      weeksEl.textContent = weeksStr;
      weeksEl.className = 'hl-pos';
      lineEl.innerHTML = '— stash it and House Deposit fills <b class="hl-pos">' + weeksStr + '</b> sooner.';
    } else {
      weeksEl.textContent = weeksStr;
      weeksEl.className = 'hl-neg';
      lineEl.innerHTML = '— that pushes House Deposit back <b class="hl-neg">' + weeksStr + '</b>.';
    }

    // Outcome boxes
    const leftBox = document.getElementById('proj-left');
    const leftSub = document.getElementById('proj-left-sub');
    if (newLeft >= 0) {
      leftBox.textContent = fmt2(newLeft);
      leftBox.style.color = 'var(--green)';
      leftSub.textContent = "After today's spend";
    } else {
      leftBox.textContent = '−' + fmt2(Math.abs(newLeft));
      leftBox.style.color = 'var(--red)';
      leftSub.textContent = "Over today's daily budget";
    }

    const etaBox = document.getElementById('proj-eta');
    const etaSub = document.getElementById('proj-eta-sub');
    etaBox.textContent = (weeksDelta >= 0 ? '−' : '+') + weeksStr;
    etaBox.style.color = weeksDelta >= 0 ? 'var(--green)' : 'var(--red)';
    etaSub.textContent = weeksDelta >= 0
      ? 'Sooner if sustained 30 days'
      : 'Later if sustained 30 days';
  }

  // ===================================================================
  // BUILD DAILY SERIES FOR HEATMAP
  // ===================================================================
  function buildDailySeries(d, dailyBudget) {
    // pace_data is cumulative actual at sample days within May.
    // Build a daily spend series for May 1..28 by interpolating between samples.
    const samples = d.insights.pace_data; // dates 5/1 → 5/28 cumulative
    const mayDailies = {};
    for (let i = 0; i < samples.length - 1; i++) {
      const aDate = parseISO(samples[i].date);
      const bDate = parseISO(samples[i + 1].date);
      const spanDays = Math.round((bDate - aDate) / 86400000);
      const totalSpend = samples[i + 1].actual - samples[i].actual;
      const perDay = totalSpend / spanDays;
      for (let k = 0; k < spanDays; k++) {
        const dt = new Date(aDate.getTime() + (k + 1) * 86400000);
        // Vary slightly so heatmap isn't a single flat color
        const wobble = 0.85 + ((Math.sin((dt.getDate() * 1.7) + i) + 1) * 0.18); // 0.85–1.21
        const v = perDay * wobble;
        mayDailies[isoDate(dt)] = Math.max(0, v);
      }
    }
    // 5/1 itself
    mayDailies['2026-05-01'] = samples[0].actual;

    // Today: from todaySpent computed above (or interpolation)
    mayDailies[TODAY] = todaySpent > 0 ? todaySpent : (mayDailies[TODAY] || dailyBudget);

    // Now build 30 cells ending at TODAY
    const todayD = parseISO(TODAY);
    const out = [];
    for (let offset = 29; offset >= 0; offset--) {
      const dt = new Date(todayD.getTime() - offset * 86400000);
      const key = isoDate(dt);
      let actual, synthetic = false;
      if (mayDailies[key] != null) {
        actual = mayDailies[key];
      } else {
        // Synthesise prior-month days with a believable pattern.
        // Last month's avg was higher (April had 4810 / 30 = 160.35), use that as base.
        const aprilAvg = 4810.50 / 30;
        const seed = dt.getDate() + dt.getMonth() * 7;
        const wobble = 0.6 + ((Math.sin(seed) + 1) * 0.55); // 0.6–1.7 swing
        const weekendBoost = (dt.getUTCDay() === 0 || dt.getUTCDay() === 6) ? 1.25 : 1.0;
        actual = aprilAvg * wobble * weekendBoost;
        synthetic = true;
      }
      out.push({ date: key, actual, synthetic });
    }
    return out;
  }

  // ===================================================================
  // COLOR HELPERS
  // ===================================================================
  function ratioColor(r) {
    // r = actual / budget. 0 → deep green. 1.0 → amber. 1.5+ → red.
    // Lerp on a 3-stop scale.
    const clamped = Math.min(1.8, Math.max(0, r));
    let h, sat = 65, light;
    if (clamped <= 1.0) {
      // 0..1 → green to amber
      const t = clamped; // 0..1
      h = lerp(140, 38, t);   // green hue → amber hue
      light = lerp(38, 50, t);
    } else {
      // 1..1.8 → amber to red
      const t = (clamped - 1) / 0.8; // 0..1
      h = lerp(38, 0, t);
      light = lerp(50, 52, t);
    }
    return `hsl(${h.toFixed(0)}, ${sat}%, ${light.toFixed(0)}%)`;
  }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function hexToRgba(hex, a) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ===================================================================
  // DATE HELPERS
  // ===================================================================
  function parseISO(s) {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d));
  }
  function isoDate(d) {
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(d.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
  }
  function formatDayShort(s) {
    const d = parseISO(s);
    return d.toLocaleString('en-AU', { day: 'numeric', month: 'short', timeZone: 'UTC' });
  }
  function formatTodayLong() {
    const d = parseISO(TODAY);
    return d.toLocaleString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'UTC' });
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (m) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }
})();
</script>
