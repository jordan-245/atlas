<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Finance — Calm</title>
<style>
  :root {
    --bg: #0b0d10;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --text-dim: #5b626d;
    --border: #2a2f37;
    --up: #22c55e;
    --down: #ef4444;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 32px 120px;
  }

  /* ---------- Top-right nav ---------- */
  .nav {
    position: fixed;
    top: 28px;
    right: 32px;
    font-size: 13px;
    color: var(--text-muted);
    z-index: 10;
  }
  .nav a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 120ms ease, border-color 120ms ease;
  }
  .nav a:hover {
    color: var(--text);
    border-bottom-color: var(--border);
  }

  /* ---------- Loading ---------- */
  .loading {
    color: var(--text-dim);
    font-size: 24px;
    letter-spacing: 0.5em;
    text-align: center;
    padding: 120px 0;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* ---------- Hero: three numbers ---------- */
  .hero {
    display: grid;
    grid-template-columns: 1fr;
    gap: 56px;
    margin-bottom: 88px;
  }

  @media (min-width: 720px) {
    .hero {
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }
  }

  .stat {
    text-align: left;
  }

  .stat-label {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: block;
  }

  .stat-value {
    font-size: clamp(44px, 7.5vw, 88px);
    font-weight: 300;
    line-height: 1.0;
    letter-spacing: -0.025em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    margin-bottom: 16px;
    white-space: nowrap;
  }

  .stat-context {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* Delta chip — tiny */
  .delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0;
    margin-left: 2px;
  }
  .delta.up    { color: var(--up); }
  .delta.down  { color: var(--down); }
  .delta .arrow { font-size: 9px; line-height: 1; }

  /* ---------- Trajectory sentence ---------- */
  .trajectory {
    max-width: 60ch;
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--text-muted);
    margin-bottom: 56px;
  }
  .trajectory strong {
    color: var(--text);
    font-weight: 500;
  }

  /* ---------- Sparkline ---------- */
  .spark-wrap {
    margin-bottom: 80px;
  }
  .spark-meta {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .spark svg {
    display: block;
    width: 100%;
    max-width: 360px;
    height: 60px;
    overflow: visible;
  }
  .spark path {
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ---------- Horizontal rule ---------- */
  hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 0 0 56px 0;
  }

  /* ---------- Savers ---------- */
  .section-label {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .savers {
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 2.0;
    color: var(--text);
    margin-bottom: 48px;
  }

  .saver-row {
    display: grid;
    grid-template-columns: minmax(140px, 1.4fr) minmax(150px, 1.4fr) 50px 70px;
    gap: 12px;
    align-items: baseline;
    white-space: nowrap;
  }
  .saver-row .name { color: var(--text); }
  .saver-row .amt,
  .saver-row .pct,
  .saver-row .eta { color: var(--text-muted); text-align: right; }
  .saver-row .pct { text-align: right; }
  .saver-row .eta { text-align: right; }

  /* ---------- Pending ---------- */
  .pending {
    font-size: 13.5px;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 56px;
  }

  /* ---------- Details ---------- */
  details {
    margin-top: 16px;
  }
  details summary {
    list-style: none;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    padding: 8px 0;
    user-select: none;
    transition: color 120ms ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::before {
    content: "+";
    font-family: var(--mono);
    font-size: 13px;
    width: 12px;
    display: inline-block;
    color: var(--text-dim);
    transition: transform 180ms ease;
  }
  details[open] summary::before {
    content: "−";
  }
  details summary:hover { color: var(--text); }

  .details-body {
    padding: 28px 0 8px;
    display: grid;
    gap: 36px;
  }

  .detail-group {
    display: grid;
    gap: 6px;
  }
  .detail-group h3 {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 8px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13.5px;
    color: var(--text);
    padding: 3px 0;
    gap: 16px;
  }
  .detail-row .k { color: var(--text-muted); }
  .detail-row .v {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .detail-row .v.muted { color: var(--text-muted); }

  /* ---------- Footer ---------- */
  .footer {
    margin-top: 72px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="../">← all variants</a>
</nav>

<main class="page">
  <div id="root">
    <div class="loading">· · ·</div>
  </div>
</main>

<script>
  const $ = (sel, root = document) => root.querySelector(sel);

  const fmtMoney = (n, opts = {}) => {
    const { dp = 0, sign = false } = opts;
    const abs = Math.abs(n);
    const out = abs.toLocaleString('en-AU', { minimumFractionDigits: dp, maximumFractionDigits: dp });
    const prefix = sign ? (n >= 0 ? '+' : '−') : (n < 0 ? '−' : '');
    return `${prefix}$${out}`;
  };

  const fmtMonthYear = (yyyymm) => {
    const [y, m] = yyyymm.split('-').map(Number);
    return new Date(y, m - 1, 1).toLocaleString('en-AU', { month: 'long', year: 'numeric' });
  };

  const shortMonth = (yyyymm) => {
    const [y, m] = yyyymm.split('-').map(Number);
    return new Date(y, m - 1, 1).toLocaleString('en-AU', { month: 'short' });
  };

  function sparkline(history) {
    const w = 360, h = 60, pad = 2;
    const vals = history.map(p => p.total_aud);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const range = max - min || 1;
    const stepX = (w - pad * 2) / (vals.length - 1);
    const pts = vals.map((v, i) => {
      const x = pad + i * stepX;
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    const d = `M ${pts[0]} L ${pts.slice(1).join(' L ')}`;
    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d}" /></svg>`;
  }

  function render(d) {
    const root = $('#root');

    // ---- numbers ----
    const nw = d.net_worth.total_aud;
    const history = d.net_worth.history_6mo;
    const prevMonth = history[history.length - 2];
    const prevLabel = shortMonth(prevMonth.month);
    const nwDelta = nw - prevMonth.total_aud;

    const saved = d.performance.savings_aud;
    const rate = d.performance.savings_rate_pct;

    const runway = d.performance.runway_months;
    const ef = d.savings_goals.find(g => g.name === 'Emergency Fund');
    const efPct = Math.round(ef.pct);

    // ---- milestone sentence ----
    const m1 = d.milestones.find(m => !m.achieved);
    const m2 = d.milestones.filter(m => !m.achieved)[1];
    const m1Date = m1 ? fmtMonthYear(m1.eta_date) : '';
    const m2Date = m2 ? fmtMonthYear(m2.eta_date) : '';

    // ---- pending ----
    const held = d.recent_transactions.filter(t => t.status === 'HELD');
    let pendingHtml = '';
    if (held.length > 0) {
      const first = held[0];
      const label = held.length === 1
        ? `${held.length} pending — ${first.description} ${fmtMoney(first.amount).replace('−', '')}`
        : `${held.length} pending — ${first.description} ${fmtMoney(first.amount).replace('−', '')} +${held.length - 1} more`;
      pendingHtml = `<div class="pending">${label}</div>`;
    }

    // ---- savers list ----
    const savers = d.savings_goals.map(g => {
      const name = g.name.padEnd(16, ' ');
      const amount = `${fmtMoney(g.current)} / ${fmtMoney(g.target)}`;
      const pct = `${Math.round(g.pct)}%`;
      const eta = `~${g.eta_months} mo`;
      return `
        <div class="saver-row">
          <span class="name">${g.name}</span>
          <span class="amt">${fmtMoney(g.current)} / ${fmtMoney(g.target)}</span>
          <span class="pct">${pct}</span>
          <span class="eta">${eta}</span>
        </div>`;
    }).join('');

    // ---- details ----
    const topCats = d.monthly_spending.by_parent_category
      .slice()
      .sort((a, b) => b.amount - a.amount)
      .slice(0, 4);

    const recurringTotal = d.insights.recurring.reduce((s, r) => s + r.est_monthly, 0);
    const recurringAnnual = recurringTotal * 12;

    const ru = d.round_ups;
    const cb = d.cashback;
    const joint = d.joint_account_split;
    const jordan = joint.by_customer.find(c => c.name === 'Jordan');
    const partner = joint.by_customer.find(c => c.name === 'Partner');
    const foreign = d.foreign_spend;

    const saverContribs = d.savings_goals.map(g =>
      `<div class="detail-row"><span class="k">${g.name}</span><span class="v">${fmtMoney(g.monthly_contrib)}</span></div>`
    ).join('');

    const html = `
      <section class="hero">
        <div class="stat">
          <span class="stat-label">Net worth</span>
          <div class="stat-value">${fmtMoney(nw)}</div>
          <div class="stat-context">
            <span class="delta ${nwDelta >= 0 ? 'up' : 'down'}">
              <span class="arrow">${nwDelta >= 0 ? '▲' : '▼'}</span>
              ${fmtMoney(Math.abs(nwDelta), { dp: 0 })}
            </span>
            since ${prevLabel}
          </div>
        </div>
        <div class="stat">
          <span class="stat-label">Saved this month</span>
          <div class="stat-value">${fmtMoney(saved)}</div>
          <div class="stat-context">${rate}% of income · May 2026</div>
        </div>
        <div class="stat">
          <span class="stat-label">Runway</span>
          <div class="stat-value">${runway.toFixed(1)}<span style="font-size:0.55em;color:var(--text-muted);letter-spacing:0;">  mo</span></div>
          <div class="stat-context">Emergency fund ${efPct}% to goal</div>
        </div>
      </section>

      <p class="trajectory">
        On pace to reach <strong>${m1.label}</strong> by <strong>${m1Date}</strong>.
        Next milestone: <strong>${m2.label}</strong> by <strong>${m2Date}</strong>.
      </p>

      <div class="spark-wrap">
        <div class="spark-meta">Net worth — last 6 months</div>
        <div class="spark">${sparkline(history)}</div>
      </div>

      <hr />

      <div class="section-label">Savers</div>
      <div class="savers">
        ${savers}
      </div>

      ${pendingHtml}

      <details>
        <summary>Show details</summary>
        <div class="details-body">

          <div class="detail-group">
            <h3>Spending this month — top 4</h3>
            ${topCats.map(c => `
              <div class="detail-row">
                <span class="k">${c.label}</span>
                <span class="v">${fmtMoney(c.amount, { dp: 0 })}</span>
              </div>
            `).join('')}
          </div>

          <div class="detail-group">
            <h3>Up Bank</h3>
            <div class="detail-row">
              <span class="k">Round-ups (May)</span>
              <span class="v">${fmtMoney(ru.month_total_aud, { dp: 2 })}<span class="muted"> · boost ${ru.boost_active_multiplier}× active</span></span>
            </div>
            <div class="detail-row">
              <span class="k">Boost portion</span>
              <span class="v muted">${fmtMoney(ru.boost_portion_aud, { dp: 2 })}</span>
            </div>
            <div class="detail-row">
              <span class="k">Cashback YTD</span>
              <span class="v">${fmtMoney(cb.ytd_aud, { dp: 2 })}</span>
            </div>
            <div class="detail-row">
              <span class="k">Foreign spend YTD</span>
              <span class="v">${fmtMoney(foreign.ytd_aud, { dp: 2 })}</span>
            </div>
          </div>

          <div class="detail-group">
            <h3>Joint account — ${joint.account}</h3>
            <div class="detail-row">
              <span class="k">Jordan</span>
              <span class="v">${fmtMoney(Math.abs(jordan.amount), { dp: 2 })}<span class="muted"> · ${jordan.pct}%</span></span>
            </div>
            <div class="detail-row">
              <span class="k">Partner</span>
              <span class="v">${fmtMoney(Math.abs(partner.amount), { dp: 2 })}<span class="muted"> · ${partner.pct}%</span></span>
            </div>
          </div>

          <div class="detail-group">
            <h3>Recurring</h3>
            <div class="detail-row">
              <span class="k">Monthly total</span>
              <span class="v">${fmtMoney(recurringTotal, { dp: 0 })}</span>
            </div>
            <div class="detail-row">
              <span class="k">Annualised</span>
              <span class="v muted">${fmtMoney(recurringAnnual, { dp: 0 })}</span>
            </div>
          </div>

          <div class="detail-group">
            <h3>This month's saver contributions</h3>
            ${saverContribs}
          </div>

        </div>
      </details>

      <div class="footer">As of ${d._meta.as_of} · ${d._meta.currency}</div>
    `;

    root.innerHTML = html;
  }

  fetch('../shared/mock-finance.json')
    .then(r => r.json())
    .then(render)
    .catch(err => {
      $('#root').innerHTML = `<div class="loading" style="animation:none;color:var(--down);">Unable to load data</div>`;
      console.error(err);
    });
</script>

</body>
</html>
