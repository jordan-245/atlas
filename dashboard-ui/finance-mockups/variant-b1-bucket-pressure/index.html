<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Finance — Bucket Pressure (Variant B1)</title>
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-alt: #1c2026;
    --border: #2a2f37;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;

    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", "Menlo", Consolas, monospace;

    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: var(--text-muted); text-decoration: none; }
  a:hover { color: var(--text); }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ============ TOP NAV ============ */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 36px;
  }
  .top-title {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .top-title b { color: var(--text); font-weight: 600; letter-spacing: 0; text-transform: none; }
  .top-link { font-size: 13px; }

  /* ============ HEADLINE STRIP ============ */
  .headline {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1.4fr;
    gap: 24px;
    padding: 24px 30px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 40px;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .stat-sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

  .stat--projection .stat-value {
    font-size: 32px;
    letter-spacing: -0.5px;
  }
  .stat--projection .stat-value.under { color: var(--green); }
  .stat--projection .stat-value.over { color: var(--red); }

  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* ============ SECTION HEADERS ============ */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  section { margin-bottom: 44px; }

  /* ============ PRESSURE TILES (NEW HERO) ============ */
  .pressure-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 1000px) { .pressure-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .pressure-grid { grid-template-columns: 1fr; } }

  .pressure-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .pt-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .pt-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pt-tag {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(59, 130, 246, 0.12);
    color: #93c5fd;
    border: 1px solid rgba(59, 130, 246, 0.35);
  }
  .pt-pct {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
  }
  .pt-pct.zone-ok { color: var(--green); }
  .pt-pct.zone-warn { color: var(--amber); }
  .pt-pct.zone-bad { color: var(--red); }

  .pt-figures {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .pt-figures .limit {
    color: var(--text-muted);
    font-weight: 400;
  }

  .pt-bar-wrap {
    position: relative;
    height: 14px;
    background: var(--surface-alt);
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
  }
  /* The full-width gradient track sits behind, but is masked by the fill width. */
  .pt-bar-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0;
    background: linear-gradient(
      to right,
      var(--green) 0%,
      var(--green) 55%,
      var(--amber) 80%,
      var(--red) 100%
    );
    background-size: calc(100% * var(--scale, 1)) 100%;
    background-repeat: no-repeat;
    border-radius: 7px;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }
  /* Limit line at 100% */
  .pt-bar-wrap::after {
    content: '';
    position: absolute;
    top: -2px;
    bottom: -2px;
    right: 0;
    width: 1px;
    background: rgba(230, 232, 235, 0.3);
  }

  /* Pin showing projected end-of-month position */
  .pt-pin {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 20px;
    background: var(--text);
    transform: translateX(-50%);
    border-radius: 1px;
    z-index: 3;
    left: 0;
    transition: left 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 0 2px var(--bg);
  }
  .pt-pin.over { background: var(--red); box-shadow: 0 0 0 2px var(--bg), 0 0 8px rgba(239,68,68,0.7); }

  .pt-foot {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .pt-foot .proj {
    font-family: var(--mono);
    color: var(--text);
  }
  .pt-foot .proj.over { color: var(--red); font-weight: 600; }

  /* ============ SAVER BUCKETS (B-family hero, ~60% size) ============ */
  .buckets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 1100px) { .buckets { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px)  { .buckets { grid-template-columns: 1fr; } }

  .bucket-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .bucket-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--hue, var(--accent));
    opacity: 0.7;
  }
  .bucket-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .bucket-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
  }
  .bucket-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .bucket-svg-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 140px;
    margin: 0;
  }
  .bucket-svg { width: 90px; height: 130px; }

  .bucket-numbers {
    text-align: center;
    margin-top: 2px;
  }
  .bucket-amount {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .bucket-amount .target {
    color: var(--text-muted);
    font-weight: 400;
  }
  .bucket-pct {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .bucket-pct b {
    color: var(--hue, var(--text));
    font-weight: 600;
  }

  .bucket-footer {
    border-top: 1px dashed var(--border);
    padding-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bf-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
  }
  .bf-key { color: var(--text-muted); }
  .bf-val { color: var(--text); font-weight: 500; }
  .bf-val.mono { font-family: var(--mono); }
  .bf-val.hue { color: var(--hue, var(--text)); font-weight: 600; }

  /* ============ OVERSPEND FORECAST PANEL ============ */
  .forecast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
  }
  .fc-head {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }
  .fc-head .projected { font-family: var(--mono); }
  .fc-head .delta { font-family: var(--mono); }
  .fc-head .delta.under { color: var(--green); }
  .fc-head .delta.over { color: var(--red); }
  .fc-budget { color: var(--text-muted); font-family: var(--mono); }

  .fc-sub {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 28px;
  }

  .fc-scale-wrap {
    position: relative;
    margin-top: 12px;
    padding: 28px 0 4px;
  }
  .fc-track {
    position: relative;
    height: 14px;
    background: var(--surface-alt);
    border-radius: 7px;
    overflow: hidden;
  }
  .fc-track-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0;
    background: var(--green);
    border-radius: 7px;
    transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .fc-track-fill.over { background: linear-gradient(90deg, var(--green) 0%, var(--green) 60%, var(--amber) 80%, var(--red) 100%); }

  .fc-budget-line {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 2px;
    background: var(--text);
    opacity: 0.5;
    border-radius: 1px;
  }
  .fc-budget-label {
    position: absolute;
    top: -22px;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }
  .fc-proj-marker {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 3px;
    border-radius: 1.5px;
    transform: translateX(-50%);
    transition: left 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    left: 0;
  }
  .fc-proj-marker.under { background: var(--green); box-shadow: 0 0 0 2px var(--bg), 0 0 10px rgba(34,197,94,0.6); }
  .fc-proj-marker.over { background: var(--red); box-shadow: 0 0 0 2px var(--bg), 0 0 10px rgba(239,68,68,0.7); }
  .fc-proj-label {
    position: absolute;
    top: -22px;
    transform: translateX(-50%);
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 600;
    white-space: nowrap;
    transition: left 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    left: 0;
  }
  .fc-proj-label.under { color: var(--green); }
  .fc-proj-label.over { color: var(--red); }

  .fc-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .fc-meta {
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1px dashed var(--border);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .fc-meta-cell .fc-meta-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .fc-meta-cell .fc-meta-val {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 600;
  }

  /* ============ CATEGORY TRENDS — WHAT'S LEAKING ============ */
  .trends {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px 24px;
  }
  .tr-row {
    display: grid;
    grid-template-columns: 130px 90px 70px 1fr;
    align-items: center;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .tr-row:last-child { border-bottom: none; }
  .tr-cat {
    font-size: 13px;
    font-weight: 500;
  }
  .tr-amt {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    text-align: right;
  }
  .tr-pct {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    text-align: right;
  }
  .tr-pct.up { color: var(--amber); }
  .tr-pct.up-bad { color: var(--red); }
  .tr-pct.down { color: var(--green); }
  .tr-bar-wrap {
    position: relative;
    height: 8px;
    background: rgba(255,255,255,0.03);
    border-radius: 4px;
    overflow: hidden;
  }
  .tr-bar-mid {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(230,232,235,0.18);
  }
  .tr-bar {
    position: absolute;
    top: 0; bottom: 0;
    width: 0;
    border-radius: 4px;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .tr-bar.up { right: auto; left: 50%; background: linear-gradient(90deg, var(--amber), rgba(245,158,11,0.4)); }
  .tr-bar.up-bad { right: auto; left: 50%; background: linear-gradient(90deg, var(--red), rgba(239,68,68,0.4)); }
  .tr-bar.down { left: auto; right: 50%; background: linear-gradient(270deg, var(--green), rgba(34,197,94,0.4)); }

  /* ============ ROUND-UP CALLOUT (compact) ============ */
  .routing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .routing-line {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
  }
  .routing-amt { color: var(--text); }
  .routing-arrow { color: var(--text-muted); font-size: 16px; }
  .routing-dest { color: var(--accent); }
  .routing-boost {
    display: inline-block;
    padding: 3px 8px;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(245, 158, 11, 0.35);
    border-radius: 12px;
    color: var(--amber);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    font-family: var(--sans);
    margin-left: 4px;
  }
  .routing-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--sans);
  }

  /* ============ TOP HITS LIST ============ */
  .hits {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 28px;
  }
  .hit-row {
    display: grid;
    grid-template-columns: 24px 1fr auto 110px;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .hit-row:last-child { border-bottom: none; }
  .hit-rank {
    font-family: var(--mono);
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
  }
  .hit-desc { font-size: 13px; }
  .hit-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .hit-cat {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    padding: 3px 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .hit-amt {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    text-align: right;
  }

  /* ============ LOADING ============ */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-left: 8px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Wave animation on bucket liquid */
  @keyframes wave-shift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-40px); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="top-title"><b>Atlas Finance</b> &nbsp;·&nbsp; Variant B1 — Bucket Pressure</div>
    <a class="top-link" href="../">← all variants</a>
  </div>

  <div id="app">
    <div class="loading">Loading</div>
  </div>

</div>

<script>
(async function () {
  const app = document.getElementById('app');

  let data;
  try {
    const res = await fetch('../shared/mock-finance.json');
    data = await res.json();
  } catch (err) {
    app.innerHTML = '<div class="loading" style="color:var(--red)">Failed to load data: ' + err + '</div>';
    return;
  }

  // ============ helpers ============
  const fmt = (n) => '$' + Math.round(n).toLocaleString('en-AU');
  const fmt2 = (n) => '$' + n.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtSigned = (n) => (n >= 0 ? '+' : '-') + '$' + Math.abs(Math.round(n)).toLocaleString('en-AU');

  // Per-saver palettes — same as Variant B for identity continuity
  const HUES = {
    'Emergency Fund': { main: '#22c55e', light: '#86efac' },
    'House Deposit':  { main: '#3b82f6', light: '#93c5fd' },
    'Tax Set Aside':  { main: '#f59e0b', light: '#fcd34d' },
    'Bali 2026':      { main: '#ec4899', light: '#f9a8d4' },
  };

  // Pressure zone classifier (current spent vs limit)
  function zoneFor(pct) {
    if (pct < 50) return 'ok';
    if (pct < 80) return 'ok';
    if (pct < 100) return 'warn';
    return 'bad';
  }

  // Project current spend to end of month based on days elapsed/in month
  function projectEom(current, daysElapsed, daysInMonth) {
    if (daysElapsed <= 0) return current;
    return (current / daysElapsed) * daysInMonth;
  }

  // ============ render ============
  app.innerHTML = renderApp(data);
  requestAnimationFrame(() => requestAnimationFrame(animateAll));

  // ===================================================================
  // RENDER
  // ===================================================================
  function renderApp(d) {
    return [
      renderHeadline(d),
      renderPressureTiles(d),
      renderBuckets(d),
      renderForecast(d),
      renderTrends(d),
      renderRouting(d),
      renderHits(d),
    ].join('\n');
  }

  // ----------- HEADLINE -----------
  function renderHeadline(d) {
    const nw = d.net_worth;
    const p = d.performance;
    const ins = d.insights;
    const projDelta = ins.projected_total - ins.total_monthly_budget; // negative = under
    const projUnder = projDelta < 0;

    return `
      <div class="headline">
        <div class="stat">
          <div class="stat-label">Net worth</div>
          <div class="stat-value">${fmt(nw.total_aud)}</div>
          <div class="stat-sub">Cash + invested</div>
        </div>
        <div class="stat">
          <div class="stat-label">Saved this month</div>
          <div class="stat-value">${fmt(p.savings_aud)}</div>
          <div class="stat-sub">${p.savings_rate_pct.toFixed(0)}% savings rate</div>
        </div>
        <div class="stat">
          <div class="stat-label">Runway</div>
          <div class="stat-value">${p.runway_months.toFixed(1)}<span style="font-size:13px;color:var(--text-muted);font-weight:400">mo</span></div>
          <div class="stat-sub">Emergency cover</div>
        </div>
        <div class="stat stat--projection">
          <div class="stat-label">Projected month-end vs budget</div>
          <div class="stat-value ${projUnder ? 'under' : 'over'}">
            ${projUnder ? '−' : '+'}${fmt(Math.abs(projDelta))}
          </div>
          <div class="stat-sub">
            Tracking <b style="color:var(--text)">${fmt(ins.projected_total)}</b>
            against <span class="fc-budget">${fmt(ins.total_monthly_budget)}</span> budget
          </div>
        </div>
      </div>
    `;
  }

  // ----------- PRESSURE TILES (NEW HERO) -----------
  function renderPressureTiles(d) {
    const ins = d.insights;
    const meta = d._meta;
    const daysElapsed = meta.day_of_month;
    const daysInMonth = meta.days_in_month;

    // Build four tiles: Spending, Bills, 2Up Joint (from accounts), Discretionary (from insights)
    const acctTiles = ['Spending', 'Bills', '2Up Joint'].map(name => {
      const a = d.accounts.find(x => x.name === name);
      if (!a) return null;
      return {
        name: a.name,
        spent: a.balance,           // balance treated as "spent so far" against limit
        limit: a.limit,
        projected: projectEom(a.balance, daysElapsed, daysInMonth),
        isJoint: a.ownership === 'JOINT',
      };
    }).filter(Boolean);

    // Discretionary tile from insights.discretionary
    const disc = ins.discretionary;
    acctTiles.push({
      name: 'Discretionary',
      spent: disc.spent,
      limit: disc.budget,
      projected: projectEom(disc.spent, daysElapsed, daysInMonth),
      isJoint: false,
      isCategory: true,
    });

    const tiles = acctTiles.map(t => renderPressureTile(t)).join('');

    return `
      <section>
        <div class="section-head">
          <div class="section-title">Pressure — accounts &amp; budgets</div>
          <div class="section-sub">Day ${daysElapsed} of ${daysInMonth} &nbsp;·&nbsp; pin = projected month-end</div>
        </div>
        <div class="pressure-grid">${tiles}</div>
      </section>
    `;
  }

  function renderPressureTile(t) {
    const currentPct = (t.spent / t.limit) * 100;
    const projPct = (t.projected / t.limit) * 100;
    const fillW = Math.min(100, currentPct);
    // Pin lives on 0..120% scale visually so an over-projection is still visible inside the bar.
    // We clamp pin display at 100% width but flag color when over.
    const pinPos = Math.min(100, projPct);
    const projOver = t.projected > t.limit;
    const zone = zoneFor(currentPct);

    return `
      <div class="pressure-tile">
        <div class="pt-head">
          <div class="pt-name">
            ${t.name}
            ${t.isJoint ? '<span class="pt-tag">2Up</span>' : ''}
            ${t.isCategory ? '<span class="pt-tag" style="background:rgba(168,85,247,0.12);color:#c4b5fd;border-color:rgba(168,85,247,0.35)">CAT</span>' : ''}
          </div>
          <div class="pt-pct zone-${zone}">${currentPct.toFixed(0)}%</div>
        </div>

        <div class="pt-figures">
          ${fmt(t.spent)} <span class="limit">/ ${fmt(t.limit)}</span>
        </div>

        <div class="pt-bar-wrap">
          <div class="pt-bar-fill" data-w="${fillW.toFixed(2)}"></div>
          <div class="pt-pin ${projOver ? 'over' : ''}" data-left="${pinPos.toFixed(2)}" title="Projected ${fmt(t.projected)}"></div>
        </div>

        <div class="pt-foot">
          <span>Projected EOM</span>
          <span class="proj ${projOver ? 'over' : ''}">
            ${fmt(t.projected)}
            ${projOver ? '· over' : '· under'}
          </span>
        </div>
      </div>
    `;
  }

  // ----------- SAVER BUCKETS (B-family hero, ~60% size) -----------
  function renderBuckets(d) {
    const tiles = d.savings_goals.map((g) => renderBucketTile(g, d)).join('');
    const totalSaved = d.savings_goals.reduce((s, g) => s + g.current, 0);
    return `
      <section>
        <div class="section-head">
          <div class="section-title">Goal Buckets</div>
          <div class="section-sub">${fmt(totalSaved)} across ${d.savings_goals.length} savers &nbsp;·&nbsp; 5.10% p.a. interest</div>
        </div>
        <div class="buckets">${tiles}</div>
      </section>
    `;
  }

  function renderBucketTile(g, d) {
    const hue = HUES[g.name] || { main: 'var(--accent)', light: '#fff' };
    const acct = d.accounts.find((a) => a.name === g.name);
    const interest = acct ? acct.interest_rate_pct : null;
    const isRoundupDest = d.round_ups.destination_saver === g.name;
    const monthsToGo = g.eta_months;

    return `
      <div class="bucket-card" style="--hue: ${hue.main}">
        <div class="bucket-head">
          <div>
            <div class="bucket-name">${g.name}</div>
            <div class="bucket-meta">~${monthsToGo} mo to full${isRoundupDest ? ' · round-ups' : ''}</div>
          </div>
        </div>

        <div class="bucket-svg-wrap">
          ${bucketSvg(g.pct, hue, g.name.replace(/\s+/g, '-'))}
        </div>

        <div class="bucket-numbers">
          <div class="bucket-amount">${fmt(g.current)} <span class="target">/ ${fmt(g.target)}</span></div>
          <div class="bucket-pct"><b>${g.pct.toFixed(1)}%</b> filled</div>
        </div>

        <div class="bucket-footer">
          <div class="bf-row">
            <span class="bf-key">Contribution</span>
            <span class="bf-val mono">+${fmt(g.monthly_contrib)}/mo</span>
          </div>
          ${interest != null ? `
          <div class="bf-row">
            <span class="bf-key">Interest</span>
            <span class="bf-val mono">${interest.toFixed(2)}%</span>
          </div>` : ''}
        </div>
      </div>
    `;
  }

  function bucketSvg(pct, hue, idSafe) {
    const id = 'b1-' + idSafe;
    const containerH = 110;
    const containerW = 75;
    const containerX = 8;
    const containerY = 8;
    const inset = 3;
    const fillW = containerW - inset * 2;
    const fillMaxH = containerH - inset * 2;
    const targetFillH = (pct / 100) * fillMaxH;

    return `
      <svg class="bucket-svg" viewBox="0 0 90 130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="${id}-clip">
            <rect x="${containerX + inset}" y="${containerY + inset}"
                  width="${fillW}" height="${fillMaxH}" rx="4" ry="4" />
          </clipPath>
          <linearGradient id="${id}-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${hue.main}" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="${hue.main}" stop-opacity="0.55"/>
          </linearGradient>
        </defs>

        <!-- side ticks -->
        <g stroke="#3a414b" stroke-width="1">
          <line x1="${containerX - 3}" y1="${containerY + inset}"
                x2="${containerX}"     y2="${containerY + inset}" />
          <line x1="${containerX - 3}" y1="${containerY + fillMaxH / 2 + inset}"
                x2="${containerX}"     y2="${containerY + fillMaxH / 2 + inset}" />
          <line x1="${containerX - 3}" y1="${containerY + fillMaxH + inset}"
                x2="${containerX}"     y2="${containerY + fillMaxH + inset}" />
        </g>

        <!-- container outline -->
        <rect x="${containerX}" y="${containerY}"
              width="${containerW}" height="${containerH}"
              rx="8" ry="8"
              fill="#0e1115" stroke="#3a414b" stroke-width="1.2" />

        <!-- gloss strip -->
        <rect x="${containerX + 3}" y="${containerY + 6}"
              width="2" height="${containerH - 12}"
              rx="1" fill="rgba(255,255,255,0.03)" />

        <!-- liquid fill -->
        <g clip-path="url(#${id}-clip)">
          <rect class="bucket-fill"
                data-target-h="${targetFillH.toFixed(2)}"
                data-max-y="${containerY + inset + fillMaxH}"
                x="${containerX + inset}"
                y="${containerY + inset + fillMaxH}"
                width="${fillW}"
                height="0"
                fill="url(#${id}-grad)" />

          <g class="bucket-wave-wrap"
             data-target-y="${(containerY + inset + fillMaxH - targetFillH).toFixed(2)}"
             style="transform: translateY(0px); transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1)">
            <path d="
              M ${containerX - 10} 0
              Q ${containerX + 5} -4, ${containerX + 18} 0
              T ${containerX + 40} 0
              T ${containerX + 62} 0
              T ${containerX + 90} 0
              L ${containerX + 90} 8
              L ${containerX - 10} 8 Z"
              fill="${hue.main}"
              opacity="0.85"
              style="animation: wave-shift 4s linear infinite" />
          </g>
        </g>

        <!-- goal line -->
        <line x1="${containerX - 2}" y1="${containerY + inset}"
              x2="${containerX + containerW + 2}" y2="${containerY + inset}"
              stroke="${hue.main}" stroke-width="1" stroke-dasharray="2 2" opacity="0.6" />
      </svg>
    `;
  }

  // ----------- OVERSPEND FORECAST PANEL -----------
  function renderForecast(d) {
    const ins = d.insights;
    const projected = ins.projected_total;
    const budget = ins.total_monthly_budget;
    const diff = ins.pace_diff; // negative = under
    const under = diff < 0;

    // Scale: 0 .. max(projected, budget) * 1.1
    const scaleMax = Math.max(projected, budget) * 1.1;
    const budgetPos = (budget / scaleMax) * 100;
    const projPos = (projected / scaleMax) * 100;
    const trackFillPct = (projected / scaleMax) * 100;

    return `
      <section>
        <div class="section-head">
          <div class="section-title">Overspend forecast</div>
          <div class="section-sub">Projected from daily pace · ${ins.days_left} days remaining</div>
        </div>
        <div class="forecast">
          <div class="fc-head">
            At your current pace you'll spend
            <span class="projected">${fmt(projected)}</span>
            this month — that's
            <span class="delta ${under ? 'under' : 'over'}">${under ? '−' : '+'}${fmt(Math.abs(diff))}</span>
            ${under ? 'under' : 'over'} your
            <span class="fc-budget">${fmt(budget)}</span> budget.
            ${under ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">!</span>'}
          </div>
          <div class="fc-sub">
            ${under
              ? 'Daily pace is below pace-budget. If this holds, you finish the month with margin.'
              : 'Daily pace is above pace-budget. Tighten discretionary to land at-or-under.'}
          </div>

          <div class="fc-scale-wrap">
            <div class="fc-track">
              <div class="fc-track-fill ${under ? '' : 'over'}" data-w="${trackFillPct.toFixed(2)}"></div>
              <div class="fc-budget-line" style="left: ${budgetPos.toFixed(2)}%"></div>
            </div>
            <div class="fc-budget-label" style="left: ${budgetPos.toFixed(2)}%">budget ${fmt(budget)}</div>
            <div class="fc-proj-marker ${under ? 'under' : 'over'}" data-left="${projPos.toFixed(2)}"></div>
            <div class="fc-proj-label ${under ? 'under' : 'over'}" data-left="${projPos.toFixed(2)}">proj ${fmt(projected)}</div>
            <div class="fc-axis">
              <span>$0</span>
              <span>${fmt(scaleMax * 0.25)}</span>
              <span>${fmt(scaleMax * 0.5)}</span>
              <span>${fmt(scaleMax * 0.75)}</span>
              <span>${fmt(scaleMax)}</span>
            </div>
          </div>

          <div class="fc-meta">
            <div class="fc-meta-cell">
              <div class="fc-meta-label">Days remaining</div>
              <div class="fc-meta-val">${ins.days_left}</div>
            </div>
            <div class="fc-meta-cell">
              <div class="fc-meta-label">Daily budget left</div>
              <div class="fc-meta-val">${fmt2((budget - d.monthly_spending.total) / ins.days_left)}</div>
            </div>
            <div class="fc-meta-cell">
              <div class="fc-meta-label">Daily avg so far</div>
              <div class="fc-meta-val">${fmt2(ins.daily_avg)}</div>
            </div>
          </div>
        </div>
      </section>
    `;
  }

  // ----------- CATEGORY TRENDS — WHAT'S LEAKING -----------
  function renderTrends(d) {
    const trends = [...d.insights.category_trends].sort(
      (a, b) => Math.abs(b.change_pct) - Math.abs(a.change_pct)
    );
    const maxAbs = Math.max(...trends.map(t => Math.abs(t.change_pct)));

    const rows = trends.map(t => {
      const change = t.change_pct;
      const isUp = change > 0;
      const isBadUp = isUp && change >= 15;       // >=15% up = red
      const cls = isBadUp ? 'up-bad' : (isUp ? 'up' : 'down');
      const widthPct = (Math.abs(change) / maxAbs) * 50; // half-bar max
      return `
        <div class="tr-row">
          <div class="tr-cat">${t.label}</div>
          <div class="tr-amt">${fmt(t.this_month)}</div>
          <div class="tr-pct ${cls}">${isUp ? '+' : ''}${change.toFixed(1)}%</div>
          <div class="tr-bar-wrap">
            <div class="tr-bar-mid"></div>
            <div class="tr-bar ${cls}" data-w="${widthPct.toFixed(2)}"></div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <section>
        <div class="section-head">
          <div class="section-title">Category trends — what's leaking</div>
          <div class="section-sub">Month-over-month change · sorted by magnitude</div>
        </div>
        <div class="trends">${rows}</div>
      </section>
    `;
  }

  // ----------- ROUND-UP ROUTING (compact) -----------
  function renderRouting(d) {
    const r = d.round_ups;
    return `
      <section>
        <div class="section-head">
          <div class="section-title">Round-up routing</div>
          <div class="section-sub">${r.month_count} round-ups this month</div>
        </div>
        <div class="routing">
          <div class="routing-line">
            <span class="routing-amt">${fmt2(r.month_total_aud)}</span>
            <span class="routing-boost">${r.boost_active_multiplier}× boost</span>
            <span class="routing-arrow">→</span>
            <span class="routing-dest">${r.destination_saver}</span>
          </div>
          <div class="routing-sub">
            Boost portion <b style="color:var(--text);font-family:var(--mono)">${fmt2(r.boost_portion_aud)}</b>
            &nbsp;·&nbsp; 12-mo total <b style="color:var(--text);font-family:var(--mono)">${fmt2(r.last_12mo_total_aud)}</b>
          </div>
        </div>
      </section>
    `;
  }

  // ----------- TOP 5 OVER-BUDGET TRANSACTIONS -----------
  function renderHits(d) {
    const top = d.recent_transactions
      .filter(t => t.amount < 0)
      .sort((a, b) => a.amount - b.amount) // most negative first
      .slice(0, 5);

    const rows = top.map((t, i) => `
      <div class="hit-row">
        <div class="hit-rank">${i + 1}</div>
        <div>
          <div class="hit-desc">${t.description}</div>
          <div class="hit-meta">${formatTxDate(t.date)} &middot; ${t.account}${t.foreign_amount ? ' · ' + t.foreign_amount.currency + ' ' + t.foreign_amount.value : ''}</div>
        </div>
        <div class="hit-cat">${t.parent_category}</div>
        <div class="hit-amt">${fmt2(Math.abs(t.amount))}</div>
      </div>
    `).join('');

    return `
      <section style="margin-bottom: 0">
        <div class="section-head">
          <div class="section-title">Your biggest 5 hits this month</div>
          <div class="section-sub">Single-transaction outflows · largest first</div>
        </div>
        <div class="hits">${rows}</div>
      </section>
    `;
  }

  // ===================================================================
  // ANIMATION
  // ===================================================================
  function animateAll() {
    // Pressure bar fills
    document.querySelectorAll('.pt-bar-fill').forEach(el => {
      const w = parseFloat(el.dataset.w);
      el.style.width = w + '%';
    });
    // Pressure pins
    document.querySelectorAll('.pt-pin').forEach(el => {
      el.style.left = parseFloat(el.dataset.left) + '%';
    });

    // Bucket fills
    document.querySelectorAll('.bucket-fill').forEach((el) => {
      const targetH = parseFloat(el.dataset.targetH);
      const maxY = parseFloat(el.dataset.maxY);
      el.setAttribute('y', maxY - targetH);
      el.setAttribute('height', targetH);
      el.style.transition = 'y 1.4s cubic-bezier(0.22, 1, 0.36, 1), height 1.4s cubic-bezier(0.22, 1, 0.36, 1)';
    });
    document.querySelectorAll('.bucket-wave-wrap').forEach((el) => {
      const targetY = parseFloat(el.dataset.targetY);
      el.style.transform = `translateY(${targetY}px)`;
    });

    // Forecast track + marker + label
    document.querySelectorAll('.fc-track-fill').forEach(el => {
      el.style.width = parseFloat(el.dataset.w) + '%';
    });
    document.querySelectorAll('.fc-proj-marker, .fc-proj-label').forEach(el => {
      el.style.left = parseFloat(el.dataset.left) + '%';
    });

    // Trend bars
    document.querySelectorAll('.tr-bar').forEach(el => {
      el.style.width = parseFloat(el.dataset.w) + '%';
    });
  }

  // ===================================================================
  // UTILITIES
  // ===================================================================
  function formatTxDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString('en-AU', { month: 'short', day: 'numeric', timeZone: 'UTC' });
  }
})();
</script>
</body>
</html>
