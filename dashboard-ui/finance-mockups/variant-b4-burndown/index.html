<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Finance — Burn-down Mountain (Variant B4)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-alt: #1c2026;
    --border: #2a2f37;
    --border-strong: #3a414c;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --text-dim: #5d6470;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;

    --red-fill: rgba(239, 68, 68, 0.35);
    --red-fill-strong: rgba(239, 68, 68, 0.55);
    --green-fill: rgba(34, 197, 94, 0.18);
    --green-fill-strong: rgba(34, 197, 94, 0.30);

    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", "Menlo", Consolas, monospace;

    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: var(--text-muted); text-decoration: none; }
  a:hover { color: var(--text); }

  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  .wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 36px 32px 80px;
  }

  /* ============ TOP NAV ============ */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
  }
  .top-title {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .top-title b { color: var(--text); font-weight: 600; letter-spacing: 0; text-transform: none; }
  .top-link { font-size: 13px; }

  /* ============ TOP STRIP ============ */
  .top-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    gap: 14px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .stat-sub {
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 4px;
  }
  .stat.headline {
    background: linear-gradient(135deg, var(--surface), var(--surface-alt));
    border-color: var(--border-strong);
    padding: 16px 22px;
  }
  .stat.headline .stat-value {
    font-size: 30px;
    color: var(--green);
  }
  .stat.headline.over .stat-value { color: var(--red); }
  .stat.headline::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--green);
  }
  .stat.headline.over::before { background: var(--red); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* ============ SECTION HEADERS ============ */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.0px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--text-dim);
  }

  section { margin-bottom: 22px; }

  /* ============ HERO: BURN-DOWN MOUNTAIN ============ */
  .mountain-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 26px 24px;
    position: relative;
  }
  .mountain-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .mountain-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.1px;
  }
  .mountain-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .mountain-legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-muted);
    align-items: center;
  }
  .leg {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .leg-swatch {
    display: inline-block;
    width: 16px;
    height: 3px;
    border-radius: 2px;
  }
  .leg-swatch.dashed {
    background: repeating-linear-gradient(90deg, var(--text-muted) 0 4px, transparent 4px 7px);
    height: 2px;
  }
  .leg-swatch.solid-budget {
    background: repeating-linear-gradient(90deg, #6b7280 0 4px, transparent 4px 7px);
    height: 2px;
  }
  .leg-swatch.actual { background: var(--text); }
  .leg-swatch.projected {
    background: repeating-linear-gradient(90deg, var(--text) 0 6px, transparent 6px 10px);
  }
  .leg-swatch.over {
    background: var(--red-fill-strong);
    border-radius: 3px;
    height: 10px;
    width: 12px;
  }
  .leg-swatch.under {
    background: var(--green-fill-strong);
    border-radius: 3px;
    height: 10px;
    width: 12px;
  }

  .mountain-wrap {
    position: relative;
    width: 100%;
    overflow-x: auto;
  }
  .mountain-svg {
    display: block;
    width: 100%;
    height: 340px;
  }

  /* ============ MOUNTAIN ANNOTATIONS ============ */
  .ann-chip {
    fill: var(--surface-alt);
    stroke: var(--border-strong);
    stroke-width: 1;
  }
  .ann-text {
    font-family: var(--sans);
    font-size: 10px;
    fill: var(--text);
  }
  .ann-text.muted { fill: var(--text-muted); }
  .ann-text.amber { fill: var(--amber); }
  .ann-text.green { fill: var(--green); }
  .ann-text.red   { fill: var(--red); }

  .grid-line { stroke: var(--border); stroke-width: 1; }
  .grid-text { font-family: var(--mono); font-size: 10px; fill: var(--text-dim); }

  .budget-line {
    stroke: #6b7280;
    stroke-width: 1;
    stroke-dasharray: 4 4;
    fill: none;
  }
  .actual-line {
    stroke: var(--text);
    stroke-width: 2.25;
    fill: none;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .projection-line {
    stroke: var(--text);
    stroke-width: 2;
    stroke-dasharray: 6 5;
    fill: none;
    opacity: 0.85;
  }
  .actual-dot {
    fill: var(--text);
    stroke: var(--surface);
    stroke-width: 2;
  }
  .end-dot-projected {
    fill: var(--green);
    stroke: var(--surface);
    stroke-width: 2;
  }
  .end-dot-projected.over { fill: var(--red); }

  .end-label-bg {
    fill: var(--surface-alt);
    stroke: var(--green);
    stroke-width: 1;
  }
  .end-label-bg.over { stroke: var(--red); }

  /* Tooltip */
  .tt-host { position: relative; }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--surface-alt);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 8px 11px;
    font-size: 11px;
    color: var(--text);
    box-shadow: 0 6px 22px rgba(0,0,0,0.55);
    opacity: 0;
    transform: translate(-50%, -110%);
    transition: opacity 120ms ease;
    z-index: 5;
    white-space: nowrap;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-day { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; }
  .tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; font-family: var(--mono); }
  .tooltip .tt-row b { font-weight: 600; }
  .tt-hover-circle {
    fill: var(--accent);
    stroke: var(--surface);
    stroke-width: 2;
    opacity: 0;
    pointer-events: none;
  }
  .tt-hover-circle.show { opacity: 1; }
  .tt-rule {
    stroke: var(--border-strong);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    opacity: 0;
  }
  .tt-rule.show { opacity: 1; }

  /* Today marker */
  .today-line { stroke: var(--accent); stroke-width: 1; stroke-dasharray: 3 4; opacity: 0.55; }
  .today-text { fill: var(--accent); font-size: 10px; font-family: var(--mono); }

  /* Round-up badge on chart */
  .roundup-badge-rect {
    fill: rgba(245, 158, 11, 0.12);
    stroke: rgba(245, 158, 11, 0.45);
    stroke-width: 1;
    rx: 4;
  }
  .roundup-badge-text { fill: var(--amber); font-size: 10px; font-family: var(--sans); }

  /* ============ CATEGORY BURN-DOWN GRID ============ */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 980px) { .cat-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .cat-grid { grid-template-columns: 1fr; } }

  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 12px;
    position: relative;
    overflow: hidden;
  }
  .cat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--state-color, var(--accent));
    opacity: 0.7;
  }
  .cat-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .cat-name {
    font-size: 13px;
    font-weight: 600;
  }
  .cat-spend {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .cat-spend b { color: var(--text); font-weight: 600; }

  .cat-chip {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .cat-chip.over { color: #fda4af; border: 1px solid rgba(239,68,68,0.45); background: rgba(239,68,68,0.10); }
  .cat-chip.under { color: #86efac; border: 1px solid rgba(34,197,94,0.45); background: rgba(34,197,94,0.10); }
  .cat-chip.near  { color: #fcd34d; border: 1px solid rgba(245,158,11,0.45); background: rgba(245,158,11,0.10); }

  .cat-svg-wrap { height: 70px; margin: 4px -2px 4px; }
  .cat-svg { width: 100%; height: 100%; display: block; }

  .cat-foot {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .cat-foot .pct-used {
    font-family: var(--mono);
    color: var(--text);
    font-weight: 600;
  }

  /* ============ SAVER STRIP ============ */
  .savers {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 980px) { .savers { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .savers { grid-template-columns: 1fr; } }

  .saver-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 14px 14px;
    height: 180px;
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 12px;
    align-items: stretch;
    position: relative;
    overflow: hidden;
  }
  .saver-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--hue, var(--accent));
    opacity: 0.7;
  }
  .saver-pot { width: 56px; height: 100%; display: flex; align-items: center; justify-content: center; }
  .saver-svg { width: 56px; height: 130px; }
  .saver-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .saver-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .saver-pct {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .saver-pct b { color: var(--hue, var(--text)); font-weight: 600; }
  .saver-amount {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
    margin-top: 6px;
  }
  .saver-amount .target { color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 2px; }
  .saver-eta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .saver-eta b { color: var(--hue, var(--text)); font-weight: 600; }
  .saver-feed {
    margin-top: 6px;
    font-size: 10px;
    color: var(--hue, var(--accent));
    display: flex;
    align-items: center;
    gap: 5px;
    line-height: 1.3;
  }
  .saver-feed::before { content: '↻'; font-size: 11px; }

  /* ============ WHAT-IF PANEL ============ */
  .whatif {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 26px;
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 28px;
    align-items: center;
  }
  @media (max-width: 800px) { .whatif { grid-template-columns: 1fr; } }
  .whatif-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .whatif-text b { font-weight: 600; }
  .whatif-text .em-green { color: var(--green); font-family: var(--mono); font-weight: 600; }
  .whatif-text .em-amber { color: var(--amber); font-family: var(--mono); font-weight: 600; }
  .whatif-text .em-red { color: var(--red); font-family: var(--mono); font-weight: 600; }
  .whatif-headline {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .whatif-chart {
    height: 130px;
    position: relative;
  }

  /* ============ HISTORICAL OVERSPEND PANEL ============ */
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 26px;
  }
  .history-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .history-title { font-size: 13px; font-weight: 600; }
  .history-sub { font-size: 11px; color: var(--text-muted); }
  .history-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 28px;
    align-items: center;
  }
  @media (max-width: 800px) { .history-grid { grid-template-columns: 1fr; } }
  .history-chart-wrap {
    height: 180px;
    position: relative;
  }
  .history-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 160px;
  }
  .history-stat {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .hs-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .hs-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
  }

  /* ============ LOADING ============ */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-left: 8px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Saver wave anim */
  @keyframes wave-shift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-20px); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="top-title"><b>Atlas Finance</b> &nbsp;&middot;&nbsp; Variant B4 — Burn-down Mountain</div>
    <a class="top-link" href="../">&larr; all variants</a>
  </div>

  <div id="app">
    <div class="loading">Loading</div>
  </div>

</div>

<script>
(async function () {
  const app = document.getElementById('app');

  let data;
  try {
    const res = await fetch('../shared/mock-finance.json');
    data = await res.json();
  } catch (err) {
    app.innerHTML = '<div class="loading" style="color:var(--red)">Failed to load data: ' + err + '</div>';
    return;
  }

  // ============ helpers ============
  const fmt = (n) => '$' + Math.round(n).toLocaleString('en-AU');
  const fmt2 = (n) => '$' + n.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtK = (n) => {
    if (n >= 1000) return '$' + (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
    return '$' + Math.round(n);
  };
  const dayOfMonth = (iso) => parseInt(iso.slice(8, 10), 10);

  // Per-saver palettes (same DNA as Variant B)
  const HUES = {
    'Emergency Fund': { main: '#22c55e', light: '#86efac' },
    'House Deposit':  { main: '#3b82f6', light: '#93c5fd' },
    'Tax Set Aside':  { main: '#f59e0b', light: '#fcd34d' },
    'Bali 2026':      { main: '#ec4899', light: '#f9a8d4' }
  };

  // Category budgets (synthesised; rough proportional split of $8000 - fixed ~3000 leaves ~5000 variable budget)
  // We hard-code reasonable monthly caps so storytelling works.
  const CAT_BUDGETS = {
    'home':           2000,
    'personal':        750,    // OVER (885 actual vs 750)
    'transport':       700,
    'good-life':       650,    // OVER (812 actual vs 650) — Good Life is the headline overspender
    'groceries':       550,
    'eating-out':      350,
    'health':          150,
    'entertainment':   150
  };

  // Total category budget reference (used in the mountain — keep at $8000 per data file)
  const TOTAL_BUDGET = data.insights.total_monthly_budget; // 8000

  // ============ render ============
  app.innerHTML = renderApp(data);

  // After mount: build the SVGs that need measured DOM + wire tooltips + Chart.js.
  // Use setTimeout (not requestAnimationFrame) so this still fires when the tab is hidden
  // — RAF is throttled to ~never when document.visibilityState === 'hidden'.
  setTimeout(() => {
    try { buildMountain(data); }           catch (e) { console.error('buildMountain', e); }
    try { buildCategorySparklines(data); } catch (e) { console.error('buildCategorySparklines', e); }
    try { buildSaverPots(data); }          catch (e) { console.error('buildSaverPots', e); }
    try { buildWhatIfChart(data); }        catch (e) { console.error('buildWhatIfChart', e); }
    try { buildHistoryChart(data); }       catch (e) { console.error('buildHistoryChart', e); }
  }, 0);

  // ===================================================================
  // RENDER (skeleton)
  // ===================================================================
  function renderApp(d) {
    return [
      renderTopStrip(d),
      renderMountain(d),
      renderCategories(d),
      renderSavers(d),
      renderWhatIf(d),
      renderHistory(d)
    ].join('\n');
  }

  // ----------- TOP STRIP -----------
  function renderTopStrip(d) {
    const nw = d.net_worth;
    const p  = d.performance;
    const ins = d.insights;
    const projected = ins.projected_total;
    const budget    = ins.total_monthly_budget;
    const diff      = budget - projected; // positive = under budget
    const over      = diff < 0;
    const diffAbs   = Math.abs(diff);

    return `
      <div class="top-strip">
        <div class="stat">
          <div class="stat-label">Net worth</div>
          <div class="stat-value">${fmt(nw.total_aud)}</div>
          <div class="stat-sub"><span class="pos">&#9650; ${fmt(p.net_progress_aud)}</span> this month</div>
        </div>
        <div class="stat">
          <div class="stat-label">Saved this month</div>
          <div class="stat-value">${fmt(p.savings_aud)}</div>
          <div class="stat-sub">${p.savings_rate_pct.toFixed(0)}% savings rate</div>
        </div>
        <div class="stat headline ${over ? 'over' : ''}">
          <div class="stat-label">Projected month-end vs budget</div>
          <div class="stat-value">${over ? '+' : '&minus;'}${fmt(diffAbs)} ${over ? 'OVER' : 'UNDER'}</div>
          <div class="stat-sub">
            Projected <b class="mono">${fmt(projected)}</b> of
            <b class="mono">${fmt(budget)}</b> budget &nbsp;&middot;&nbsp;
            ${ins.days_left} days left &nbsp;&middot;&nbsp;
            ${fmt(ins.daily_avg)}/day pace
          </div>
        </div>
      </div>
    `;
  }

  // ----------- HERO: BURN-DOWN MOUNTAIN -----------
  function renderMountain(d) {
    const ins = d.insights;
    const projected = ins.projected_total;
    const budget    = ins.total_monthly_budget;
    const diff      = budget - projected;
    const over      = diff < 0;

    return `
      <section>
        <div class="mountain-card tt-host" id="mountainCard">
          <div class="mountain-head">
            <div>
              <div class="mountain-title">May's spending burn-down</div>
              <div class="mountain-sub">
                Actual cumulative spend vs the $${budget.toLocaleString('en-AU')} budget pace &nbsp;&middot;&nbsp;
                ${over ? '<span class="neg">projected OVER</span>' : '<span class="pos">on track to UNDER</span>'} by
                <b class="mono">${fmt(Math.abs(diff))}</b>
              </div>
            </div>
            <div class="mountain-legend">
              <span class="leg"><span class="leg-swatch solid-budget"></span>Budget pace</span>
              <span class="leg"><span class="leg-swatch actual"></span>Actual</span>
              <span class="leg"><span class="leg-swatch projected"></span>Projection</span>
              <span class="leg"><span class="leg-swatch under"></span>Cushion</span>

  // ----------- CATEGORY BURN-DOWNS -----------
  function renderCategories(d) {
    const cats = d.monthly_spending.by_parent_category.slice(0, 8);
    // We'll show 8 categories in a 4-col grid (2 rows). Trim to first 4 for tight 1-row look? Brief says 4-column grid; data has 8 categories. We'll fill all 8 (2 rows).
    return `
      <section>
        <div class="section-head">
          <div class="section-title">Category burn-downs</div>
          <div class="section-sub">Each category's pace against its slice of the monthly budget</div>
        </div>
        <div class="cat-grid">
          ${cats.map((c, i) => renderCategoryCard(c, d, i)).join('')}
        </div>
      </section>
    `;
  }

  function renderCategoryCard(c, d, idx) {
    const budget = CAT_BUDGETS[c.category] ?? Math.round(c.amount * 1.1);
    const pctUsed = (c.amount / budget) * 100;
    const over   = pctUsed > 100;
    const near   = !over && pctUsed >= 90;
    const stateColor = over ? 'var(--red)' : near ? 'var(--amber)' : 'var(--green)';
    const chipClass = over ? 'over' : near ? 'near' : 'under';
    const chipLabel = over ? `+${fmt(c.amount - budget)} OVER`
                       : near ? `${fmt(budget - c.amount)} left`
                       : `${fmt(budget - c.amount)} under`;

    return `
      <div class="cat-card" style="--state-color: ${stateColor}">
        <div class="cat-head">
          <div>
            <div class="cat-name">${c.label}</div>
            <div class="cat-spend"><b>${fmt(c.amount)}</b> &middot; ${fmt(budget)} cap</div>
          </div>
          <span class="cat-chip ${chipClass}">${chipLabel}</span>
        </div>
        <div class="cat-svg-wrap">
          <svg class="cat-svg" id="catSpark-${idx}" viewBox="0 0 240 70" preserveAspectRatio="none" data-category="${c.category}" data-actual="${c.amount}" data-budget="${budget}" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="cat-foot">
          <span><span class="pct-used">${pctUsed.toFixed(0)}%</span> of budget used</span>
          <span>day ${d.insights.days_elapsed}/${d._meta.days_in_month}</span>
        </div>
      </div>
    `;
  }

  // ----------- SAVERS -----------
  function renderSavers(d) {
    const surplus = d.performance.savings_aud;
    return `
      <section>
        <div class="section-head">
          <div class="section-title">Where May's cushion goes</div>
          <div class="section-sub">
            Unspent budget &rarr; savers &nbsp;&middot;&nbsp;
            <b class="mono">${fmt(surplus)}</b> surplus this month
          </div>
        </div>
        <div class="savers">
          ${d.savings_goals.map(g => renderSaverCard(g, d, surplus)).join('')}
        </div>
      </section>
    `;
  }

  function renderSaverCard(g, d, surplus) {
    const hue = HUES[g.name] || { main: 'var(--accent)', light: '#fff' };
    const etaMo = g.eta_months;
    const etaDate = monthsFromNow(etaMo, d._meta.as_of);
    const isRoundup = d.round_ups.destination_saver === g.name;
    const idSafe = g.name.replace(/\s+/g, '-');

    return `
      <div class="saver-card" style="--hue: ${hue.main}">
        <div class="saver-pot">
          ${saverPotSvg(g.pct, hue, idSafe)}
        </div>
        <div class="saver-info">
          <div class="saver-name">${g.name}</div>
          <div class="saver-pct"><b>${g.pct.toFixed(0)}%</b> filled</div>
          <div class="saver-amount">${fmt(g.current)}<span class="target"> / ${fmt(g.target)}</span></div>
          <div class="saver-eta">ETA <b>${etaMo} mo</b> &middot; ${formatEta(etaDate)}</div>
          <div class="saver-feed">Fed from May's ${fmt(surplus)} surplus${isRoundup ? ' &middot; +$' + d.round_ups.month_total_aud.toFixed(2) + ' round-ups' : ''}</div>
        </div>
      </div>
    `;
  }

  function saverPotSvg(pct, hue, idSafe) {
    const id = 'sp-' + idSafe;
    const W = 56, H = 130;
    const cx = 4, cy = 4;
    const innerW = W - cx * 2;
    const innerH = H - cy * 2;
    const inset = 3;
    const fillW = innerW - inset * 2;
    const fillMaxH = innerH - inset * 2;
    const targetH = (pct / 100) * fillMaxH;
    const fillY = cy + inset + (fillMaxH - targetH);

    return `
      <svg class="saver-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="${id}-clip">
            <rect x="${cx + inset}" y="${cy + inset}" width="${fillW}" height="${fillMaxH}" rx="4" ry="4" />
          </clipPath>
          <linearGradient id="${id}-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${hue.main}" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="${hue.main}" stop-opacity="0.55"/>
          </linearGradient>
        </defs>
        <!-- container -->
        <rect x="${cx}" y="${cy}" width="${innerW}" height="${innerH}" rx="7" ry="7"
              fill="#0e1115" stroke="#3a414b" stroke-width="1.2" />
        <!-- liquid -->
        <g clip-path="url(#${id}-clip)">
          <rect x="${cx + inset}" y="${fillY}" width="${fillW}" height="${targetH}"
                fill="url(#${id}-grad)" />
          <g style="animation: wave-shift 3s linear infinite">
            <path d="M ${cx - 6} ${fillY}
                     Q ${cx + 4} ${fillY - 3}, ${cx + 14} ${fillY}
                     T ${cx + 34} ${fillY}
                     T ${cx + 54} ${fillY}
                     T ${cx + 74} ${fillY}
                     L ${cx + 74} ${fillY + 6}
                     L ${cx - 6} ${fillY + 6} Z"
                  fill="${hue.main}" opacity="0.85" />
          </g>
        </g>
        <!-- goal line -->
        <line x1="${cx}" y1="${cy + inset}" x2="${cx + innerW}" y2="${cy + inset}"
              stroke="${hue.main}" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.7" />
      </svg>
    `;
  }

  // ----------- WHAT-IF FORECAST PANEL -----------
  function renderWhatIf(d) {
    const ins = d.insights;
    const projected = ins.projected_total;
    const budget    = ins.total_monthly_budget;
    const surplus   = budget - projected; // 2264.68 — extra cushion if pace holds
    const realisedSurplus = d.performance.savings_aud; // already-saved $4240
    const houseTarget = d.savings_goals.find(g => g.name === 'House Deposit');
    const houseEta = houseTarget.eta_months; // 28
    const ifCut = 2; // weeks if Good Life cut

    return `
      <section>
        <div class="whatif">
          <div>
            <div class="whatif-headline">What-if forecast</div>
            <div class="whatif-text">
              If May finishes at the projected <span class="em-green">${fmt(projected)}</span>,
              your savers gain <span class="em-green">${fmt(realisedSurplus)}</span> this month &mdash;
              <b>House Deposit</b> reaches its <span class="mono">${fmt(houseTarget.target)}</span> goal
              around <b>${formatEta(monthsFromNow(houseEta, d._meta.as_of))}</b>.
              <br/><br/>
              If you trim <b>Good Life</b> back to last month's pace
              (<span class="em-amber">&minus;${fmt(d.insights.category_trends.find(t=>t.category==='good-life').this_month - d.insights.category_trends.find(t=>t.category==='good-life').last_month)}</span>),
              House Deposit gains <b>${ifCut} weeks</b>.
            </div>
          </div>
          <div class="whatif-chart">
            <canvas id="whatifChart"></canvas>

  }

  // ----------- HISTORICAL OVERSPEND -----------
  function renderHistory(d) {
    const mc = d.insights.monthly_comparison;
    const budget = d.insights.total_monthly_budget;
    const overCount = mc.filter(m => m.spending > budget).length;
    const avgSpend = mc.reduce((s, m) => s + m.spending, 0) / mc.length;
    const worstMonth = mc.reduce((a, b) => b.spending > a.spending ? b : a);

    return `
      <section style="margin-bottom: 0">
        <div class="history-card">
          <div class="history-head">
            <div>
              <div class="history-title">Six-month overspend diary</div>
              <div class="history-sub">Each month's actual spending vs the ${fmt(budget)} budget</div>
            </div>
            <div class="history-sub">${overCount} of ${mc.length} months over &nbsp;&middot;&nbsp; worst was ${formatMonth(worstMonth.month)} (${fmt(worstMonth.spending)})</div>
          </div>
          <div class="history-grid">
            <div class="history-chart-wrap"><canvas id="historyChart"></canvas></div>
            <div class="history-stats">
              <div class="history-stat">
                <div class="hs-label">Avg monthly spend</div>
                <div class="hs-val">${fmt(avgSpend)}</div>
              </div>
              <div class="history-stat">
                <div class="hs-label">Budget cap</div>
                <div class="hs-val">${fmt(budget)}</div>
              </div>
              <div class="history-stat">
                <div class="hs-label">Months under</div>
                <div class="hs-val" style="color: var(--green)">${mc.length - overCount} / ${mc.length}</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    `;
  }

  // ===================================================================
  // BUILD: MOUNTAIN (the hand-rolled hero SVG)
  // ===================================================================
  function buildMountain(d) {
    const svg = document.getElementById('mountainSvg');
    if (!svg) return;

    // Drawing canvas
    const W = 1100, H = 340;
    const M = { top: 28, right: 78, bottom: 36, left: 64 };
    const innerW = W - M.left - M.right;
    const innerH = H - M.top - M.bottom;

    const ins = d.insights;
    const daysInMonth = d._meta.days_in_month;
    const todayDay = d._meta.day_of_month;
    const dailyAvg = ins.daily_avg;
    const budgetTotal = ins.total_monthly_budget;

    // Scales
    const xMin = 1, xMax = daysInMonth;
    const yMin = 0, yMax = Math.max(budgetTotal * 1.05, ins.projected_total * 1.05);

    const xScale = (day) => M.left + ((day - xMin) / (xMax - xMin)) * innerW;
    const yScale = (val) => M.top + innerH - ((val - yMin) / (yMax - yMin)) * innerH;

    // Build pace data with day-of-month
    const pace = ins.pace_data.map(p => ({
      day: dayOfMonth(p.date),
      actual: p.actual,
      budget: p.budget,
      date: p.date
    }));

    // Inject day 1 = 0 anchor at the start (so the line starts from zero)
    const actualPoints = [{ day: 1, actual: 0 }, ...pace.map(p => ({ day: p.day, actual: p.actual }))];

    // Budget line: straight (1, 0) -> (daysInMonth, budgetTotal)
    const budgetAt = (day) => ((day - 1) / (daysInMonth - 1)) * budgetTotal;

    // Projection from last point to day 31
    const last = actualPoints[actualPoints.length - 1];
    const projectionEnd = last.actual + (daysInMonth - last.day) * dailyAvg;
    const projOver = projectionEnd > budgetTotal;
    const projDiff = budgetTotal - projectionEnd;

    // Helper to build a path
    const pathFromPoints = (pts, scaleX = xScale, scaleY = yScale) => {
      return pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${scaleX(p.day).toFixed(2)} ${scaleY(p.actual).toFixed(2)}`).join(' ');
    };

    // Build a denser piecewise path for the actual line (just the segments as-is)
    const actualPathD = pathFromPoints(actualPoints);

    // Budget line path (just two anchors)
    const budgetPathD = `M ${xScale(1).toFixed(2)} ${yScale(0).toFixed(2)} L ${xScale(daysInMonth).toFixed(2)} ${yScale(budgetTotal).toFixed(2)}`;

    // Projection path (last actual -> projected endpoint)
    const projPathD = `M ${xScale(last.day).toFixed(2)} ${yScale(last.actual).toFixed(2)} L ${xScale(daysInMonth).toFixed(2)} ${yScale(projectionEnd).toFixed(2)}`;

    // ================ Build SVG content ================
    let svgInner = '';

    // ---- DEFS: gradients + clip paths ----
    // The crucial mechanic: a closed region between actual line and budget line.
    // 1. "Above budget" region (red): clipped to where actual > budget
    // 2. "Below budget" region (green): clipped to where actual < budget
    //
    // Approach: construct two polygons:
    //   - "actual area": closed polygon from actual line down to x-axis
    //   - "budget area": closed polygon from budget line down to x-axis
    // Then with SVG masks/clips, fill ABOVE budget with red and BELOW budget with green
    // using the diff between actual & budget. We use a simpler approach:
    //   * fillBetween polygon: actual line from start->last connected via budget line back from last->start.
    //   * This polygon naturally has segments above/below budget. We render it twice
    //     under two clipPaths: one for "y above the budget line" -> red; one for "y below" -> green.

    // Build the diff polygon points: walk actual forward, walk budget back
    const diffPolyPts = [];
    // forward along actual
    actualPoints.forEach(p => diffPolyPts.push([xScale(p.day), yScale(p.actual)]));
    // back along budget (same x sample points, reversed)
    for (let i = actualPoints.length - 1; i >= 0; i--) {
      const p = actualPoints[i];
      diffPolyPts.push([xScale(p.day), yScale(budgetAt(p.day))]);
    }
    const diffPolyD = diffPolyPts.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt[0].toFixed(2)} ${pt[1].toFixed(2)}`).join(' ') + ' Z';

    // Clip rect for ABOVE budget line: a polygon stretching from y=0 down to the budget line
    // (i.e. everything above-or-on the budget line in chart-space).
    // In screen space "above the line" means smaller y values. So clip-poly = {(x_min, top), (x_max, top), (x_max, y_budget(x_max)), ... , (x_min, y_budget(x_min))}.
    const aboveClipPts = [];
    aboveClipPts.push([xScale(1), M.top]);
    aboveClipPts.push([xScale(daysInMonth), M.top]);
    aboveClipPts.push([xScale(daysInMonth), yScale(budgetTotal)]);
    aboveClipPts.push([xScale(1), yScale(0)]);
    const aboveClipD = aboveClipPts.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt[0].toFixed(2)} ${pt[1].toFixed(2)}`).join(' ') + ' Z';

    // Clip rect for BELOW budget line: opposite polygon
    const belowClipPts = [];
    belowClipPts.push([xScale(1), yScale(0)]);
    belowClipPts.push([xScale(daysInMonth), yScale(budgetTotal)]);
    belowClipPts.push([xScale(daysInMonth), M.top + innerH]);
    belowClipPts.push([xScale(1), M.top + innerH]);
    const belowClipD = belowClipPts.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt[0].toFixed(2)} ${pt[1].toFixed(2)}`).join(' ') + ' Z';

    // Also need a projection diff polygon for the wedge between last actual and day31
    const projDiffPolyPts = [
      [xScale(last.day), yScale(last.actual)],
      [xScale(daysInMonth), yScale(projectionEnd)],
      [xScale(daysInMonth), yScale(budgetTotal)],
      [xScale(last.day), yScale(budgetAt(last.day))]
    ];
    const projDiffPolyD = projDiffPolyPts.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt[0].toFixed(2)} ${pt[1].toFixed(2)}`).join(' ') + ' Z';

    svgInner += `
      <defs>
        <linearGradient id="mountain-actual-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="rgba(230,232,235,0.18)"/>
          <stop offset="100%" stop-color="rgba(230,232,235,0.02)"/>
        </linearGradient>
        <clipPath id="clip-above-budget"><path d="${aboveClipD}"/></clipPath>
        <clipPath id="clip-below-budget"><path d="${belowClipD}"/></clipPath>
      </defs>
    `;

    // ---- Gridlines + Y axis labels ----
    const yTicks = [0, 2000, 4000, 6000, 8000];
    yTicks.forEach(t => {
      const y = yScale(t);
      svgInner += `<line class="grid-line" x1="${M.left}" y1="${y.toFixed(2)}" x2="${M.left + innerW}" y2="${y.toFixed(2)}" opacity="${t === 0 ? 0.5 : 0.18}"/>`;
      svgInner += `<text class="grid-text" x="${(M.left - 10).toFixed(2)}" y="${(y + 3).toFixed(2)}" text-anchor="end">${fmtK(t)}</text>`;
    });

    // ---- X-axis labels (days) ----
    const xTicks = [1, 5, 10, 15, 20, 25, 31];
    xTicks.forEach(t => {
      const x = xScale(t);
      svgInner += `<text class="grid-text" x="${x.toFixed(2)}" y="${(M.top + innerH + 18).toFixed(2)}" text-anchor="middle">${t}</text>`;
      svgInner += `<line class="grid-line" x1="${x.toFixed(2)}" y1="${(M.top + innerH).toFixed(2)}" x2="${x.toFixed(2)}" y2="${(M.top + innerH + 4).toFixed(2)}" opacity="0.5"/>`;
    });
    svgInner += `<text class="grid-text" x="${((M.left + innerW / 2)).toFixed(2)}" y="${(M.top + innerH + 32).toFixed(2)}" text-anchor="middle" opacity="0.7">day of month</text>`;

    // ---- Diff polygon (green) clipped below budget ----
    svgInner += `<path d="${diffPolyD}" fill="${'rgba(34, 197, 94, 0.18)'}" clip-path="url(#clip-below-budget)"/>`;
    // ---- Diff polygon (red) clipped above budget ----
    svgInner += `<path d="${diffPolyD}" fill="${'rgba(239, 68, 68, 0.35)'}" clip-path="url(#clip-above-budget)"/>`;

    // ---- Projection diff polygon (clipped same way) ----
    svgInner += `<path d="${projDiffPolyD}" fill="${'rgba(34, 197, 94, 0.18)'}" clip-path="url(#clip-below-budget)" opacity="0.85"/>`;
    svgInner += `<path d="${projDiffPolyD}" fill="${'rgba(239, 68, 68, 0.35)'}" clip-path="url(#clip-above-budget)" opacity="0.85"/>`;

    // ---- Soft area under actual line (subtle gradient down to x-axis) ----
    const actualAreaPts = [[xScale(1), yScale(0)], ...actualPoints.map(p => [xScale(p.day), yScale(p.actual)]), [xScale(last.day), M.top + innerH]];
    const actualAreaD = actualAreaPts.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt[0].toFixed(2)} ${pt[1].toFixed(2)}`).join(' ') + ' Z';
    svgInner += `<path d="${actualAreaD}" fill="url(#mountain-actual-grad)"/>`;

    // ---- Budget line (dashed grey) ----
    svgInner += `<path class="budget-line" d="${budgetPathD}"/>`;
    // Budget end label
    svgInner += `<text class="grid-text" x="${(xScale(daysInMonth) + 6).toFixed(2)}" y="${(yScale(budgetTotal) + 3).toFixed(2)}" fill="#6b7280">budget</text>`;
    svgInner += `<text class="grid-text" x="${(xScale(daysInMonth) + 6).toFixed(2)}" y="${(yScale(budgetTotal) + 16).toFixed(2)}" fill="#6b7280" opacity="0.7">${fmt(budgetTotal)}</text>`;

    // ---- Actual line (solid) ----
    svgInner += `<path class="actual-line" d="${actualPathD}"/>`;

    // ---- Projection (dashed) ----
    svgInner += `<path class="projection-line" d="${projPathD}"/>`;

    // ---- Today vertical line ----
    svgInner += `<line class="today-line" x1="${xScale(todayDay).toFixed(2)}" y1="${M.top.toFixed(2)}" x2="${xScale(todayDay).toFixed(2)}" y2="${(M.top + innerH).toFixed(2)}"/>`;
    svgInner += `<text class="today-text" x="${xScale(todayDay).toFixed(2)}" y="${(M.top - 8).toFixed(2)}" text-anchor="middle">today &middot; day ${todayDay}</text>`;

    // ---- Actual data dots ----
    actualPoints.slice(1).forEach(p => {
      svgInner += `<circle class="actual-dot" cx="${xScale(p.day).toFixed(2)}" cy="${yScale(p.actual).toFixed(2)}" r="3.5"/>`;
    });

    // ---- Projected end dot + label ----
    const endX = xScale(daysInMonth);
    const endY = yScale(projectionEnd);
    svgInner += `<circle class="end-dot-projected ${projOver ? 'over' : ''}" cx="${endX.toFixed(2)}" cy="${endY.toFixed(2)}" r="5"/>`;

    // End label: a chip on the right
    const labelW = 86;
    const labelH = 38;
    const labelX = endX - labelW - 8;
    const labelY = endY - labelH - 10;
    svgInner += `
      <g transform="translate(${labelX.toFixed(2)}, ${labelY.toFixed(2)})">
        <rect class="end-label-bg ${projOver ? 'over' : ''}" x="0" y="0" width="${labelW}" height="${labelH}" rx="6"/>
        <text class="ann-text muted" x="8" y="13">projected end</text>
        <text class="ann-text mono" x="8" y="29" font-family="${ 'JetBrains Mono, monospace'}" style="font-weight:600;fill:${projOver ? 'var(--red)' : 'var(--green)'}">${fmt(projectionEnd)}</text>
      </g>
    `;

    // Connector line from chip to dot
    svgInner += `<line stroke="${projOver ? 'var(--red)' : 'var(--green)'}" stroke-width="1" stroke-dasharray="2 2" x1="${(labelX + labelW).toFixed(2)}" y1="${(labelY + labelH / 2).toFixed(2)}" x2="${endX.toFixed(2)}" y2="${endY.toFixed(2)}" opacity="0.6"/>`;

    // ---- Spike callouts: rent (day 18) and AGL (day 19) ----
    // Find day 18 and 19 on the actual line (interpolate from pace_data sample if needed)
    // Pace data has day 15 (2480.55) and day 20 (3210.40). Rent on day 18, AGL on day 19.
    // We'll mark these by interpolating positions on the actual path.
    const interp = (day) => {
      if (day <= actualPoints[0].day) return actualPoints[0].actual;
      for (let i = 1; i < actualPoints.length; i++) {
        if (day <= actualPoints[i].day) {
          const a = actualPoints[i - 1];
          const b = actualPoints[i];
          const t = (day - a.day) / (b.day - a.day);
          return a.actual + t * (b.actual - a.actual);
        }
      }
      return actualPoints[actualPoints.length - 1].actual;
    };
    const annotateSpike = (day, label, amount, dx, dy) => {
      const cx = xScale(day);
      const cy = yScale(interp(day));
      const chipX = cx + dx;
      const chipY = cy + dy;
      const w = 110, h = 28;
      return `
        <g>
          <line stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="2 2" x1="${cx.toFixed(2)}" y1="${cy.toFixed(2)}" x2="${(chipX + w / 2).toFixed(2)}" y2="${(chipY + h / 2).toFixed(2)}" opacity="0.5"/>
          <rect class="ann-chip" x="${chipX.toFixed(2)}" y="${chipY.toFixed(2)}" width="${w}" height="${h}" rx="5"/>
          <text class="ann-text amber" x="${(chipX + 8).toFixed(2)}" y="${(chipY + 12).toFixed(2)}">&#9889; ${label}</text>
          <text class="ann-text muted mono" x="${(chipX + 8).toFixed(2)}" y="${(chipY + 24).toFixed(2)}" font-family="JetBrains Mono, monospace">${amount}</text>
          <circle cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="3" fill="var(--amber)" stroke="var(--surface)" stroke-width="1.5"/>
        </g>
      `;
    };
    svgInner += annotateSpike(18, 'Rent &mdash; Brunswick St', '&minus;$1,850', -130, -56);
    svgInner += annotateSpike(19, 'AGL Electricity (Q)', '&minus;$340', 22, -36);

    // ---- Round-up badge anchored at today ----
    // "+$47 round-ups → House Deposit"
    const ruText = `+${fmt2(d.round_ups.month_total_aud)} round-ups &rarr; House Deposit`;
    const ruW = 220, ruH = 26;
    const ruX = M.left + 10;
    const ruY = M.top + 8;
    svgInner += `
      <g>
        <rect class="roundup-badge-rect" x="${ruX}" y="${ruY}" width="${ruW}" height="${ruH}" rx="5"/>
        <text class="roundup-badge-text" x="${ruX + 10}" y="${ruY + 17}">&#8635; ${ruText}</text>
      </g>
    `;

    // ---- Joint account excluded annotation ----
    svgInner += `<text class="grid-text" x="${(M.left + innerW - 6).toFixed(2)}" y="${(M.top + 16).toFixed(2)}" text-anchor="end" opacity="0.7" fill="var(--text-dim)">2Up Joint excluded</text>`;

    // ---- Tooltip helper artefacts (hover circle + vertical rule) ----
    svgInner += `<line id="ttRule" class="tt-rule" x1="0" y1="${M.top}" x2="0" y2="${M.top + innerH}"/>`;
    svgInner += `<circle id="ttHover" class="tt-hover-circle" cx="0" cy="0" r="5"/>`;

    // Invisible overlay for mouse capture
    svgInner += `<rect id="ttOverlay" x="${M.left}" y="${M.top}" width="${innerW}" height="${innerH}" fill="transparent" pointer-events="all" style="cursor: crosshair"/>`;

    svg.innerHTML = svgInner;

    // ----- Tooltip interactivity -----
    const tt = document.getElementById('mountainTooltip');
    const ttRule = document.getElementById('ttRule');
    const ttHover = document.getElementById('ttHover');
    const overlay = document.getElementById('ttOverlay');
    const card = document.getElementById('mountainCard');

    const svgRect = () => svg.getBoundingClientRect();
    const cardRect = () => card.getBoundingClientRect();

    overlay.addEventListener('mousemove', (ev) => {
      const sr = svgRect();
      // The SVG uses viewBox 0..W with preserveAspectRatio="none", so map screen x -> viewBox x.
      const scaleX = W / sr.width;
      const vx = (ev.clientX - sr.left) * scaleX;
      // Clamp to inner
      const clampedVx = Math.max(M.left, Math.min(M.left + innerW, vx));
      // Recover day
      const day = ((clampedVx - M.left) / innerW) * (xMax - xMin) + xMin;
      const dayInt = Math.max(1, Math.min(daysInMonth, Math.round(day)));
      const actualVal = interp(dayInt);
      const budgetVal = budgetAt(dayInt);
      const diff = actualVal - budgetVal;

      const px = xScale(dayInt);
      const py = yScale(actualVal);

      ttRule.setAttribute('x1', px.toFixed(2));
      ttRule.setAttribute('x2', px.toFixed(2));
      ttRule.classList.add('show');
      ttHover.setAttribute('cx', px.toFixed(2));
      ttHover.setAttribute('cy', py.toFixed(2));
      ttHover.classList.add('show');

      // Position the tooltip DOM. Convert SVG viewBox px back to client px relative to the card.
      const cr = cardRect();
      const pxClient = (px / scaleX) + sr.left;
      const pyClient = (py / (H / sr.height)) + sr.top;
      tt.style.left = (pxClient - cr.left) + 'px';
      tt.style.top  = (pyClient - cr.top) + 'px';
      const overLabel = diff > 0 ? `<span style="color:var(--red)">+${fmt(diff)} over</span>` : `<span style="color:var(--green)">&minus;${fmt(-diff)} under</span>`;
      tt.innerHTML = `
        <div class="tt-day">day ${dayInt} of ${daysInMonth}</div>
        <div class="tt-row"><span>Actual</span><b>${fmt(actualVal)}</b></div>
        <div class="tt-row"><span>Budget</span><b style="color:var(--text-muted)">${fmt(budgetVal)}</b></div>
        <div class="tt-row"><span>Diff</span><b>${overLabel}</b></div>
      `;
      tt.classList.add('show');
    });

    overlay.addEventListener('mouseleave', () => {
      tt.classList.remove('show');
      ttRule.classList.remove('show');
      ttHover.classList.remove('show');
    });
  }

  // ===================================================================
  // BUILD: CATEGORY SPARKLINES (mini burn-downs)
  // ===================================================================
  function buildCategorySparklines(d) {
    const sparks = document.querySelectorAll('.cat-svg');
    sparks.forEach(svg => {
      const cat = svg.dataset.category;
      const actual = parseFloat(svg.dataset.actual);
      const budget = parseFloat(svg.dataset.budget);
      drawCategorySpark(svg, cat, actual, budget, d);
    });
  }

  function drawCategorySpark(svg, cat, actualTotal, budget, d) {
    // Simulate a pace curve for this category: monotonically increasing from 0 to actualTotal,
    // with a small wobble. Budget is a straight line from (0,0) to (31, budget).
    const W = 240, H = 70;
    const M = { top: 6, right: 6, bottom: 10, left: 6 };
    const innerW = W - M.left - M.right;
    const innerH = H - M.top - M.bottom;

    const days = 31;
    const today = d._meta.day_of_month; // 28
    const yMax = Math.max(actualTotal, budget) * 1.08;

    const xScale = (day) => M.left + ((day - 1) / (days - 1)) * innerW;
    const yScale = (val) => M.top + innerH - (val / yMax) * innerH;

    // Generate a smooth-ish path: split into N samples with cumulative growth proportional to a small per-day pattern.
    // Use category-derived seed so each sparkline differs.
    const seed = cat.charCodeAt(0) + cat.charCodeAt(1) * 7;
    const points = [];
    let cum = 0;
    // Synthesise daily increments — sum to actualTotal at today
    const dailyTarget = actualTotal / today;
    for (let day = 1; day <= today; day++) {
      const wobble = ((Math.sin((day + seed) * 0.7) + 1) * 0.45 + 0.4); // 0.4..1.3 multiplier
      cum += dailyTarget * wobble;
      points.push({ day, val: cum });
    }
    // Rescale to actualTotal exactly
    const scaleK = actualTotal / cum;
    points.forEach(p => p.val *= scaleK);

    // Anchor at (1, 0)
    const fullPoints = [{ day: 1, val: 0 }, ...points];

    // Build paths
    const actualD = fullPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(p.day).toFixed(2)} ${yScale(p.val).toFixed(2)}`).join(' ');
    const budgetD = `M ${xScale(1).toFixed(2)} ${yScale(0).toFixed(2)} L ${xScale(days).toFixed(2)} ${yScale(budget).toFixed(2)}`;

    // Diff polygon (actual fwd, budget back along same sample x)
    const polyPts = [];
    fullPoints.forEach(p => polyPts.push([xScale(p.day), yScale(p.val)]));
    for (let i = fullPoints.length - 1; i >= 0; i--) {
      const p = fullPoints[i];
      const bVal = ((p.day - 1) / (days - 1)) * budget;
      polyPts.push([xScale(p.day), yScale(bVal)]);
    }
    const polyD = polyPts.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt[0].toFixed(2)} ${pt[1].toFixed(2)}`).join(' ') + ' Z';

    // Clip polygons
    const aboveClipD = `M ${xScale(1).toFixed(2)} ${M.top} L ${xScale(days).toFixed(2)} ${M.top} L ${xScale(days).toFixed(2)} ${yScale(budget).toFixed(2)} L ${xScale(1).toFixed(2)} ${yScale(0).toFixed(2)} Z`;
    const belowClipD = `M ${xScale(1).toFixed(2)} ${yScale(0).toFixed(2)} L ${xScale(days).toFixed(2)} ${yScale(budget).toFixed(2)} L ${xScale(days).toFixed(2)} ${(M.top + innerH).toFixed(2)} L ${xScale(1).toFixed(2)} ${(M.top + innerH).toFixed(2)} Z`;

    const uid = 'cs-' + cat;

    svg.innerHTML = `
      <defs>
        <clipPath id="${uid}-above"><path d="${aboveClipD}"/></clipPath>
        <clipPath id="${uid}-below"><path d="${belowClipD}"/></clipPath>
      </defs>
      <!-- baseline -->
      <line x1="${M.left}" y1="${(M.top + innerH).toFixed(2)}" x2="${(W - M.right).toFixed(2)}" y2="${(M.top + innerH).toFixed(2)}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>
      <!-- diff: green below -->
      <path d="${polyD}" fill="rgba(34, 197, 94, 0.18)" clip-path="url(#${uid}-below)"/>
      <!-- diff: red above -->
      <path d="${polyD}" fill="rgba(239, 68, 68, 0.35)" clip-path="url(#${uid}-above)"/>
      <!-- budget dashed -->
      <path d="${budgetD}" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3" fill="none"/>
      <!-- actual solid -->
      <path d="${actualD}" stroke="var(--text)" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <!-- end dot at today -->
      <circle cx="${xScale(today).toFixed(2)}" cy="${yScale(actualTotal).toFixed(2)}" r="2.5" fill="var(--text)" stroke="var(--surface)" stroke-width="1.2"/>
      <!-- today marker -->
      <line x1="${xScale(today).toFixed(2)}" y1="${M.top}" x2="${xScale(today).toFixed(2)}" y2="${(M.top + innerH).toFixed(2)}" stroke="var(--accent)" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.45"/>
    `;
  }

  // ===================================================================
  // BUILD: SAVERS — already rendered inline; nothing to do here
  // ===================================================================
  function buildSaverPots() { /* SVGs are inline */ }

  // ===================================================================
  // BUILD: WHAT-IF FORECAST CHART (Chart.js)
  // ===================================================================
  function buildWhatIfChart(d) {
    const canvas = document.getElementById('whatifChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    // Two scenarios for next 6 months: current pace vs Good Life cut
    const houseDeposit = d.savings_goals.find(g => g.name === 'House Deposit');
    const goodLifeOver = d.insights.category_trends.find(t => t.category === 'good-life');
    const overByMonth = goodLifeOver.this_month - goodLifeOver.last_month;
    const monthlyContrib = houseDeposit.monthly_contrib;
    const start = houseDeposit.current;

    const labels = [];
    const baseline = [];
    const withCut = [];

    for (let i = 0; i <= 6; i++) {
      labels.push('M+' + i);
      baseline.push(start + i * monthlyContrib);
      withCut.push(start + i * (monthlyContrib + overByMonth));
    }

    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Current pace',
            data: baseline,
            borderColor: '#8b929d',
            backgroundColor: 'rgba(139,146,157,0.1)',
            borderWidth: 1.5,
            borderDash: [4, 4],
            tension: 0.25,
            pointRadius: 0,
            fill: false
          },
          {
            label: 'With Good Life cut',
            data: withCut,
            borderColor: '#22c55e',
            backgroundColor: 'rgba(34,197,94,0.12)',
            borderWidth: 2,
            tension: 0.25,
            pointRadius: 0,
            fill: true
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'bottom', labels: { color: '#8b929d', font: { size: 10 }, boxWidth: 12 } },
          tooltip: {
            backgroundColor: '#1c2026',
            borderColor: '#3a414c',
            borderWidth: 1,
            titleColor: '#e6e8eb',
            bodyColor: '#e6e8eb',
            callbacks: {
              label: (c) => c.dataset.label + ': $' + Math.round(c.parsed.y).toLocaleString('en-AU')
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#5d6470', font: { size: 9 } },
            grid: { display: false }
          },
          y: {
            ticks: {
              color: '#5d6470',
              font: { size: 9 },
              callback: (v) => '$' + (v / 1000).toFixed(0) + 'k'
            },
            grid: { color: 'rgba(42,47,55,0.5)' }
          }
        }
      }
    });
  }

  // ===================================================================
  // BUILD: HISTORICAL OVERSPEND CHART (Chart.js)
  // ===================================================================
  function buildHistoryChart(d) {
    const canvas = document.getElementById('historyChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const budget = d.insights.total_monthly_budget;
    const mc = [...d.insights.monthly_comparison].reverse(); // oldest -> newest

    const labels = mc.map(m => formatMonth(m.month));

    // Two stacked-ish series:
    //   - "under bar": min(spending, budget) — neutral fill
    //   - "over bar":  max(0, spending - budget) stacked on top in red
    // We'll use a single bar series but colour each bar individually depending on over/under.
    const colors = mc.map(m => m.spending > budget ? 'rgba(239, 68, 68, 0.7)' : 'rgba(34, 197, 94, 0.6)');
    const borderColors = mc.map(m => m.spending > budget ? '#ef4444' : '#22c55e');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Spending',
            data: mc.map(m => m.spending),
            backgroundColor: colors,
            borderColor: borderColors,
            borderWidth: 1.5,
            borderRadius: 4,
            categoryPercentage: 0.7,
            barPercentage: 0.78
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c2026',
            borderColor: '#3a414c',
            borderWidth: 1,
            titleColor: '#e6e8eb',
            bodyColor: '#e6e8eb',
            callbacks: {
              label: (c) => {
                const diff = c.parsed.y - budget;
                const sign = diff > 0 ? '+' : '';
                return [
                  'Spending: $' + Math.round(c.parsed.y).toLocaleString('en-AU'),
                  'vs budget: ' + sign + '$' + Math.round(diff).toLocaleString('en-AU')
                ];
              }
            }
          },
          // Custom afterDraw to render the budget line
          budgetLine: {}
        },
        scales: {
          x: {
            ticks: { color: '#8b929d', font: { size: 10 } },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: {
              color: '#5d6470',
              font: { size: 9 },
              callback: (v) => '$' + (v / 1000).toFixed(0) + 'k'
            },
            grid: { color: 'rgba(42,47,55,0.5)' }
          }
        }
      },
      plugins: [
        {
          id: 'budgetLine',
          afterDatasetsDraw(chart) {
            const { ctx, chartArea, scales } = chart;
            const y = scales.y.getPixelForValue(budget);
            ctx.save();
            ctx.strokeStyle = '#6b7280';
            ctx.setLineDash([5, 4]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(chartArea.left, y);
            ctx.lineTo(chartArea.right, y);
            ctx.stroke();
            ctx.setLineDash([]);
            // Label
            ctx.fillStyle = '#8b929d';
            ctx.font = '10px -apple-system, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('budget $' + (budget / 1000).toFixed(0) + 'k', chartArea.right - 6, y - 5);
            ctx.restore();
          }
        }
      ]
    });
  }

  // ===================================================================
  // UTILITIES
  // ===================================================================
  function monthsFromNow(months, asOf) {
    const [y, m] = asOf.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1 + months, 1));
  }
  function formatEta(d) {
    return d.toLocaleString('en-AU', { month: 'short', year: 'numeric', timeZone: 'UTC' });
  }
  function formatMonth(s) {
    if (!s) return '';
    const [y, m] = s.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, 1)).toLocaleString('en-AU', { month: 'short', timeZone: 'UTC' });
  }
})();
