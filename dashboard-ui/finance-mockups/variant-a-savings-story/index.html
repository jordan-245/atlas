<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your money this month &mdash; Variant A &middot; Savings Story</title>
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-alt: #1c2026;
    --border: #2a2f37;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --text-dim: #5b626d;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;

    --serif: 'Source Serif Pro', 'Iowan Old Style', 'Palatino Linotype', Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    --mono: 'SF Mono', Menlo, Consolas, 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a { color: var(--text-muted); text-decoration: none; border-bottom: 1px dotted var(--border); transition: color 120ms ease, border-color 120ms ease; }
  a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* ---------- Top bar ---------- */
  .topbar {
    max-width: 780px;
    margin: 0 auto;
    padding: 22px 28px 0 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .topbar .back-link { color: var(--text-muted); }
  .topbar .back-link:hover { color: var(--accent); }
  .topbar .dateline { color: var(--text-dim); }

  /* ---------- Page container ---------- */
  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 28px 80px 28px;
  }

  /* ---------- Hero ---------- */
  .hero {
    padding-bottom: 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .hero-kicker {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin: 0 0 18px 0;
  }
  .hero-kicker .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: 1px;
  }
  .hero-headline {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 38px;
    line-height: 1.15;
    letter-spacing: -0.015em;
    margin: 0 0 20px 0;
    max-width: 22ch;
  }
  .hero-headline em { font-style: italic; color: var(--text); }
  .hero-headline .accent { color: var(--green); }
  .hero-subhead {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 19px;
    line-height: 1.5;
    margin: 0 0 28px 0;
    max-width: 62ch;
    font-weight: 400;
  }

  .hero-spark {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 18px;
    border-top: 1px dotted var(--border);
  }
  .hero-spark-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .hero-spark-label .value {
    display: block;
    color: var(--text);
    font-size: 13px;
    margin-top: 2px;
    letter-spacing: 0.04em;
  }
  .hero-spark svg { display: block; }

  /* ---------- Section structure ---------- */
  section { margin-bottom: 56px; }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin: 0 0 12px 0;
  }
  .section-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 26px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin: 0 0 24px 0;
    max-width: 24ch;
  }
  .section-title em { font-style: italic; color: var(--text-muted); font-weight: 400; }

  /* ---------- This month story prose ---------- */
  .story-prose {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.7;
    color: var(--text);
    max-width: 62ch;
  }
  .story-prose p { margin: 0 0 1.1em 0; }
  .story-prose p:last-child { margin-bottom: 0; }
  .story-prose strong { color: var(--text); font-weight: 700; }
  .story-prose em { font-style: italic; color: var(--text-muted); }
  .num {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.92em;
    letter-spacing: -0.01em;
  }
  .num.good { color: var(--green); }
  .num.warn { color: var(--amber); }
  .num.bad  { color: var(--red); }

  /* ---------- Savings goals ---------- */
  .goal {
    padding: 22px 0;
    border-bottom: 1px dotted var(--border);
  }
  .goal:last-child { border-bottom: 0; }
  .goal-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 10px;
  }
  .goal-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.005em;
    color: var(--text);
  }
  .goal-name .priority-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: 3px;
  }
  .goal-name .priority-dot.high   { background: var(--accent); }
  .goal-name .priority-dot.medium { background: var(--amber); }
  .goal-name .priority-dot.low    { background: var(--text-dim); }

  .goal-pct {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .goal-pct strong { color: var(--text); font-weight: 600; }

  .goal-bar {
    position: relative;
    height: 6px;
    background: var(--surface-alt);
    border-radius: 3px;
    overflow: hidden;
    margin: 8px 0 14px 0;
  }
  .goal-bar-fill {
    position: absolute;
    inset: 0 auto 0 0;
    background: var(--accent);
    border-radius: 3px;
    transition: width 600ms ease;
  }
  .goal-bar-fill.high   { background: linear-gradient(90deg, #2563eb, #3b82f6); }
  .goal-bar-fill.medium { background: linear-gradient(90deg, #b45309, #f59e0b); }
  .goal-bar-fill.low    { background: linear-gradient(90deg, #475569, #64748b); }

  .goal-eta {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.5;
    max-width: 62ch;
  }
  .goal-eta .num { font-style: normal; color: var(--text); }

  /* ---------- By the numbers table ---------- */
  .appendix {
    border-top: 1px solid var(--border);
    padding-top: 28px;
  }
  table.numbers {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--sans);
    font-size: 14px;
  }
  table.numbers th, table.numbers td {
    text-align: left;
    padding: 11px 0;
    border-bottom: 1px dotted var(--border);
    vertical-align: baseline;
  }
  table.numbers tr:last-child td { border-bottom: 0; }
  table.numbers td.label {
    color: var(--text-muted);
    width: 55%;
  }
  table.numbers td.label .sub {
    display: block;
    font-family: var(--serif);
    font-style: italic;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    line-height: 1.4;
  }
  table.numbers td.value {
    text-align: right;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  table.numbers td.value .delta {
    display: block;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  table.numbers td.value .delta.good { color: var(--green); }
  table.numbers td.value .delta.bad  { color: var(--red); }
  table.numbers td.value .delta.warn { color: var(--amber); }

  /* ---------- Recent activity ---------- */
  .tx-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .tx-item {
    display: grid;
    grid-template-columns: 78px 1fr auto;
    gap: 16px;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px dotted var(--border);
  }
  .tx-item:last-child { border-bottom: 0; }
  .tx-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tx-desc {
    font-family: var(--sans);
    font-size: 15px;
    color: var(--text);
  }
  .tx-desc .meta {
    display: block;
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 12.5px;
    margin-top: 2px;
  }
  .tx-amount {
    font-family: var(--mono);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .tx-amount.pos { color: var(--green); }
  .tx-amount.neg { color: var(--text); }
  .pill-held {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(245, 158, 11, 0.14);
    color: var(--amber);
    border: 1px solid var(--amber);
    margin-left: 8px;
    vertical-align: 1px;
  }
  .held-divider {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin: 18px 0 8px 0;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }

  /* ---------- Loading / error ---------- */
  .loading, .err {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text-muted);
    text-align: center;
    padding: 80px 0;
    font-size: 18px;
  }
  .err {
    color: var(--amber);
    border: 1px dashed var(--amber);
    border-radius: 4px;
    padding: 24px;
    margin: 40px 0;
  }

  /* ---------- Colophon ---------- */
  .colophon {
    margin-top: 64px;
    padding-top: 22px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="dateline" id="dateline">Loading&hellip;</span>
  <a href="../" class="back-link">&larr; all variants</a>
</div>

<div class="page">
  <main id="app">
    <div class="loading">Loading your month&hellip;</div>
  </main>
</div>

<script>
(function () {
  'use strict';

  // ---------- helpers ----------
  const $ = (sel, root) => (root || document).querySelector(sel);
  const el = (tag, attrs, children) => {
    const node = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === 'class') node.className = attrs[k];
        else if (k === 'html') node.innerHTML = attrs[k];
        else node.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      const arr = Array.isArray(children) ? children : [children];
      arr.forEach(c => {
        if (c == null) return;
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else node.appendChild(c);
      });
    }
    return node;
  };

  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));

  const fmtAud = (n, dp) => {
    if (n == null || isNaN(n)) return '—';
    const v = Math.abs(Number(n));
    const sign = Number(n) < 0 ? '-' : '';
    return sign + '$' + v.toLocaleString('en-AU', {
      minimumFractionDigits: dp == null ? 2 : dp,
      maximumFractionDigits: dp == null ? 2 : dp
    });
  };
  const fmtAudK = n => {
    if (n == null || isNaN(n)) return '—';
    const v = Number(n);
    if (Math.abs(v) >= 1000) return '$' + (v / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
    return fmtAud(v, 0);
  };
  const fmtAud0 = n => fmtAud(n, 0);
  const fmtPct = (n, dp) => {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toFixed(dp == null ? 1 : dp) + '%';
  };
  const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

  // Date formatting tied to data so the page is reproducible
  const fmtDateShort = iso => {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return '—';
    return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short' });
  };
  const fmtDateLong = iso => {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return '—';
    return d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  };

  // ---------- Sparkline (inline SVG) ----------
  function sparkline(points, opts) {
    opts = opts || {};
    const w = opts.width || 120;
    const h = opts.height || 40;
    const pad = 2;
    if (!points || points.length < 2) return '';

    const xs = points.map(p => p.x);
    const ys = points.map(p => p.y);
    const minY = Math.min.apply(null, ys);
    const maxY = Math.max.apply(null, ys);
    const minX = Math.min.apply(null, xs);
    const maxX = Math.max.apply(null, xs);
    const range = (maxY - minY) || 1;
    const xRange = (maxX - minX) || 1;

    const sx = x => pad + ((x - minX) / xRange) * (w - pad * 2);
    const sy = y => h - pad - ((y - minY) / range) * (h - pad * 2);

    const d = points.map((p, i) => (i === 0 ? 'M' : 'L') + sx(p.x).toFixed(2) + ',' + sy(p.y).toFixed(2)).join(' ');
    const fillD = d
      + ' L' + sx(maxX).toFixed(2) + ',' + (h - pad).toFixed(2)
      + ' L' + sx(minX).toFixed(2) + ',' + (h - pad).toFixed(2) + ' Z';

    const last = points[points.length - 1];
    const lx = sx(last.x);
    const ly = sy(last.y);

    const stroke = opts.stroke || '#22c55e';
    const fill   = opts.fill   || 'rgba(34, 197, 94, 0.12)';

    return (
      '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<path d="' + fillD + '" fill="' + fill + '" stroke="none"/>' +
        '<path d="' + d + '" fill="none" stroke="' + stroke + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        '<circle cx="' + lx.toFixed(2) + '" cy="' + ly.toFixed(2) + '" r="2.4" fill="' + stroke + '"/>' +
      '</svg>'
    );
  }

  // ---------- Prose composition ----------

  function heroHeadline(d) {
    const saved = d.performance.savings_aud;
    const month = d._meta.month_label.split(' ')[0]; // "May"
    const proj  = d.net_worth.projection_eoy_aud;
    return 'You saved <span class="accent">' + fmtAud(saved, 0).replace('$', '$') + '</span> in ' + month + ', '
      + 'putting you on pace for <em>' + fmtAudK(proj) + '</em> by year end.';
  }

  function heroSubhead(d) {
    const milestone = d.net_worth.next_milestone;
    const months = milestone.eta_months;
    const runway = d.performance.runway_months;
    const fi = d.performance.fi_ratio_pct;
    return 'At your current pace you cross <strong>' + esc(milestone.label) + '</strong> in about '
      + months + ' months &mdash; ' + fmtDateLong(milestone.eta_date + '-01').split(' ').slice(1, 3).join(' ').replace(',', '')
      + '. Your runway sits at <span class="num">' + runway.toFixed(1) + '</span> months '
      + 'and you&rsquo;re <span class="num">' + fmtPct(fi, 1) + '</span> of the way to financial independence.';
  }

  function storyProse(d) {
    const month = d._meta.month_label.split(' ')[0];
    const trends = d.insights.category_trends || [];
    const eatOut = trends.find(t => t.category === 'eating-out');
    const goodLife = trends.find(t => t.category === 'good-life');
    const transport = trends.find(t => t.category === 'transport');
    const ru = d.round_ups;
    const cb = d.cashback;
    const split = d.joint_account_split;
    const foreign = d.foreign_spend;
    const insights = d.insights;
    const alerts = d.alerts || [];
    const warningAlert = alerts.find(a => a.severity === 'warning');

    const splitJordan = split.by_customer.find(c => c.name === 'Jordan') || {};
    const splitPartner = split.by_customer.find(c => c.name === 'Partner') || {};

    // Paragraph 1 — overall pace and the win
    const para1 = '<p>' +
      'It&rsquo;s a quietly good month. Spending came in at <span class="num">' + fmtAud(d.performance.monthly_spending_aud, 0) + '</span> ' +
      'against an income of <span class="num">' + fmtAud(d.performance.income_aud, 0) + '</span>, which is a savings rate of ' +
      '<span class="num good">' + fmtPct(d.performance.savings_rate_pct, 0) + '</span> &mdash; well above the 30% you&rsquo;ve been aiming for, ' +
      'and the highest since February. ' +
      'You&rsquo;re tracking <span class="num good">' + fmtAud(Math.abs(insights.pace_diff), 0) + '</span> under pace with ' +
      '<span class="num">' + insights.days_left + '</span> days left, so May should close at roughly ' +
      '<span class="num">' + fmtAud(insights.projected_total, 0) + '</span>.' +
      '</p>';

    // Paragraph 2 — the category moves, where the discipline came from
    const para2 = '<p>' +
      'The biggest shift was <strong>Eating Out</strong>, down <span class="num good">' + Math.abs(eatOut.change_pct).toFixed(0) + '%</span> to ' +
      '<span class="num">' + fmtAud(eatOut.this_month, 0) + '</span> (you spent <span class="num">' + fmtAud(eatOut.last_month, 0) + '</span> last month). ' +
      'That&rsquo;s where the extra savings came from. ' +
      '<em>Good Life</em> went the other way &mdash; up <span class="num warn">' + goodLife.change_pct.toFixed(0) + '%</span> to ' +
      '<span class="num">' + fmtAud(goodLife.this_month, 0) + '</span>, mostly Dan Murphy&rsquo;s and one dinner at Hawker&rsquo;s Garden. ' +
      'Transport also crept up <span class="num warn">' + transport.change_pct.toFixed(0) + '%</span> on a couple of fuel fills.' +
      '</p>';

    // Paragraph 3 — round-ups, cashback, joint, foreign, alert
    const para3 = '<p>' +
      'Round-ups quietly did their job: <span class="num good">' + fmtAud(ru.month_total_aud, 2) + '</span> across ' +
      '<span class="num">' + ru.month_count + '</span> transactions, of which <span class="num">' + fmtAud(ru.boost_portion_aud, 2) + '</span> was the ' +
      '<strong>' + ru.boost_active_multiplier + '&times; boost</strong> &mdash; all headed to <em>' + esc(ru.destination_saver) + '</em>. ' +
      'Cashback added another <span class="num good">' + fmtAud(cb.month_total_aud, 2) + '</span> (<span class="num">' + fmtAud(cb.ytd_aud, 2) + '</span> YTD). ' +
      'On the <strong>2Up Joint</strong> account, you spent <span class="num">' + fmtAud(Math.abs(splitJordan.amount), 0) + '</span> ' +
      '(<span class="num">' + splitJordan.pct.toFixed(0) + '%</span>) and your partner spent ' +
      '<span class="num">' + fmtAud(Math.abs(splitPartner.amount), 0) + '</span>. ' +
      (warningAlert
        ? 'One thing to keep an eye on: <em>' + esc(warningAlert.title) + '</em> &mdash; ' + esc(warningAlert.detail).toLowerCase()
        : '') +
      '</p>';

    return para1 + para2 + para3;
  }

  // ---------- Savings goals ----------

  function renderGoals(d) {
    const section = el('section');
    section.appendChild(el('p', { class: 'section-label' }, 'Savers'));
    section.appendChild(el('h2', { class: 'section-title', html: 'Where each saver is at <em>&mdash; and when it gets there</em>' }));

    const priorityOrder = { high: 0, medium: 1, low: 2 };
    const goals = (d.savings_goals || []).slice().sort((a, b) => {
      const pa = priorityOrder[a.priority] == null ? 3 : priorityOrder[a.priority];
      const pb = priorityOrder[b.priority] == null ? 3 : priorityOrder[b.priority];
      if (pa !== pb) return pa - pb;
      return b.pct - a.pct;
    });

    goals.forEach(g => {
      const node = el('div', { class: 'goal' });

      const row = el('div', { class: 'goal-row' });
      const name = el('div', { class: 'goal-name', html:
        '<span class="priority-dot ' + esc(g.priority) + '" title="' + esc(g.priority) + ' priority"></span>' + esc(g.name)
      });
      const pct = el('div', { class: 'goal-pct', html:
        '<strong>' + g.pct.toFixed(0) + '%</strong> &middot; ' + fmtAud(g.current, 0) + ' of ' + fmtAud(g.target, 0)
      });
      row.appendChild(name);
      row.appendChild(pct);
      node.appendChild(row);

      const bar = el('div', { class: 'goal-bar' });
      const fill = el('div', { class: 'goal-bar-fill ' + esc(g.priority) });
      fill.style.width = Math.min(100, Math.max(0, g.pct)).toFixed(1) + '%';
      bar.appendChild(fill);
      node.appendChild(bar);

      const monthsLabel = g.eta_months === 1 ? 'month' : 'months';
      const eta = el('p', { class: 'goal-eta', html:
        'About <span class="num">' + g.eta_months + '</span> ' + monthsLabel + ' to ' + fmtAudK(g.target) +
        ' at <span class="num">' + fmtAud(g.monthly_contrib, 0) + '</span>/mo. ' +
        (g.priority === 'high'
          ? '<em>Priority saver &mdash; auto-transfer locked in.</em>'
          : g.priority === 'medium'
            ? '<em>Steady contribution, no rush.</em>'
            : '<em>Lower priority; topped up from spare cash.</em>')
      });
      node.appendChild(eta);

      section.appendChild(node);
    });

    return section;
  }

  // ---------- By the numbers ----------

  function renderNumbers(d) {
    const section = el('section', { class: 'appendix' });
    section.appendChild(el('p', { class: 'section-label' }, 'By the numbers'));
    section.appendChild(el('h2', { class: 'section-title', html: 'The same month, as a table' }));

    const recurring = (d.insights.recurring || []);
    const recurringAnnual = recurring.reduce((sum, r) => sum + (r.est_monthly || 0) * 12, 0);

    const fixed = d.monthly_spending.fixed_aud;
    const variable = d.monthly_spending.variable_aud;
    const fixedPct = (fixed / (fixed + variable)) * 100;

    const rows = [
      {
        label: 'Income this month',
        sub: 'Salary &middot; Acme Pty Ltd',
        value: fmtAud(d.performance.income_aud, 0),
        delta: null
      },
      {
        label: 'Total spending',
        sub: 'Projected close: ' + fmtAud(d.insights.projected_total, 0),
        value: fmtAud(d.performance.monthly_spending_aud, 0),
        delta: { text: fmtAud(d.insights.pace_diff, 0) + ' vs pace', cls: 'good' }
      },
      {
        label: 'Savings',
        sub: 'Income minus spending',
        value: fmtAud(d.performance.savings_aud, 0),
        delta: { text: fmtPct(d.performance.savings_rate_pct, 0) + ' savings rate', cls: 'good' }
      },
      {
        label: 'Fixed vs discretionary',
        sub: 'Rent, utilities, subs are locked',
        value: fmtAud(fixed, 0) + ' / ' + fmtAud(variable, 0),
        delta: { text: fixedPct.toFixed(0) + '% fixed', cls: 'warn' }
      },
      {
        label: 'Recurring &mdash; annualised',
        sub: recurring.length + ' subscriptions &amp; bills',
        value: fmtAud(recurringAnnual, 0),
        delta: { text: 'rent dominates', cls: '' }
      },
      {
        label: 'Round-ups (May)',
        sub: ru_count(d) + ' transactions &middot; ' + d.round_ups.boost_active_multiplier + '&times; boost active',
        value: fmtAud(d.round_ups.month_total_aud, 2),
        delta: { text: fmtAud(d.round_ups.last_12mo_total_aud, 0) + ' last 12mo', cls: 'good' }
      },
      {
        label: 'Cashback YTD',
        sub: 'Up Bank rewards on tap',
        value: fmtAud(d.cashback.ytd_aud, 2),
        delta: { text: fmtAud(d.cashback.month_total_aud, 2) + ' this month', cls: 'good' }
      },
      {
        label: 'Foreign spend (May)',
        sub: 'Apple Store, USD 14.99',
        value: fmtAud(d.foreign_spend.month_total_aud, 2),
        delta: { text: fmtAud(d.foreign_spend.ytd_aud, 0) + ' YTD', cls: '' }
      },
      {
        label: 'Net worth',
        sub: 'Cash ' + fmtPct(d.net_worth.pct_cash, 0) + ' &middot; Invested ' + fmtPct(d.net_worth.pct_invested, 0),
        value: fmtAud(d.net_worth.total_aud, 0),
        delta: { text: '+ ' + fmtAud(d.performance.net_progress_aud, 0) + ' this month', cls: 'good' }
      },
      {
        label: 'Runway',
        sub: 'At current spend',
        value: d.performance.runway_months.toFixed(1) + ' months',
        delta: null
      }
    ];

    const table = el('table', { class: 'numbers' });
    const tbody = el('tbody');
    rows.forEach(r => {
      const tr = el('tr');
      const tdL = el('td', { class: 'label', html: r.label + (r.sub ? '<span class="sub">' + r.sub + '</span>' : '') });
      const deltaHtml = r.delta ? '<span class="delta ' + (r.delta.cls || '') + '">' + r.delta.text + '</span>' : '';
      const tdV = el('td', { class: 'value', html: r.value + deltaHtml });
      tr.appendChild(tdL);
      tr.appendChild(tdV);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    section.appendChild(table);

    return section;
  }
  function ru_count(d) { return d.round_ups.month_count; }

  // ---------- Recent activity ----------

  function renderActivity(d) {
    const section = el('section');
    section.appendChild(el('p', { class: 'section-label' }, 'Recent activity'));
    section.appendChild(el('h2', { class: 'section-title', html: 'The last few moves on your accounts' }));

    const all = (d.recent_transactions || []).slice();
    const settled = all.filter(t => t.status === 'SETTLED').slice(0, 6);
    const held = all.filter(t => t.status === 'HELD');

    const list = el('ul', { class: 'tx-list' });
    settled.forEach(t => list.appendChild(txRow(t)));
    section.appendChild(list);

    if (held.length) {
      section.appendChild(el('p', { class: 'held-divider', html: 'Pending &middot; ' + held.length + ' held' }));
      const heldList = el('ul', { class: 'tx-list' });
      held.forEach(t => heldList.appendChild(txRow(t, true)));
      section.appendChild(heldList);
    }

    return section;
  }

  function txRow(t, isHeld) {
    const li = el('li', { class: 'tx-item' });

    li.appendChild(el('div', { class: 'tx-date' }, fmtDateShort(t.date)));

    const metaBits = [];
    if (t.account) metaBits.push(t.account);
    if (t.performing_customer) metaBits.push(t.performing_customer);
    if (t.parent_category && t.parent_category !== 'transfer' && t.parent_category !== 'income')
      metaBits.push(t.parent_category.replace('-', ' '));
    if (t.foreign_amount) metaBits.push(t.foreign_amount.currency + ' ' + t.foreign_amount.value);

    const desc = el('div', { class: 'tx-desc', html:
      esc(t.description) +
      (isHeld ? '<span class="pill-held">Held</span>' : '') +
      (metaBits.length ? '<span class="meta">' + esc(metaBits.join(' &middot; ').replace(/&amp;middot;/g, '&middot;')) + '</span>' : '')
    });
    // The esc above will double-escape &middot; -- fix by re-inserting after esc.
    // Simpler: rebuild the meta string with safe escaping piece-by-piece.
    if (metaBits.length) {
      const safeMeta = metaBits.map(esc).join(' &middot; ');
      const metaEl = desc.querySelector('.meta');
      if (metaEl) metaEl.innerHTML = safeMeta;
    }
    li.appendChild(desc);

    const amt = Number(t.amount) || 0;
    const cls = amt > 0 ? 'pos' : 'neg';
    li.appendChild(el('div', { class: 'tx-amount ' + cls }, (amt > 0 ? '+' : '') + fmtAud(amt, 2)));

    return li;
  }

  // ---------- Hero render ----------

  function renderHero(d) {
    const section = el('section', { class: 'hero' });

    section.appendChild(el('p', { class: 'hero-kicker', html: '<span class="dot"></span>' + esc(d._meta.month_label) + ' &middot; Day ' + d._meta.day_of_month + ' of ' + d._meta.days_in_month }));

    section.appendChild(el('h1', { class: 'hero-headline', html: heroHeadline(d) }));
    section.appendChild(el('p', { class: 'hero-subhead', html: heroSubhead(d) }));

    // Sparkline row — net worth 6mo
    const sparkRow = el('div', { class: 'hero-spark' });
    const points = (d.net_worth.history_6mo || []).map((p, i) => ({ x: i, y: p.total_aud }));
    const trendUp = points.length > 1 && points[points.length - 1].y > points[0].y;
    sparkRow.innerHTML =
      '<span class="hero-spark-label">Net worth, 6 months' +
        '<span class="value">' + fmtAud(d.net_worth.total_aud, 0) + '</span>' +
      '</span>' +
      sparkline(points, {
        width: 160, height: 44,
        stroke: trendUp ? '#22c55e' : '#ef4444',
        fill:   trendUp ? 'rgba(34, 197, 94, 0.12)' : 'rgba(239, 68, 68, 0.12)'
      });
    section.appendChild(sparkRow);

    return section;
  }

  function renderStory(d) {
    const section = el('section');
    section.appendChild(el('p', { class: 'section-label' }, 'This month&rsquo;s story'));
    section.appendChild(el('h2', { class: 'section-title', html: 'A quietly disciplined ' + d._meta.month_label.split(' ')[0] + ', <em>led by eating out.</em>' }));
    section.appendChild(el('div', { class: 'story-prose', html: storyProse(d) }));
    return section;
  }

  function renderColophon(d) {
    return el('div', { class: 'colophon', html:
      'Variant A &middot; Savings Story &middot; Set in Source Serif Pro &middot; All figures from your Up Bank accounts, as of ' + esc(d._meta.as_of)
    });
  }

  function renderError(msg) {
    return el('div', { class: 'err', html: 'Couldn&rsquo;t load your month. <span class="num">' + esc(msg) + '</span>' });
  }

  // ---------- Main ----------

  function render(data) {
    try {
      const dateline = $('#dateline');
      if (dateline) dateline.textContent = fmtDateLong(data._meta.as_of) + ' · Vol. I No. 5';

      const app = $('#app');
      app.innerHTML = '';
      app.appendChild(renderHero(data));
      app.appendChild(renderStory(data));
      app.appendChild(renderGoals(data));
      app.appendChild(renderNumbers(data));
      app.appendChild(renderActivity(data));
      app.appendChild(renderColophon(data));
    } catch (e) {
      console.error(e);
      const app = $('#app');
      app.innerHTML = '';
      app.appendChild(renderError('render: ' + (e && e.message ? e.message : String(e))));
    }
  }

  function init() {
    fetch('../shared/mock-finance.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(render)
      .catch(err => {
        console.error('Load failed:', err);
        const app = $('#app');
        app.innerHTML = '';
        app.appendChild(renderError('Could not load ../shared/mock-finance.json &mdash; ' + (err && err.message ? err.message : String(err))));
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
