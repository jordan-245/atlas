<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Finance — Goal Buckets (Variant B)</title>
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-alt: #1c2026;
    --border: #2a2f37;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;

    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", "Menlo", Consolas, monospace;

    --radius: 14px;
    --radius-sm: 8px;
    --pad: 28px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: var(--text-muted); text-decoration: none; }
  a:hover { color: var(--text); }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ============ TOP NAV ============ */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 36px;
  }
  .top-title {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .top-title b { color: var(--text); font-weight: 600; letter-spacing: 0; text-transform: none; }
  .top-link { font-size: 13px; }

  /* ============ HEADLINE STRIP ============ */
  .headline {
    display: grid;
    grid-template-columns: 1.7fr 1fr 1fr 1fr;
    gap: 24px;
    padding: 28px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 48px;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .stat--big .stat-value { font-size: 36px; }
  .stat--big .stat-sub {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 4px;
  }
  .stat-sub { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* ============ SECTION HEADERS ============ */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  section { margin-bottom: 56px; }

  /* ============ THE BUCKETS ============ */
  .buckets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  @media (max-width: 1100px) { .buckets { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px)  { .buckets { grid-template-columns: 1fr; } }

  .bucket-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .bucket-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--hue, var(--accent));
    opacity: 0.7;
  }

  .bucket-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .bucket-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.1px;
  }
  .bucket-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .pri-chip {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 4px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    white-space: nowrap;
  }
  .pri-chip--high   { color: #fda4af; border-color: rgba(239,68,68,0.45); background: rgba(239,68,68,0.10); }
  .pri-chip--medium { color: #fcd34d; border-color: rgba(245,158,11,0.45); background: rgba(245,158,11,0.10); }
  .pri-chip--low    { color: #93c5fd; border-color: rgba(59,130,246,0.45); background: rgba(59,130,246,0.10); }

  .bucket-svg-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px;
    margin: 4px 0 6px;
  }
  .bucket-svg { width: 130px; height: 200px; }

  .bucket-numbers {
    text-align: center;
    margin-top: 2px;
  }
  .bucket-amount {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .bucket-amount .target {
    color: var(--text-muted);
    font-weight: 400;
  }
  .bucket-pct {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.4px;
  }
  .bucket-pct b {
    color: var(--hue, var(--text));
    font-weight: 600;
  }

  .bucket-footer {
    border-top: 1px dashed var(--border);
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bf-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }
  .bf-key { color: var(--text-muted); }
  .bf-val { color: var(--text); font-weight: 500; }
  .bf-val.mono { font-family: var(--mono); }
  .bf-eta { color: var(--hue, var(--text)); font-weight: 600; }
  .roundup-line {
    margin-top: 6px;
    font-size: 11px;
    color: var(--hue, var(--accent));
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .roundup-line::before {
    content: '↻';
    font-size: 13px;
  }

  /* ============ ROUND-UP ROUTING CALLOUT ============ */
  .routing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    align-items: center;
    gap: 28px;
  }
  .routing-block { display: flex; flex-direction: column; gap: 6px; }
  .routing-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }
  .routing-value {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .routing-sub { font-size: 12px; color: var(--text-muted); }
  .routing-arrow {
    color: var(--text-muted);
    font-size: 22px;
    line-height: 1;
  }
  .boost-badge {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(245, 158, 11, 0.35);
    border-radius: 20px;
    color: var(--amber);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    margin-top: 4px;
  }
  .routing-dest {
    text-align: right;
  }
  .routing-dest .dest-name {
    font-size: 18px;
    font-weight: 600;
  }
  .weekly-mini {
    grid-column: 1 / -1;
    margin-top: 22px;
    padding-top: 22px;
    border-top: 1px dashed var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    height: 70px;
  }
  .weekly-mini-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    align-self: flex-end;
    padding-bottom: 4px;
    white-space: nowrap;
  }
  .wm-bars { display: flex; align-items: flex-end; gap: 14px; flex: 1; height: 100%; }
  .wm-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
  .wm-bar {
    width: 100%;
    max-width: 32px;
    background: linear-gradient(180deg, var(--accent), rgba(59,130,246,0.4));
    border-radius: 3px 3px 0 0;
    height: 0;
    transition: height 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .wm-bar-label {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  @media (max-width: 800px) {
    .routing { grid-template-columns: 1fr; text-align: left; }
    .routing-dest { text-align: left; }
    .routing-arrow { display: none; }
  }

  /* ============ EMERGENCY FUND SPOTLIGHT ============ */
  .ef-spotlight {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
  }
  .ef-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
  .ef-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text); font-weight: 600; }
  .ef-tag { font-size: 11px; color: var(--text-muted); }
  .ef-headline {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.4px;
    margin-bottom: 6px;
  }
  .ef-headline b { color: var(--green); font-family: var(--mono); }
  .ef-sub {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .ef-scale-wrap { position: relative; padding: 0 4px; }
  .ef-scale {
    position: relative;
    height: 12px;
    background: linear-gradient(90deg,
      var(--red) 0%,
      var(--red) 25%,
      var(--amber) 25%,
      var(--amber) 50%,
      var(--green) 50%,
      var(--green) 100%);
    border-radius: 6px;
    opacity: 0.85;
  }
  .ef-markers {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .ef-marker-tick { position: relative; flex: 1; text-align: center; }
  .ef-marker-tick:first-child { text-align: left; }
  .ef-marker-tick:last-child { text-align: right; }
  .ef-pin {
    position: absolute;
    top: -6px;
    width: 4px;
    height: 24px;
    background: var(--text);
    border-radius: 2px;
    box-shadow: 0 0 0 3px var(--bg), 0 0 12px rgba(230, 232, 235, 0.45);
    transform: translateX(-50%);
    transition: left 1.6s cubic-bezier(0.22, 1, 0.36, 1);
    left: 0;
  }
  .ef-pin-label {
    position: absolute;
    top: -34px;
    transform: translateX(-50%);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    transition: left 1.6s cubic-bezier(0.22, 1, 0.36, 1);
    left: 0;
  }

  /* ============ SPENDING COMPRESSED ============ */
  .spending {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
  }
  .sp-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .sp-total {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
  }
  .sp-bar {
    display: flex;
    height: 26px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface-alt);
  }
  .sp-seg {
    height: 100%;
    width: 0;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }
  .sp-seg + .sp-seg { border-left: 1px solid rgba(11, 13, 16, 0.6); }
  .sp-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    margin-top: 18px;
  }
  .sp-leg {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .sp-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }
  .sp-leg b { color: var(--text); font-family: var(--mono); font-weight: 500; }

  /* ============ MILESTONES TIMELINE ============ */
  .milestones {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 30px 32px 36px;
  }
  .ms-line {
    position: relative;
    height: 4px;
    background: var(--surface-alt);
    border-radius: 2px;
    margin: 60px 16px 30px;
  }
  .ms-line-filled {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--green), rgba(34, 197, 94, 0.3));
    border-radius: 2px;
    width: 0;
    transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .ms-points {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
  }
  .ms-point {
    position: relative;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    z-index: 2;
  }
  .ms-point.achieved {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
  }
  .ms-point.next {
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
  }
  .ms-label {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    white-space: nowrap;
    font-size: 11px;
  }
  .ms-label .ms-amt {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--text);
    display: block;
  }
  .ms-label .ms-date {
    color: var(--text-muted);
    margin-top: 3px;
    display: block;
  }
  .ms-point.achieved + .ms-label .ms-amt,
  .ms-point.achieved .ms-label .ms-amt { color: var(--green); }
  .ms-foot-label {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  /* ============ CASHFLOW STRIP ============ */
  .cashflow {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  @media (max-width: 700px) { .cashflow { grid-template-columns: repeat(2, 1fr); } }
  .cf-cell { display: flex; flex-direction: column; gap: 4px; }
  .cf-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }
  .cf-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .cf-val.in { color: var(--green); }
  .cf-val.out { color: var(--text); }
  .cf-sub { font-size: 11px; color: var(--text-muted); }

  /* ============ LOADING ============ */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-left: 8px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Wave animation on bucket liquid */
  @keyframes wave-shift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-40px); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="top-title"><b>Atlas Finance</b> &nbsp;·&nbsp; Variant B — Goal Buckets</div>
    <a class="top-link" href="../">← all variants</a>
  </div>

  <div id="app">
    <div class="loading">Loading</div>
  </div>

</div>

<script>
(async function () {
  const app = document.getElementById('app');

  let data;
  try {
    const res = await fetch('../shared/mock-finance.json');
    data = await res.json();
  } catch (err) {
    app.innerHTML = '<div class="loading" style="color:var(--red)">Failed to load data: ' + err + '</div>';
    return;
  }

  // ============ helpers ============
  const fmt = (n) => '$' + Math.round(n).toLocaleString('en-AU');
  const fmt2 = (n) => '$' + n.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtK = (n) => '$' + (n >= 1000 ? (n / 1000).toFixed(n >= 100000 ? 0 : n >= 10000 ? 1 : 1) + 'K' : Math.round(n));

  // Per-saver palettes — chosen so the four feel distinct but cohesive on dark.
  const HUES = {
    'Emergency Fund': { main: '#22c55e', light: '#86efac', name: 'green'  }, // safety = green
    'House Deposit':  { main: '#3b82f6', light: '#93c5fd', name: 'blue'   }, // the big serious one
    'Tax Set Aside':  { main: '#f59e0b', light: '#fcd34d', name: 'amber'  }, // tax = amber, urgent-ish
    'Bali 2026':      { main: '#ec4899', light: '#f9a8d4', name: 'pink'   }, // fun goal = pink
  };
  const PRI = { high: 'High', medium: 'Med', low: 'Low' };

  // ============ render ============
  app.innerHTML = renderApp(data);

  // Trigger animations after mount
  requestAnimationFrame(() => requestAnimationFrame(animateAll));

  // ===================================================================
  // RENDER
  // ===================================================================
  function renderApp(d) {
    return [
      renderHeadline(d),
      renderBuckets(d),
      renderRouting(d),
      renderEmergency(d),
      renderSpending(d),
      renderMilestones(d),
      renderCashflow(d),
    ].join('\n');
  }

  // ----------- HEADLINE -----------
  function renderHeadline(d) {
    const nw = d.net_worth;
    const p = d.performance;
    const lastMonth = nw.history_6mo[nw.history_6mo.length - 2].total_aud;
    const moDelta = nw.total_aud - lastMonth;
    const moDeltaPct = (moDelta / lastMonth) * 100;

    return `
      <div class="headline">
        <div class="stat stat--big">
          <div class="stat-label">Net worth</div>
          <div class="stat-value">${fmt(nw.total_aud)}</div>
          <div class="stat-sub"><span class="pos">▲ ${fmt(moDelta)}</span> &nbsp;·&nbsp; ${moDeltaPct.toFixed(1)}% this month</div>
        </div>
        <div class="stat">
          <div class="stat-label">Saved this month</div>
          <div class="stat-value">${fmt(p.savings_aud)}</div>
          <div class="stat-sub">${p.savings_rate_pct.toFixed(0)}% savings rate</div>
        </div>
        <div class="stat">
          <div class="stat-label">Runway</div>
          <div class="stat-value">${p.runway_months.toFixed(1)} <span style="font-size:14px;color:var(--text-muted);font-weight:400">mo</span></div>
          <div class="stat-sub">From emergency fund</div>
        </div>
        <div class="stat">
          <div class="stat-label">Savings rate</div>
          <div class="stat-value">${p.savings_rate_pct.toFixed(0)}%</div>
          <div class="stat-sub pos">▲ above 30% target</div>
        </div>
      </div>
    `;
  }

  // ----------- THE BUCKETS -----------
  function renderBuckets(d) {
    const tiles = d.savings_goals.map((g) => renderBucketTile(g, d)).join('');
    const totalSaved = d.savings_goals.reduce((s, g) => s + g.current, 0);
    const totalTarget = d.savings_goals.reduce((s, g) => s + g.target, 0);
    return `
      <section>
        <div class="section-head">
          <div class="section-title">Goal Buckets</div>
          <div class="section-sub">${fmt(totalSaved)} saved across ${d.savings_goals.length} pots &nbsp;·&nbsp; ${fmt(totalTarget - totalSaved)} to go</div>
        </div>
        <div class="buckets">${tiles}</div>
      </section>
    `;
  }

  function renderBucketTile(g, d) {
    const hue = HUES[g.name] || { main: 'var(--accent)', light: '#fff', name: 'blue' };
    const acct = d.accounts.find((a) => a.name === g.name);
    const interest = acct ? acct.interest_rate_pct : null;
    const isRoundupDest = d.round_ups.destination_saver === g.name;
    const monthsToGo = g.eta_months;
    const etaDate = monthsFromNow(monthsToGo, d._meta.as_of);
    const etaDateStr = formatEta(etaDate);

    return `
      <div class="bucket-card" style="--hue: ${hue.main}">
        <div class="bucket-head">
          <div>
            <div class="bucket-name">${g.name}</div>
            <div class="bucket-meta">${monthsToGo} mo &middot; ${etaDateStr}</div>
          </div>
          <span class="pri-chip pri-chip--${g.priority}">${PRI[g.priority]}</span>
        </div>

        <div class="bucket-svg-wrap">
          ${bucketSvg(g.pct, hue, g.name.replace(/\s+/g, '-'))}
        </div>

        <div class="bucket-numbers">
          <div class="bucket-amount">${fmt(g.current)} <span class="target">/ ${fmt(g.target)}</span></div>
          <div class="bucket-pct"><b>${g.pct.toFixed(1)}%</b> filled</div>
        </div>

        <div class="bucket-footer">
          <div class="bf-row">
            <span class="bf-key">Full in</span>
            <span class="bf-val bf-eta">~${monthsToGo} months</span>
          </div>
          <div class="bf-row">
            <span class="bf-key">Contribution</span>
            <span class="bf-val mono">+${fmt(g.monthly_contrib)}/mo</span>
          </div>
          ${interest != null ? `
          <div class="bf-row">
            <span class="bf-key">Interest</span>
            <span class="bf-val mono">${interest.toFixed(2)}% p.a.</span>
          </div>` : ''}
          ${isRoundupDest ? `
          <div class="roundup-line">Round-ups: +${fmt2(d.round_ups.month_total_aud)} this month</div>
          ` : ''}
        </div>
      </div>
    `;
  }

  function bucketSvg(pct, hue, idSafe) {
    // Vertical pot with liquid fill. The fill rises via CSS transition on the rect y/height
    // and the surface "wave" is a path that animates horizontally.
    const id = 'b-' + idSafe;
    const containerH = 180;
    const containerW = 110;
    const containerX = 10;
    const containerY = 10;
    // Inset of liquid inside the bucket walls
    const inset = 4;
    const fillW = containerW - inset * 2;
    const fillMaxH = containerH - inset * 2;
    const targetFillH = (pct / 100) * fillMaxH;

    return `
      <svg class="bucket-svg" viewBox="0 0 130 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="${id}-clip">
            <rect x="${containerX + inset}" y="${containerY + inset}"
                  width="${fillW}" height="${fillMaxH}" rx="6" ry="6" />
          </clipPath>
          <linearGradient id="${id}-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${hue.main}" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="${hue.main}" stop-opacity="0.55"/>
          </linearGradient>
        </defs>

        <!-- Goal line tick marks on the side -->
        <g stroke="${'#3a414b'}" stroke-width="1">
          <line x1="${containerX - 4}" y1="${containerY + inset}"
                x2="${containerX}" y2="${containerY + inset}" />
          <line x1="${containerX - 4}" y1="${containerY + fillMaxH / 4 + inset}"
                x2="${containerX}" y2="${containerY + fillMaxH / 4 + inset}" />
          <line x1="${containerX - 4}" y1="${containerY + fillMaxH / 2 + inset}"
                x2="${containerX}" y2="${containerY + fillMaxH / 2 + inset}" />
          <line x1="${containerX - 4}" y1="${containerY + (3 * fillMaxH) / 4 + inset}"
                x2="${containerX}" y2="${containerY + (3 * fillMaxH) / 4 + inset}" />
          <line x1="${containerX - 4}" y1="${containerY + fillMaxH + inset}"
                x2="${containerX}" y2="${containerY + fillMaxH + inset}" />
        </g>
        <text x="${containerX - 6}" y="${containerY + inset + 3}" text-anchor="end"
              font-size="8" font-family="var(--mono)" fill="var(--text-muted)">100%</text>
        <text x="${containerX - 6}" y="${containerY + fillMaxH / 2 + inset + 3}" text-anchor="end"
              font-size="8" font-family="var(--mono)" fill="var(--text-muted)">50%</text>
        <text x="${containerX - 6}" y="${containerY + fillMaxH + inset + 3}" text-anchor="end"
              font-size="8" font-family="var(--mono)" fill="var(--text-muted)">0%</text>

        <!-- Bucket container outline -->
        <rect x="${containerX}" y="${containerY}"
              width="${containerW}" height="${containerH}"
              rx="10" ry="10"
              fill="#0e1115" stroke="#3a414b" stroke-width="1.5" />

        <!-- Subtle inner gloss strip on left side -->
        <rect x="${containerX + 4}" y="${containerY + 8}"
              width="3" height="${containerH - 16}"
              rx="1.5" fill="rgba(255,255,255,0.03)" />

        <!-- Liquid fill (clipped to inner rounded rect) -->
        <g clip-path="url(#${id}-clip)">
          <!-- Main liquid rectangle: animates by changing y + height -->
          <rect class="bucket-fill"
                data-target-h="${targetFillH.toFixed(2)}"
                data-max-h="${fillMaxH}"
                data-max-y="${containerY + inset + fillMaxH}"
                x="${containerX + inset}"
                y="${containerY + inset + fillMaxH}"
                width="${fillW}"
                height="0"
                fill="url(#${id}-grad)" />

          <!-- Surface wave: a path that's wider than the bucket and slides -->
          <g class="bucket-wave-wrap"
             data-target-y="${(containerY + inset + fillMaxH - targetFillH).toFixed(2)}"
             data-start-y="${containerY + inset + fillMaxH}"
             style="transform: translateY(0px); transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1)">
            <path d="
              M ${containerX - 10} 0
              Q ${containerX + 5} -5, ${containerX + 20} 0
              T ${containerX + 50} 0
              T ${containerX + 80} 0
              T ${containerX + 110} 0
              T ${containerX + 140} 0
              L ${containerX + 140} 10
              L ${containerX - 10} 10 Z"
              fill="${hue.main}"
              opacity="0.85"
              style="animation: wave-shift 4s linear infinite" />
            <path d="
              M ${containerX - 30} 4
              Q ${containerX - 15} -1, ${containerX} 4
              T ${containerX + 30} 4
              T ${containerX + 60} 4
              T ${containerX + 90} 4
              T ${containerX + 120} 4
              L ${containerX + 120} 14
              L ${containerX - 30} 14 Z"
              fill="${hue.light}"
              opacity="0.35"
              style="animation: wave-shift 3s linear infinite reverse" />
          </g>
        </g>

        <!-- Goal line: a dashed line across the top of the bucket -->
        <line x1="${containerX - 2}" y1="${containerY + inset}"
              x2="${containerX + containerW + 2}" y2="${containerY + inset}"
              stroke="${hue.main}" stroke-width="1" stroke-dasharray="3 3" opacity="0.6" />
        <text x="${containerX + containerW + 6}" y="${containerY + inset + 3}"
              font-size="8" font-family="var(--mono)" fill="${hue.main}" opacity="0.8">goal</text>
      </svg>
    `;
  }

  // ----------- ROUND-UP ROUTING -----------
  function renderRouting(d) {
    const r = d.round_ups;
    const dest = d.savings_goals.find((g) => g.name === r.destination_saver);
    const destHue = HUES[r.destination_saver];

    return `
      <section>
        <div class="section-head">
          <div class="section-title">Round-up Routing</div>
          <div class="section-sub">Spare change boosted ${r.boost_active_multiplier}× &nbsp;·&nbsp; ${r.month_count} txns this month</div>
        </div>
        <div class="routing">
          <div class="routing-block">
            <div class="routing-label">This month</div>
            <div class="routing-value">${fmt2(r.month_total_aud)}</div>
            <div class="routing-sub">${r.month_count} round-ups</div>
            <span class="boost-badge">${r.boost_active_multiplier}× boost · ${fmt2(r.boost_portion_aud)} extra</span>
          </div>
          <div class="routing-arrow">→</div>
          <div class="routing-block">
            <div class="routing-label">Routed to</div>
            <div class="routing-value" style="color:${destHue.main}">${r.destination_saver}</div>
            <div class="routing-sub">${dest ? dest.pct.toFixed(1) + '% filled · ' + fmt(dest.current) : ''}</div>
          </div>
          <div class="routing-arrow">→</div>
          <div class="routing-block routing-dest">
            <div class="routing-label">12-month total</div>
            <div class="routing-value">${fmt2(r.last_12mo_total_aud)}</div>
            <div class="routing-sub">Toward your house deposit</div>
          </div>

          <div class="weekly-mini">
            <div class="weekly-mini-label">Last 5 weeks</div>
            <div class="wm-bars">
              ${r.weekly.map(w => {
                const max = Math.max(...r.weekly.map(x => x.amount));
                const pct = (w.amount / max) * 100;
                return `
                  <div class="wm-bar-wrap">
                    <div class="wm-bar" data-h="${pct}"></div>
                    <div class="wm-bar-label">${w.week.replace('W','')} · ${fmt2(w.amount)}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      </section>
    `;
  }

  // ----------- EMERGENCY FUND SPOTLIGHT -----------
  function renderEmergency(d) {
    const runway = d.performance.runway_months;
    // Scale: 0 to 12 months, clamped
    const scaleMax = 12;
    const pinPct = Math.min(100, Math.max(0, (runway / scaleMax) * 100));

    return `
      <section>
        <div class="ef-spotlight">
          <div class="ef-head">
            <div class="ef-title">Emergency Fund Runway</div>
            <div class="ef-tag">From ${fmt(d.accounts.find(a => a.name === 'Emergency Fund').balance)} buffer · ${fmt(d.performance.monthly_spending_aud)}/mo burn</div>
          </div>
          <div class="ef-headline">You have <b>${runway.toFixed(2)} months</b> of runway.</div>
          <div class="ef-sub">You're past 6 months — comfortably in the green zone. A 12-month buffer would be ${fmt((12 * d.performance.monthly_spending_aud) - d.accounts.find(a => a.name === 'Emergency Fund').balance)} more.</div>

          <div class="ef-scale-wrap" style="margin-top: 36px; padding-bottom: 4px">
            <div class="ef-scale">
              <div class="ef-pin-label" data-left="${pinPct}">${runway.toFixed(2)} mo</div>
              <div class="ef-pin" data-left="${pinPct}"></div>
            </div>
            <div class="ef-markers">
              <div class="ef-marker-tick" style="text-align:left">0 mo</div>
              <div class="ef-marker-tick" style="color:var(--red)">3 mo · risky</div>
              <div class="ef-marker-tick" style="color:var(--amber)">6 mo · ok</div>
              <div class="ef-marker-tick" style="color:var(--green);text-align:right">12 mo · solid</div>
            </div>
          </div>
        </div>
      </section>
    `;
  }

  // ----------- SPENDING COMPRESSED -----------
  function renderSpending(d) {
    const sp = d.monthly_spending;
    const total = sp.total;

    // Palette for spending segments — distinct from saver hues
    const SP_COLORS = ['#3b82f6', '#a855f7', '#06b6d4', '#22c55e', '#f59e0b', '#ec4899', '#ef4444', '#64748b'];

    const segs = sp.by_parent_category.map((c, i) => ({
      ...c,
      color: SP_COLORS[i % SP_COLORS.length],
      pct: (c.amount / total) * 100,
    }));

    return `
      <section>
        <div class="section-head">
          <div class="section-title">Spending — ${d._meta.month_label}</div>
          <div class="section-sub">${fmt(total)} across ${sp.by_parent_category.length} categories</div>
        </div>
        <div class="spending">
          <div class="sp-row">
            <div style="font-size:13px;color:var(--text-muted)">All categories</div>
            <div class="sp-total">${fmt(total)}</div>
          </div>
          <div class="sp-bar">
            ${segs.map(s => `
              <div class="sp-seg" style="background:${s.color}" data-w="${s.pct.toFixed(3)}"
                   title="${s.label}: ${fmt(s.amount)}"></div>
            `).join('')}
          </div>
          <div class="sp-legend">
            ${segs.map(s => `
              <div class="sp-leg">
                <span class="sp-swatch" style="background:${s.color}"></span>
                <span>${s.label} <b>${fmt(s.amount)}</b></span>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;
  }

  // ----------- MILESTONES TIMELINE -----------
  function renderMilestones(d) {
    const ms = d.milestones;
    const achievedCount = ms.filter(m => m.achieved).length;
    // Filled portion: hits exactly the last achieved point
    const filledPct = ((achievedCount - 1) / (ms.length - 1)) * 100;

    return `
      <section>
        <div class="section-head">
          <div class="section-title">Milestones</div>
          <div class="section-sub">${achievedCount} hit &nbsp;·&nbsp; next ${ms.find(m => !m.achieved).label.replace(' net worth','')} in ~${monthsBetween(d._meta.as_of, ms.find(m => !m.achieved).eta_date)} mo</div>
        </div>
        <div class="milestones">
          <div class="ms-line">
            <div class="ms-line-filled" data-w="${filledPct.toFixed(2)}"></div>
            <div class="ms-points">
              ${ms.map((m, i) => `
                <div class="ms-point ${m.achieved ? 'achieved' : (i === achievedCount ? 'next' : '')}">
                  <div class="ms-label">
                    <span class="ms-amt">${fmtMilestone(m.target)}</span>
                    <span class="ms-date">${m.achieved ? formatDate(m.hit_date) : '~' + formatDate(m.eta_date)}</span>
                  </div>
                  <div class="ms-foot-label">${m.achieved ? 'achieved' : (i === achievedCount ? 'next' : 'upcoming')}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </section>
    `;
  }

  // ----------- CASHFLOW SNAPSHOT -----------
  function renderCashflow(d) {
    const p = d.performance;
    const m = d.monthly_spending;
    return `
      <section style="margin-bottom: 0">
        <div class="section-head">
          <div class="section-title">May Cashflow</div>
          <div class="section-sub">Income − Spend = ${fmt(p.savings_aud)} saved</div>
        </div>
        <div class="cashflow">
          <div class="cf-cell">
            <div class="cf-label">Income</div>
            <div class="cf-val in">+${fmt(p.income_aud)}</div>
            <div class="cf-sub">Salary + cashback</div>
          </div>
          <div class="cf-cell">
            <div class="cf-label">Fixed</div>
            <div class="cf-val out">${fmt(m.fixed_aud)}</div>
            <div class="cf-sub">Rent · bills · subs</div>
          </div>
          <div class="cf-cell">
            <div class="cf-label">Discretionary</div>
            <div class="cf-val out">${fmt(m.discretionary_aud)}</div>
            <div class="cf-sub">${fmt(1400 - m.discretionary_aud)} under budget</div>
          </div>
          <div class="cf-cell">
            <div class="cf-label">Saved</div>
            <div class="cf-val in">${fmt(p.savings_aud)}</div>
            <div class="cf-sub">${p.savings_rate_pct.toFixed(0)}% of income</div>
          </div>
        </div>
      </section>
    `;
  }

  // ===================================================================
  // ANIMATION (runs after first paint)
  // ===================================================================
  function animateAll() {
    // 1. Bucket fills
    document.querySelectorAll('.bucket-fill').forEach((el) => {
      const targetH = parseFloat(el.dataset.targetH);
      const maxY = parseFloat(el.dataset.maxY);
      const newY = maxY - targetH;
      el.setAttribute('y', newY);
      el.setAttribute('height', targetH);
      el.style.transition = 'y 1.4s cubic-bezier(0.22, 1, 0.36, 1), height 1.4s cubic-bezier(0.22, 1, 0.36, 1)';
    });

    // 2. Bucket wave surfaces
    document.querySelectorAll('.bucket-wave-wrap').forEach((el) => {
      const targetY = parseFloat(el.dataset.targetY);
      const startY = parseFloat(el.dataset.startY);
      // We set the wave's "y position" by translating it
      el.style.transform = `translateY(${targetY}px)`;
    });

    // 3. Weekly round-up mini bars
    document.querySelectorAll('.wm-bar').forEach((el) => {
      const h = parseFloat(el.dataset.h);
      el.style.height = h + '%';
    });

    // 4. Emergency fund pin
    document.querySelectorAll('.ef-pin, .ef-pin-label').forEach((el) => {
      const left = parseFloat(el.dataset.left);
      el.style.left = left + '%';
    });

    // 5. Spending bar segments
    document.querySelectorAll('.sp-seg').forEach((el) => {
      const w = parseFloat(el.dataset.w);
      el.style.width = w + '%';
    });

    // 6. Milestones filled line
    document.querySelectorAll('.ms-line-filled').forEach((el) => {
      const w = parseFloat(el.dataset.w);
      el.style.width = w + '%';
    });
  }

  // ===================================================================
  // UTILITIES
  // ===================================================================
  function monthsFromNow(months, asOf) {
    const [y, m, dd] = asOf.split('-').map(Number);
    const d = new Date(Date.UTC(y, m - 1 + months, 1));
    return d;
  }
  function formatEta(d) {
    return d.toLocaleString('en-AU', { month: 'short', year: 'numeric', timeZone: 'UTC' });
  }
  function formatDate(s) {
    // s is "2026-08" or "2025-11"
    if (!s) return '';
    const [y, m] = s.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, 1)).toLocaleString('en-AU', { month: 'short', year: 'numeric', timeZone: 'UTC' });
  }
  function monthsBetween(asOf, eta) {
    if (!eta) return '?';
    const [ay, am] = asOf.split('-').map(Number);
    const [ey, em] = eta.split('-').map(Number);
    return (ey - ay) * 12 + (em - am);
  }
  function fmtMilestone(n) {
    if (n >= 1000000) return '$' + (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
    if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
    return '$' + n;
  }
})();
</script>
</body>
</html>
