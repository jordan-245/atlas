<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Finance — Save Up / Bleed Out (Variant B2)</title>
<style>
  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-alt: #1c2026;
    --border: #2a2f37;
    --text: #e6e8eb;
    --text-muted: #8b929d;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;

    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", "Menlo", Consolas, monospace;

    --radius: 14px;
    --radius-sm: 8px;

    /* Tints for top half (uplifting) vs bottom half (weighty) */
    --top-tint: rgba(34, 197, 94, 0.025);
    --bot-tint: rgba(245, 158, 11, 0.025);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: var(--text-muted); text-decoration: none; }
  a:hover { color: var(--text); }

  .wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ============ TOP NAV ============ */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 32px;
  }
  .top-title {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .top-title b { color: var(--text); font-weight: 600; letter-spacing: 0; text-transform: none; }
  .top-link { font-size: 13px; }

  /* ============ HEADLINE STRIP (3 cols: save / net / spend) ============ */
  .headline {
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    gap: 0;
    margin-bottom: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .h-cell {
    padding: 26px 30px;
    background: var(--surface);
    position: relative;
  }
  .h-cell + .h-cell { border-left: 1px solid var(--border); }
  .h-save {
    background: linear-gradient(180deg, rgba(34, 197, 94, 0.06), var(--surface) 80%);
  }
  .h-spend {
    background: linear-gradient(0deg, rgba(245, 158, 11, 0.06), var(--surface) 80%);
    text-align: right;
  }
  .h-net {
    text-align: center;
  }
  .h-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .h-spend .h-label { justify-content: flex-end; }
  .h-net .h-label { justify-content: center; }
  .h-arrow {
    font-size: 14px;
    line-height: 1;
  }
  .h-save .h-arrow { color: var(--green); }
  .h-spend .h-arrow { color: var(--amber); }
  .h-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .h-net .h-value {
    font-size: 38px;
    letter-spacing: -0.8px;
  }
  .h-save .h-value { color: var(--green); }
  .h-spend .h-value { color: var(--text); }
  .h-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .h-spend .h-sub b { font-family: var(--mono); }
  .h-pos { color: var(--green); font-weight: 500; }
  .h-neg { color: var(--red); font-weight: 500; }

  /* ============ THE MIRROR (hero) ============ */
  .mirror {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0;
    overflow: hidden;
    margin-bottom: 36px;
  }

  /* Top — savers filling UP */
  .mirror-top {
    background:
      linear-gradient(180deg, rgba(34, 197, 94, 0.04), transparent 60%),
      var(--surface);
    padding: 28px 32px 8px;
  }
  /* Bottom — buckets leaking OUT */
  .mirror-bot {
    background:
      linear-gradient(0deg, rgba(245, 158, 11, 0.05), transparent 70%),
      var(--surface);
    padding: 8px 32px 36px;
  }

  .mirror-row-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .mr-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
  .mr-title.up { color: var(--green); }
  .mr-title.dn { color: var(--amber); }
  .mr-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Four columns in each half */
  .pot-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
    margin-top: 18px;
  }
  @media (max-width: 1100px) { .pot-row { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px)  { .pot-row { grid-template-columns: 1fr; } }

  .pot-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    padding: 8px 4px 4px;
  }

  /* Rising +$ chip above filling buckets */
  .save-chip {
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.4);
    color: #86efac;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 14px;
    letter-spacing: -0.2px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .8s ease, transform .8s cubic-bezier(0.22, 1, 0.36, 1);
    transition-delay: 1.2s;
    white-space: nowrap;
  }
  .save-chip.in { opacity: 1; transform: translateY(0); }
  .save-chip::before {
    content: '↑ ';
    color: var(--green);
  }

  .pot-svg-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    min-height: 220px;
  }
  .pot-svg { width: 130px; height: 210px; display: block; }

  .pot-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.1px;
    text-align: center;
    margin-top: 4px;
  }
  .pot-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }
  .pot-meta b { color: var(--text); font-weight: 600; }
  .pot-pct {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .pot-pct b { color: var(--hue, var(--green)); font-weight: 600; }

  /* Bottom pot variants */
  .leak-cell .pot-name { color: var(--text); }
  .leak-meta-row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 160px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .leak-meta-row b { color: var(--text); font-weight: 600; }
  .leak-status {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 3px 8px;
    border-radius: 10px;
    margin-top: 6px;
    font-weight: 600;
  }
  .leak-status.ok      { color: var(--green); background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.3); }
  .leak-status.warn    { color: var(--amber); background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); }
  .leak-status.over    { color: var(--red);   background: rgba(239,68,68,0.10);  border: 1px solid rgba(239,68,68,0.4); }

  /* ============ MIRROR AXIS (centre divider) ============ */
  .axis {
    position: relative;
    height: 56px;
    margin: 6px 0;
    background:
      linear-gradient(180deg, transparent 49%, rgba(34, 197, 94, 0.45) 49.5%, rgba(245, 158, 11, 0.45) 50.5%, transparent 51%),
      linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.02) 30%, rgba(255,255,255,0.02) 70%, transparent 100%);
  }
  .axis::before, .axis::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 7%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border));
  }
  .axis::before { left: 0; }
  .axis::after  { right: 0; transform: scaleX(-1); }
  .axis-pill {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 10px 22px;
    display: flex;
    align-items: center;
    gap: 18px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    z-index: 2;
  }
  .axis-month {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-muted);
    border-right: 1px solid var(--border);
    padding-right: 18px;
  }
  .axis-net {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 17px;
    color: var(--green);
    letter-spacing: -0.4px;
  }
  .axis-net-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-right: 6px;
  }

  /* ============ TWIN COMMENTARY ============ */
  .commentary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    margin-bottom: 36px;
  }
  @media (max-width: 900px) { .commentary { grid-template-columns: 1fr; } }
  .cm-panel {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px 28px;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .cm-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0.7;
  }
  .cm-save::before { background: var(--green); }
  .cm-leak::before { background: var(--amber); }
  .cm-save {
    background: linear-gradient(180deg, rgba(34, 197, 94, 0.04), var(--surface) 70%);
  }
  .cm-leak {
    background: linear-gradient(180deg, rgba(245, 158, 11, 0.04), var(--surface) 70%);
  }
  .cm-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
  }
  .cm-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
  }
  .cm-save .cm-title { color: var(--green); }
  .cm-leak .cm-title { color: var(--amber); }
  .cm-sub {
    font-size: 11px;
    color: var(--text-muted);
  }
  .cm-list {
    display: flex;
    flex-direction: column;
  }
  .cm-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 13px;
  }
  .cm-row:last-of-type { border-bottom: none; }
  .cm-row-name { color: var(--text); }
  .cm-row-meta {
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 2px;
  }
  .cm-row-amt {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
    text-align: right;
  }
  .cm-save .cm-row-amt { color: var(--green); }
  .cm-leak .cm-row-amt { color: var(--text); }
  .cm-row-delta {
    font-family: var(--mono);
    font-size: 11px;
    text-align: right;
    color: var(--text-muted);
    min-width: 50px;
  }
  .cm-row-delta.up { color: var(--red); }
  .cm-row-delta.down { color: var(--green); }
  .cm-total {
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .cm-total-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }
  .cm-total-amt {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .cm-save .cm-total-amt { color: var(--green); }
  .cm-leak .cm-total-amt { color: var(--amber); }

  /* Bleed sparkline */
  .bleed-spark { width: 56px; height: 18px; display: block; }

  /* ============ FORECAST SENTENCE ============ */
  .forecast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 32px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .forecast-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(245, 158, 11, 0.15));
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .forecast-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    letter-spacing: -0.1px;
  }
  .forecast-text b { font-weight: 600; }
  .fc-save { color: var(--green); }
  .fc-leak { color: var(--red); }
  .fc-mono { font-family: var(--mono); font-weight: 600; }

  /* ============ RECURRING DRAIN ============ */
  .drain {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 28px 24px;
  }
  .drain-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .drain-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .drain-sub {
    font-size: 12px;
    color: var(--text-muted);
  }
  .drain-sub b { color: var(--text); font-family: var(--mono); font-weight: 600; }
  .drain-row {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-top: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .drain-item {
    flex: 1;
    min-width: 78px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 4px;
    border-radius: var(--radius-sm);
    transition: background 0.18s ease;
  }
  .drain-item:hover { background: rgba(255,255,255,0.02); }
  .drain-droplet { width: 36px; height: 56px; display: block; }
  .drain-merch {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
    text-align: center;
    max-width: 80px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .drain-amt {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    margin-top: 2px;
  }
  .drain-freq {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 2px;
  }
  .drain-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .drain-foot b {
    color: var(--text);
    font-family: var(--mono);
    font-weight: 600;
  }

  /* ============ LOADING ============ */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-left: 8px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Wave on top half */
  @keyframes wave-shift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-40px); }
  }

  /* Drip falling animation on bottom half */
  @keyframes drip-fall {
    0%   { transform: translateY(0);   opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(22px); opacity: 0; }
  }

  /* Subtle pulsing puddle */
  @keyframes puddle-pulse {
    0%, 100% { opacity: 0.85; transform: scaleX(1); }
    50%      { opacity: 1;    transform: scaleX(1.04); }
  }

  .drip-anim {
    animation: drip-fall 2.6s cubic-bezier(0.55, 0.06, 0.68, 0.19) infinite;
    transform-origin: center top;
  }
  .drip-anim.d2 { animation-delay: 0.9s; }
  .drip-anim.d3 { animation-delay: 1.7s; }
  .puddle-anim {
    animation: puddle-pulse 3.6s ease-in-out infinite;
    transform-origin: center center;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="top-title"><b>Atlas Finance</b> &nbsp;·&nbsp; Variant B2 — Save Up / Bleed Out</div>
    <a class="top-link" href="../">← all variants</a>
  </div>

  <div id="app">
    <div class="loading">Loading</div>
  </div>

</div>

<script>
(async function () {
  const app = document.getElementById('app');

  let data;
  try {
    const res = await fetch('../shared/mock-finance.json');
    data = await res.json();
  } catch (err) {
    app.innerHTML = '<div class="loading" style="color:var(--red)">Failed to load data: ' + err + '</div>';
    return;
  }

  // ===================================================================
  // helpers
  // ===================================================================
  const fmt   = (n) => '$' + Math.round(n).toLocaleString('en-AU');
  const fmt2  = (n) => '$' + n.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const signed = (n) => (n >= 0 ? '+' : '−') + fmt(Math.abs(n));
  const pctStr = (n) => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';

  // Saver palettes (top half) — green-leaning per goal
  const SAVER_HUES = {
    'Emergency Fund': { main: '#22c55e', light: '#86efac' },
    'House Deposit':  { main: '#3b82f6', light: '#93c5fd' },
    'Tax Set Aside':  { main: '#10b981', light: '#6ee7b7' },
    'Bali 2026':      { main: '#14b8a6', light: '#5eead4' },
  };

  // ===================================================================
  // Build the four "leaky" buckets shown on the bottom half.
  //
  // Buckets 1-3 are spending accounts with `limit` fields.
  // Bucket 4 is a fabricated "Good Life" overspend bucket — sourced
  // from category_trends[0] (the +17.7% Good Life trend), with the
  // "limit" being typical/last-month spend, to demonstrate overflow.
  // ===================================================================
  function buildLeakBuckets(d) {
    const acctSpending = d.accounts.find(a => a.name === 'Spending');
    const acctBills    = d.accounts.find(a => a.name === 'Bills');
    const acct2Up      = d.accounts.find(a => a.name === '2Up Joint');

    // Good Life as overspend bucket: this_month 812.45 vs typical 690.20
    const goodLife = d.insights.category_trends.find(c => c.category === 'good-life');

    // For account buckets, "spent" = balance, "limit" = monthly limit. (mock-finance
    // models these account balances as month-to-date spend.)
    return [
      {
        name: 'Spending',
        sub: 'Personal · individual',
        spent: acctSpending.balance,
        limit: acctSpending.limit,
        ownership: 'INDIVIDUAL',
      },
      {
        name: 'Bills',
        sub: 'Rent + utilities + subs',
        spent: acctBills.balance,
        limit: acctBills.limit,
        ownership: 'INDIVIDUAL',
      },
      {
        name: '2Up Joint',
        sub: 'Shared w/ partner',
        spent: acct2Up.balance,
        limit: acct2Up.limit,
        ownership: 'JOINT',
      },
      {
        // Fabricated leaky bucket — the overspend story.
        name: 'Good Life',
        sub: '+17.7% vs typical',
        spent: goodLife.this_month,
        limit: goodLife.last_month, // 690.20 — treat as the "normal envelope"
        ownership: 'CATEGORY',
        overspend: true,
      },
    ];
  }

  // ===================================================================
  // RENDER
  // ===================================================================
  app.innerHTML = renderApp(data);
  requestAnimationFrame(() => requestAnimationFrame(animateAll));

  function renderApp(d) {
    return [
      renderHeadline(d),
      renderMirror(d),
      renderCommentary(d),
      renderForecast(d),
      renderDrain(d),
    ].join('\n');
  }

  // -------------------------------------------------------------------
  // HEADLINE STRIP — save (left) / net worth (centre) / spend (right)
  // -------------------------------------------------------------------
  function renderHeadline(d) {
    const p  = d.performance;
    const nw = d.net_worth;
    const ins = d.insights;
    const projected = ins.projected_total;
    const budget = ins.discretionary.budget + ins.discretionary.fixed_spend; // 1400 + 2960 = 4360
    const projDiff = projected - 5575.32; // soft total-budget reference
    // Cleaner: compare projected vs total_monthly_budget (8000)
    const projVsBudget = projected - ins.total_monthly_budget;
    const projUnder = projVsBudget < 0;

    return `
      <div class="headline">
        <div class="h-cell h-save">
          <div class="h-label"><span class="h-arrow">↑</span> Saving</div>
          <div class="h-value">${fmt(p.savings_aud)}</div>
          <div class="h-sub">
            <span class="h-pos">${p.savings_rate_pct.toFixed(0)}% rate</span>
            &nbsp;·&nbsp; ${fmt2(d.round_ups.month_total_aud)} round-ups
          </div>
        </div>

        <div class="h-cell h-net">
          <div class="h-label">Net worth</div>
          <div class="h-value">${fmt(nw.total_aud)}</div>
          <div class="h-sub">
            <span class="h-pos">▲ ${fmt(nw.total_aud - nw.history_6mo[4].total_aud)}</span>
            this month
          </div>
        </div>

        <div class="h-cell h-spend">
          <div class="h-label">Spending <span class="h-arrow">↓</span></div>
          <div class="h-value">${fmt(p.monthly_spending_aud)}</div>
          <div class="h-sub">
            On pace for <b>${fmt(projected)}</b> &nbsp;·&nbsp;
            <span class="${projUnder ? 'h-pos' : 'h-neg'}">${projUnder ? '▼' : '▲'} ${fmt(Math.abs(projVsBudget))} ${projUnder ? 'under' : 'over'} budget</span>
          </div>
        </div>
      </div>
    `;
  }

  // -------------------------------------------------------------------
  // MIRROR — top: filling savers / axis / bottom: leaky buckets
  // -------------------------------------------------------------------
  function renderMirror(d) {
    const savers = d.savings_goals;
    const totalSaved = savers.reduce((s, g) => s + g.current, 0);
    const targetSum  = savers.reduce((s, g) => s + g.target, 0);
    const monthlyContrib = savers.reduce((s, g) => s + g.monthly_contrib, 0);

    const leaks = buildLeakBuckets(d);
    const leakTotal = leaks.reduce((s, b) => s + b.spent, 0);

    return `
      <div class="mirror">

        <div class="mirror-top">
          <div class="mirror-row-head">
            <div class="mr-title up">↑ Saving up</div>
            <div class="mr-sub">${fmt(totalSaved)} across ${savers.length} pots &nbsp;·&nbsp; +${fmt(monthlyContrib)}/mo flowing in</div>
          </div>

          <div class="pot-row">
            ${savers.map(g => renderSaverPot(g, d)).join('')}
          </div>
        </div>

        <div class="axis">
          <div class="axis-pill">
            <div class="axis-month">${d._meta.month_label.replace(' ', ' · ').toUpperCase()}</div>
            <div>
              <span class="axis-net-label">Net</span>
              <span class="axis-net">${signed(d.performance.savings_aud)}</span>
            </div>
          </div>
        </div>

        <div class="mirror-bot">
          <div class="mirror-row-head">
            <div class="mr-title dn">↓ Bleeding out</div>
            <div class="mr-sub">${fmt(leakTotal)} drained across 3 accounts + 1 hot category</div>
          </div>

          <div class="pot-row">
            ${leaks.map(b => renderLeakBucket(b)).join('')}
          </div>
        </div>

      </div>
    `;
  }

  // -------------------------------------------------------------------
  // Saver pot (top half) — fills upward.
  // Reuses the technique from Variant B but with the visual emphasis
  // on the rising fluid + a green "+$X this month" chip floating above.
  // -------------------------------------------------------------------
  function renderSaverPot(g, d) {
    const hue = SAVER_HUES[g.name] || { main: '#22c55e', light: '#86efac' };
    const idSafe = g.name.replace(/[^A-Za-z0-9]+/g, '-');
    const isRoundupDest = d.round_ups.destination_saver === g.name;
    const monthlyIn = g.monthly_contrib + (isRoundupDest ? d.round_ups.month_total_aud : 0);

    return `
      <div class="pot-cell" style="--hue:${hue.main}">
        <div class="save-chip">+${fmt(monthlyIn)} this month</div>

        <div class="pot-svg-wrap">
          ${saverSvg(g.pct, hue, idSafe)}
        </div>

        <div class="pot-name">${g.name}</div>
        <div class="pot-meta"><b>${fmt(g.current)}</b> / ${fmt(g.target)}</div>
        <div class="pot-pct"><b>${g.pct.toFixed(1)}%</b> filled &nbsp;·&nbsp; ${g.eta_months} mo to full</div>
      </div>
    `;
  }

  function saverSvg(pct, hue, id) {
    const W = 130, H = 200;
    // Pot inner rect
    const padX = 12;
    const topY = 14;
    const botY = H - 8;
    const innerW = W - padX * 2;
    const innerH = botY - topY;
    const fillH = (Math.min(100, Math.max(0, pct)) / 100) * innerH;
    const fillY = botY - fillH;
    const clipId = `cs-${id}`;
    const gradId = `gs-${id}`;
    const lipGradId = `gl-${id}`;

    return `
      <svg class="pot-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="${clipId}">
            <rect x="${padX}" y="${topY}" width="${innerW}" height="${innerH}" rx="6" ry="6"/>
          </clipPath>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${hue.main}" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="${hue.main}" stop-opacity="0.55"/>
          </linearGradient>
          <linearGradient id="${lipGradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="rgba(255,255,255,0.06)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
        </defs>

        <!-- Tick marks (left) -->
        <g stroke="#3a414b" stroke-width="1" opacity="0.6">
          <line x1="${padX - 5}" y1="${topY}" x2="${padX - 1}" y2="${topY}"/>
          <line x1="${padX - 4}" y1="${topY + innerH * 0.25}" x2="${padX - 1}" y2="${topY + innerH * 0.25}"/>
          <line x1="${padX - 5}" y1="${topY + innerH * 0.5}"  x2="${padX - 1}" y2="${topY + innerH * 0.5}"/>
          <line x1="${padX - 4}" y1="${topY + innerH * 0.75}" x2="${padX - 1}" y2="${topY + innerH * 0.75}"/>
          <line x1="${padX - 5}" y1="${topY + innerH}"        x2="${padX - 1}" y2="${topY + innerH}"/>
        </g>
        <text x="${padX - 7}" y="${topY + 3}" text-anchor="end" font-size="7"
              font-family="var(--mono)" fill="#6b727c">100%</text>
        <text x="${padX - 7}" y="${topY + innerH * 0.5 + 3}" text-anchor="end" font-size="7"
              font-family="var(--mono)" fill="#6b727c">50%</text>
        <text x="${padX - 7}" y="${topY + innerH + 3}" text-anchor="end" font-size="7"
              font-family="var(--mono)" fill="#6b727c">0%</text>

        <!-- Pot outline -->
        <rect x="${padX}" y="${topY}" width="${innerW}" height="${innerH}"
              rx="8" ry="8" fill="#0e1115" stroke="#3a414b" stroke-width="1.5"/>

        <!-- Inner gloss -->
        <rect x="${padX + 4}" y="${topY + 6}" width="3" height="${innerH - 12}"
              rx="1.5" fill="rgba(255,255,255,0.04)"/>

        <!-- Liquid (clipped) -->
        <g clip-path="url(#${clipId})">
          <rect class="pot-fill"
                data-target-y="${fillY.toFixed(2)}"
                data-target-h="${fillH.toFixed(2)}"
                data-rest-y="${botY}"
                x="${padX}" y="${botY}" width="${innerW}" height="0"
                fill="url(#${gradId})"/>

          <!-- Wave surface -->
          <g class="pot-wave"
             data-target-y="${(fillY).toFixed(2)}"
             data-rest-y="${botY}"
             style="transform: translateY(0); transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1)">
            <path d="
              M ${padX - 10} 0
              Q ${padX + 6} -5, ${padX + 22} 0
              T ${padX + 52} 0
              T ${padX + 82} 0
              T ${padX + 112} 0
              T ${padX + 142} 0
              L ${padX + 142} 8
              L ${padX - 10} 8 Z"
              fill="${hue.main}" opacity="0.85"
              style="animation: wave-shift 4s linear infinite"/>
            <path d="
              M ${padX - 30} 4
              Q ${padX - 14} -1, ${padX + 2} 4
              T ${padX + 32} 4
              T ${padX + 62} 4
              T ${padX + 92} 4
              T ${padX + 122} 4
              L ${padX + 122} 12
              L ${padX - 30} 12 Z"
              fill="${hue.light}" opacity="0.35"
              style="animation: wave-shift 3s linear infinite reverse"/>
          </g>
        </g>

        <!-- Goal-line marker at the top -->
        <line x1="${padX - 4}" y1="${topY}" x2="${padX + innerW + 4}" y2="${topY}"
              stroke="${hue.main}" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
      </svg>
    `;
  }

  // -------------------------------------------------------------------
  // Leak bucket (bottom half) — inverted funnel, drips out the spout.
  // Three states:
  //   - "ok"   (< 90% of limit): clean drips
  //   - "warn" (90-100%):        side drips appear
  //   - "over" (> 100%):         red puddle pools below
  // -------------------------------------------------------------------
  function renderLeakBucket(b) {
    const pct = (b.spent / b.limit) * 100;
    let state = 'ok';
    if (pct >= 90 && pct <= 100) state = 'warn';
    if (pct > 100) state = 'over';
    if (b.overspend) state = 'over'; // explicit override

    const id = b.name.replace(/[^A-Za-z0-9]+/g, '-');
    const overAmt = b.spent - b.limit;
    const remainingAmt = b.limit - b.spent;

    let statusText = '';
    if (state === 'ok')   statusText = `${fmt(remainingAmt)} left`;
    if (state === 'warn') statusText = `${fmt(remainingAmt)} left · tight`;
    if (state === 'over') statusText = `${fmt(Math.abs(overAmt))} OVER`;

    const ownTag = b.ownership === 'JOINT' ? '· 2Up' : '';

    return `
      <div class="pot-cell leak-cell">
        <div class="pot-svg-wrap">
          ${leakSvg(b.spent, b.limit, state, id)}
        </div>
        <div class="pot-name">${b.name} ${ownTag ? `<span style="color:var(--text-muted);font-weight:400;font-size:12px">${ownTag}</span>` : ''}</div>
        <div class="pot-meta"><b>${fmt(b.spent)}</b> of ${fmt(b.limit)}</div>
        <div class="leak-meta-row">
          <span>${b.sub}</span>
          <b>${pct.toFixed(0)}%</b>
        </div>
        <span class="leak-status ${state}">${statusText}</span>
      </div>
    `;
  }

  /*
   * Leak SVG: an inverted-trapezoid funnel.
   *
   *      top wide ─────────────
   *               \         /
   *                \       /
   *                 \     /
   *                  \___/   <- narrow spout (drips out the bottom)
   *
   * Liquid fill level drops from top as % approaches/exceeds limit.
   * Drips fall from the spout. Over-budget => red puddle below.
   */
  function leakSvg(spent, limit, state, id) {
    const W = 130, H = 210;
    // Trapezoid geometry
    const topY = 14;
    const wideTop = 110;   // top width
    const narrowBot = 38;  // bottom (spout) width
    const trapH = 130;     // height of trapezoid
    const spoutY = topY + trapH;
    const cx = W / 2;
    const topL = cx - wideTop / 2;
    const topR = cx + wideTop / 2;
    const botL = cx - narrowBot / 2;
    const botR = cx + narrowBot / 2;

    // Spout extension below trapezoid
    const spoutH = 14;
    const spoutBotY = spoutY + spoutH;
    const spoutL = cx - narrowBot / 2;
    const spoutR = cx + narrowBot / 2;

    // Fill level: 0% = full to top, 100% = drained to spout.
    // We invert so "amount spent" reads as "amount drained out".
    // Visual liquid fill represents what's LEFT in the bucket vs limit.
    const pct = (spent / limit) * 100;
    const leftPct = Math.max(0, 100 - pct); // % remaining
    // When over budget, the liquid stays at zero (drained) and overflows.

    // Compute fill polygon. We fill from bottom-of-trapezoid upward to a
    // horizontal line at fillY. The fillY position interpolates between
    // spoutY (empty) and topY (full).
    const fillY = spoutY - (leftPct / 100) * trapH;

    // For trap shape, x extents at any y between topY and spoutY:
    //   t = (y - topY) / trapH
    //   leftX  = topL + t*(botL - topL)
    //   rightX = topR + t*(botR - topR)
    const xAtY = (y) => {
      const t = (y - topY) / trapH;
      return [
        topL + t * (botL - topL),
        topR + t * (botR - topR),
      ];
    };

    // Liquid polygon path
    let fillPath = '';
    if (leftPct > 0.5) {
      const [fLx, fRx] = xAtY(fillY);
      fillPath = `
        M ${fLx.toFixed(2)} ${fillY.toFixed(2)}
        L ${fRx.toFixed(2)} ${fillY.toFixed(2)}
        L ${botR} ${spoutY}
        L ${botL} ${spoutY} Z
      `;
    }

    // Colours per state
    const hue = state === 'over' ? '#ef4444' : '#f59e0b';
    const hueLight = state === 'over' ? '#fca5a5' : '#fcd34d';
    const gradId = `gl-${id}`;
    const clipId = `cl-${id}`;

    // Drips falling from spout
    const dripsHtml = state === 'over'
      ? ''  // overflowing — drips replaced by stream + puddle
      : `
        <circle class="drip-anim"    cx="${cx}"     cy="${spoutBotY + 4}" r="2.4" fill="${hue}" opacity="0.9"/>
        <circle class="drip-anim d2" cx="${cx - 3}" cy="${spoutBotY + 4}" r="1.6" fill="${hue}" opacity="0.7"/>
        <circle class="drip-anim d3" cx="${cx + 3}" cy="${spoutBotY + 4}" r="1.6" fill="${hue}" opacity="0.7"/>
      `;

    // Side leaks (warn state) — small drips out the slanted walls
    let sideLeaks = '';
    if (state === 'warn' || state === 'over') {
      // Pick a y partway down the wall
      const ly = topY + trapH * 0.55;
      const [lx, rx] = xAtY(ly);
      sideLeaks = `
        <circle class="drip-anim d2" cx="${(lx - 3).toFixed(1)}" cy="${(ly + 8).toFixed(1)}" r="1.6" fill="${hue}" opacity="0.7"/>
        <circle class="drip-anim d3" cx="${(rx + 3).toFixed(1)}" cy="${(ly + 8).toFixed(1)}" r="1.6" fill="${hue}" opacity="0.7"/>
      `;
    }

    // Red puddle for overflow
    const puddleY = H - 10;
    let puddleHtml = '';
    if (state === 'over') {
      puddleHtml = `
        <!-- Stream from spout to puddle -->
        <rect x="${(cx - 2).toFixed(1)}" y="${spoutBotY}" width="4" height="${(puddleY - spoutBotY - 4).toFixed(1)}"
              fill="${hue}" opacity="0.7"/>
        <!-- Puddle ellipse, drawn under the bucket -->
        <ellipse class="puddle-anim" cx="${cx}" cy="${puddleY}" rx="46" ry="6"
                 fill="${hue}" opacity="0.85"/>
        <ellipse cx="${cx}" cy="${puddleY - 1}" rx="38" ry="4"
                 fill="${hueLight}" opacity="0.65"/>
        <ellipse cx="${cx - 26}" cy="${puddleY + 1}" rx="4" ry="1.5" fill="${hue}" opacity="0.7"/>
        <ellipse cx="${cx + 30}" cy="${puddleY + 2}" rx="3" ry="1.2" fill="${hue}" opacity="0.6"/>
      `;
    }

    return `
      <svg class="pot-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="${clipId}">
            <path d="
              M ${topL} ${topY}
              L ${topR} ${topY}
              L ${botR} ${spoutY}
              L ${botL} ${spoutY} Z"/>
          </clipPath>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${hue}" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="${hue}" stop-opacity="0.5"/>
          </linearGradient>
        </defs>

        <!-- Tick marks on right side -->
        <g stroke="#3a414b" stroke-width="1" opacity="0.5">
          <line x1="${topR + 1}" y1="${topY}"           x2="${topR + 5}" y2="${topY}"/>
          <line x1="${topR + 1}" y1="${topY + trapH * 0.5}" x2="${topR + 5}" y2="${topY + trapH * 0.5}"/>
          <line x1="${botR + 1}" y1="${spoutY}"         x2="${botR + 5}" y2="${spoutY}"/>
        </g>
        <text x="${topR + 7}" y="${topY + 3}" font-size="7"
              font-family="var(--mono)" fill="#6b727c">full</text>
        <text x="${botR + 7}" y="${spoutY + 3}" font-size="7"
              font-family="var(--mono)" fill="#6b727c">empty</text>

        <!-- Funnel outline (trapezoid + spout) -->
        <path d="
          M ${topL} ${topY}
          L ${topR} ${topY}
          L ${botR} ${spoutY}
          L ${spoutR} ${spoutY}
          L ${spoutR} ${spoutBotY}
          L ${spoutL} ${spoutBotY}
          L ${spoutL} ${spoutY}
          L ${botL} ${spoutY} Z"
          fill="#0e1115" stroke="#3a414b" stroke-width="1.5"
          stroke-linejoin="round"/>

        <!-- Liquid fill, clipped to inside of trapezoid -->
        <g clip-path="url(#${clipId})">
          <path class="leak-fill"
                d="${fillPath}"
                fill="url(#${gradId})"
                opacity="${leftPct > 0.5 ? 1 : 0}"/>

          <!-- A faint wave surface line at the fill level -->
          ${leftPct > 4 ? `
            <line x1="${xAtY(fillY)[0].toFixed(1)}" y1="${fillY.toFixed(1)}"
                  x2="${xAtY(fillY)[1].toFixed(1)}" y2="${fillY.toFixed(1)}"
                  stroke="${hueLight}" stroke-width="1.2" opacity="0.7"/>
          ` : ''}
        </g>

        <!-- Inner shadow detail on slanted walls -->
        <line x1="${topL + 1}" y1="${topY + 1}" x2="${botL + 1}" y2="${spoutY}"
              stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

        <!-- Spout drips & side leaks -->
        ${dripsHtml}
        ${sideLeaks}

        <!-- Over-budget puddle -->
        ${puddleHtml}
      </svg>
    `;
  }

  // -------------------------------------------------------------------
  // COMMENTARY — twin panels under the mirror.
  //   Left:  "What you saved" (savings contributions + round-ups + cashback)
  //   Right: "What leaked"   (category_trends sorted by change_pct desc)
  // -------------------------------------------------------------------
  function renderCommentary(d) {
    const savers = d.savings_goals;
    const ru = d.round_ups.month_total_aud;
    const cb = d.cashback.month_total_aud;
    const contribSum = savers.reduce((s, g) => s + g.monthly_contrib, 0);
    const saveTotal = contribSum + ru + cb; // = 3450 + 47.83 + 14.20 = 3512.03
    // performance.savings_aud is 4239.68 — the difference is interest/extra; we just
    // display the line total for tidy alignment, then note performance.savings_aud
    // as the "actually banked" reconciliation.

    const trends = [...d.insights.category_trends]
      .sort((a, b) => b.change_pct - a.change_pct);

    return `
      <div class="commentary">

        <div class="cm-panel cm-save">
          <div class="cm-head">
            <div class="cm-title">↑ What you saved</div>
            <div class="cm-sub">May contributions, round-ups & cashback</div>
          </div>
          <div class="cm-list">
            ${savers.map(g => `
              <div class="cm-row">
                <div>
                  <div class="cm-row-name">${g.name}</div>
                  <div class="cm-row-meta">${g.priority} priority · ${g.eta_months} mo to goal</div>
                </div>
                <div class="cm-row-amt">+${fmt(g.monthly_contrib)}</div>
                <div class="cm-row-delta down">/mo</div>
              </div>
            `).join('')}
            <div class="cm-row">
              <div>
                <div class="cm-row-name">Round-ups</div>
                <div class="cm-row-meta">${d.round_ups.month_count} txns · ${d.round_ups.boost_active_multiplier}× boost → House Deposit</div>
              </div>
              <div class="cm-row-amt">+${fmt2(ru)}</div>
              <div class="cm-row-delta down">↻</div>
            </div>
            <div class="cm-row">
              <div>
                <div class="cm-row-name">Cashback</div>
                <div class="cm-row-meta">${d.cashback.count} merchants · YTD ${fmt2(d.cashback.ytd_aud)}</div>
              </div>
              <div class="cm-row-amt">+${fmt2(cb)}</div>
              <div class="cm-row-delta down">★</div>
            </div>
          </div>
          <div class="cm-total">
            <div class="cm-total-label">Banked this month</div>
            <div class="cm-total-amt">${fmt(d.performance.savings_aud)}</div>
          </div>
        </div>

        <div class="cm-panel cm-leak">
          <div class="cm-head">
            <div class="cm-title">↓ What leaked</div>
            <div class="cm-sub">Category trend vs last month</div>
          </div>
          <div class="cm-list">
            ${trends.map(t => {
              const dir = t.change_pct >= 0 ? 'up' : 'down';
              const arrow = t.change_pct >= 0 ? '▲' : '▼';
              const cls = t.change_pct >= 0 ? 'up' : 'down';
              return `
                <div class="cm-row">
                  <div>
                    <div class="cm-row-name">${t.label}</div>
                    <div class="cm-row-meta">vs ${fmt(t.last_month)} last month</div>
                  </div>
                  <div class="cm-row-amt">${fmt(t.this_month)}</div>
                  <div class="cm-row-delta ${cls}">
                    ${arrow} ${Math.abs(t.change_pct).toFixed(1)}%
                    ${bleedSpark(t.last_month, t.this_month, dir)}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="cm-total">
            <div class="cm-total-label">Variable spend</div>
            <div class="cm-total-amt">${fmt(d.monthly_spending.variable_aud)}</div>
          </div>
        </div>

      </div>
    `;
  }

  // Tiny "bleed" sparkline — last_month → this_month, colour by direction.
  function bleedSpark(last, current, dir) {
    const W = 56, H = 18;
    const maxV = Math.max(last, current);
    const minV = 0;
    const y = (v) => H - 3 - ((v - minV) / (maxV - minV)) * (H - 6);
    const color = dir === 'up' ? '#ef4444' : '#22c55e';
    return `
      <svg class="bleed-spark" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-left:6px">
        <polyline points="2,${y(last).toFixed(1)} ${W - 2},${y(current).toFixed(1)}"
                  fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="2" cy="${y(last).toFixed(1)}" r="1.6" fill="${color}" opacity="0.6"/>
        <circle cx="${W - 2}" cy="${y(current).toFixed(1)}" r="2" fill="${color}"/>
      </svg>
    `;
  }

  // -------------------------------------------------------------------
  // FORECAST — editorial sentence linking overspend → saver delay.
  // Heuristic: if Good Life is +X% over typical, "extra outflow" =
  //   (this_month - last_month). That outflow, if redirected to the
  //   round-up destination saver (House Deposit), would shave
  //   (extra / monthly_contrib) months off the ETA.
  //
  // We round the delay shift to a quarter-month and present it in weeks.
  // -------------------------------------------------------------------
  function renderForecast(d) {
    const goodLife = d.insights.category_trends.find(c => c.category === 'good-life');
    const extraOutflow = goodLife.this_month - goodLife.last_month; // ~122
    const dest = d.savings_goals.find(g => g.name === d.round_ups.destination_saver);
    // How many months sooner does the dest saver complete if we redirect that overspend?
    const monthsSaved = extraOutflow / dest.monthly_contrib; // ~0.08 mo
    // Make it more dramatic — assume the overspend persists for the remaining ETA
    // and compounds. Over the next 12 months that's extraOutflow × 12 = ~1467.
    const annualExtra = extraOutflow * 12;
    const monthsSavedAnnual = annualExtra / dest.monthly_contrib; // ~0.98
    // Convert to weeks (4.33 wks/mo).
    const weeksSooner = Math.round(monthsSavedAnnual * 4.33);

    return `
      <div class="forecast">
        <div class="forecast-icon">≈</div>
        <div class="forecast-text">
          On current pace you'll save <b class="fc-save fc-mono">${signed(d.performance.savings_aud)}</b> this month —
          but <b>Good Life</b> is leaking <b class="fc-leak">${pctStr(goodLife.change_pct)}</b> faster than usual
          (an extra <b class="fc-mono">${fmt(extraOutflow)}</b> out the spout).
          Plug that leak and <b>${dest.name}</b> fills <b class="fc-save">${weeksSooner} weeks</b> sooner.
        </div>
      </div>
    `;
  }

  // -------------------------------------------------------------------
  // RECURRING DRAIN — small inverted droplets, one per recurring expense.
  // -------------------------------------------------------------------
  function renderDrain(d) {
    const rec = d.insights.recurring;
    const totalMonthly = rec.reduce((s, r) => s + r.est_monthly, 0);
    const totalAnnual  = totalMonthly * 12;
    const maxAmt = Math.max(...rec.map(r => r.est_monthly));

    return `
      <div class="drain">
        <div class="drain-head">
          <div class="drain-title">↓ Recurring drain</div>
          <div class="drain-sub"><b>${fmt(totalMonthly)}/mo</b> leaves regardless · est. <b>${fmt(totalAnnual)}/yr</b></div>
        </div>
        <div class="drain-row">
          ${rec.map(r => {
            // Droplet height scales by amount
            const t = Math.max(0.25, r.est_monthly / maxAmt); // 0.25..1
            const dh = 18 + t * 38; // 18..56px droplet body
            return `
              <div class="drain-item" title="${r.merchant} · ${r.frequency} · ${fmt2(r.est_monthly)}/mo">
                ${dropletSvg(t, dh)}
                <div class="drain-merch">${r.merchant.replace(/—.*$/, '').trim()}</div>
                <div class="drain-amt">${fmt(r.est_monthly)}</div>
                <div class="drain-freq">${r.frequency}</div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="drain-foot">
          <span>${rec.length} recurring commitments</span>
          <span>Largest: <b>${rec[0].merchant.replace(/—.*$/, '').trim()}</b> at <b>${fmt(rec[0].est_monthly)}/mo</b></span>
        </div>
      </div>
    `;
  }

  // Inverted droplet — narrow at top, fat at bottom (mirrors a teardrop)
  // Used as a tiny visual cataloguing motif in the recurring panel.
  function dropletSvg(t, h) {
    const W = 36;
    const H = 56;
    const cx = W / 2;
    const topY = (H - h);
    const botY = H - 4;
    // Path: pointed at top, rounded at bottom
    const w = 9 + t * 5; // body half-width
    const d = `
      M ${cx} ${topY}
      C ${cx - w} ${topY + (botY - topY) * 0.35}, ${cx - w} ${botY - 6}, ${cx} ${botY}
      C ${cx + w} ${botY - 6}, ${cx + w} ${topY + (botY - topY) * 0.35}, ${cx} ${topY} Z
    `;
    // Colour mix: amber for monthly, slightly desaturated for quarterly
    const fill = '#f59e0b';
    return `
      <svg class="drain-droplet" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${fill}" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="${fill}" stop-opacity="0.9"/>
          </linearGradient>
        </defs>
        <path d="${d}" fill="url(#dg)" stroke="${fill}" stroke-width="0.8" opacity="0.95"/>
        <!-- Subtle highlight -->
        <ellipse cx="${cx - w * 0.45}" cy="${botY - 8}" rx="${w * 0.18}" ry="3"
                 fill="rgba(255,255,255,0.25)"/>
      </svg>
    `;
  }

  // ===================================================================
  // ANIMATION
  // ===================================================================
  function animateAll() {
    // 1. Saver pot fills (rising upward)
    document.querySelectorAll('.pot-fill').forEach((el) => {
      const targetY = parseFloat(el.dataset.targetY);
      const targetH = parseFloat(el.dataset.targetH);
      el.setAttribute('y', targetY);
      el.setAttribute('height', targetH);
      el.style.transition = 'y 1.4s cubic-bezier(0.22, 1, 0.36, 1), height 1.4s cubic-bezier(0.22, 1, 0.36, 1)';
    });
    document.querySelectorAll('.pot-wave').forEach((el) => {
      const targetY = parseFloat(el.dataset.targetY);
      el.style.transform = `translateY(${targetY}px)`;
    });

    // 2. Save chips rise in
    document.querySelectorAll('.save-chip').forEach((el) => {
      el.classList.add('in');
    });
  }
})();
</script>
</body>
</html>
