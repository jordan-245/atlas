# IB Gateway — Headless IBKR Gateway via IBC (IB Controller)
# More reliable than IBeam. Uses socket-based TWS API (port 4001/4002).
#
# Usage:
#   cd /root/atlas/docker
#   docker compose -f docker-compose-ibgw.yml up -d
#
# Test: python3 -c "from ib_insync import IB; ib=IB(); ib.connect('127.0.0.1', 4002); print(ib.accountSummary())"
#
# Ports:
#   4001 — TWS API (live)
#   4002 — TWS API (paper)
#   5900 — VNC (optional, for debugging)

services:
  ibgateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: atlas-ibgateway
    restart: unless-stopped
    network_mode: host
    environment:
      TWS_USERID: ${IBEAM_ACCOUNT}
      TWS_PASSWORD: ${IBEAM_PASSWORD}
      TRADING_MODE: live
      TWS_ACCEPT_INCOMING: "yes"
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: "atlas"
      # If 2FA times out (you miss the notification), keep retrying
      TWOFA_TIMEOUT_ACTION: restart
      # Auto-restart on weekly IBKR maintenance (Sunday night)
      RELOGIN_AFTER_2FA_TIMEOUT: "yes"
      AUTO_RESTART_TIME: "11:58 PM"
      AUTO_LOGOFF_TIME: "OFF"
    volumes:
      - ibgw_data:/home/ibgateway/Jts
    ulimits:
      nofile:
        soft: 10240
        hard: 10240
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ibgw_data:
