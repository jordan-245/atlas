# IBeam — Headless IBKR Client Portal Gateway
# Handles authentication + session keepalive for Atlas IBKR broker.
#
# Usage:
#   cd /root/atlas/docker
#   docker compose -f docker-compose-ibeam.yml up -d
#
# Credentials:
#   Set IBEAM_ACCOUNT and IBEAM_PASSWORD in .env file or inline below.
#   Optionally set IBKR_ACCOUNT_ID in ~/.atlas-secrets.json for explicit account selection.
#
# Gateway endpoint: https://localhost:5000/v1/api/
# Test: curl -k https://localhost:5000/v1/api/tickle
#
# Ports:
#   5000 — Client Portal API (REST)

services:
  ibeam:
    image: voyz/ibeam:latest
    container_name: atlas-ibeam
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      IBEAM_ACCOUNT: ${IBEAM_ACCOUNT}
      IBEAM_PASSWORD: ${IBEAM_PASSWORD}
      # Gateway settings
      IBEAM_GATEWAY_BASE_URL: "https://localhost:5000"
      IBEAM_LOG_TO_FILE: "false"
      IBEAM_REQUEST_RETRIES: "30"
      IBEAM_REQUEST_TIMEOUT: "30"
      IBEAM_PAGE_LOAD_TIMEOUT: "120"
      IBEAM_OAUTH_TIMEOUT: "120"
      IBEAM_ERROR_SCREENSHOTS: "true"
      IBEAM_GATEWAY_STARTUP: "30"
      # CRITICAL: Do NOT kill gateway after reauthentication fails
      IBEAM_RESTART_FAILED_SESSIONS: "false"
      IBEAM_REAUTHENTICATE_WAIT: "30"
      IBEAM_MAX_STATUS_CHECK_RETRIES: "300"
      IBEAM_MAX_REAUTHENTICATE_RETRIES: "10"
    volumes:
      # Persist gateway state across restarts
      - ibeam_data:/srv/ibeam/outputs
      # Custom 2FA handler + code input file
      - ./inputs:/srv/inputs
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:5000/v1/api/tickle"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ibeam_data:
