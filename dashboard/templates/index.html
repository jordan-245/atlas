<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
:root {
  --bg: #0b0f14;
  --surface: #141920;
  --surface-2: #1a2028;
  --border: #252d38;
  --text: #d8dee8;
  --text-dim: #6c7a8d;
  --accent: #5b9cf5;
  --green: #42b883;
  --red: #e5534b;
  --yellow: #d4a017;
  --purple: #a78bfa;
  --orange: #e87f40;
  --cyan: #22d3ee;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 10px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.55; min-height: 100vh; }

.shell { max-width: 1200px; margin: 0 auto; padding: 20px 16px 48px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 0 2px; }
.header-left { display: flex; align-items: baseline; gap: 12px; }
.logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.logo span { background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.version { font-size: 11px; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--text-dim); }
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Top cards */
.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.card-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
.card-value { font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.5px; }
.card-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.up { color: var(--green); }
.down { color: var(--red); }
.flat { color: var(--text); }

/* Sections */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.section-head { padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.section-head:hover { background: var(--surface-2); }
.section-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.section-count { font-size: 11px; color: var(--text-dim); background: var(--surface-2); border: 1px solid var(--border); padding: 1px 8px; border-radius: 20px; font-weight: 500; }
.section-body { padding: 0 18px 16px; }
.section-body.collapsed { display: none; }
.chevron { font-size: 10px; color: var(--text-dim); transition: transform 0.2s; }
.chevron.down { transform: rotate(0deg); }
.chevron.right { transform: rotate(-90deg); }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; }
th:hover { color: var(--accent); }
td { padding: 9px 10px; border-bottom: 1px solid rgba(37,45,56,0.5); white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(91,156,245,0.03); }
.mono { font-family: var(--mono); font-size: 12px; }

/* Strategy badges */
.strat { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.strat-trend_following { background: rgba(91,156,245,0.12); color: var(--accent); }
.strat-mean_reversion { background: rgba(167,139,250,0.12); color: var(--purple); }
.strat-opening_gap { background: rgba(66,184,131,0.12); color: var(--green); }
.strat-momentum_breakout { background: rgba(232,127,64,0.12); color: var(--orange); }

/* P&L breakdown */
.pnl-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
.pnl-item { padding: 10px 14px; border-right: 1px solid var(--border); }
.pnl-item:last-child { border-right: none; }
.pnl-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.pnl-value { font-size: 16px; font-weight: 600; font-family: var(--mono); }
.pnl-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* Two-column layout */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.two-col > .section { margin-bottom: 0; }

/* Plan */
.plan-entry { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(37,45,56,0.4); font-size: 13px; }
.plan-entry:last-child { border-bottom: none; }
.plan-ticker { font-weight: 600; min-width: 72px; }
.plan-detail { color: var(--text-dim); font-size: 12px; }
.plan-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
.plan-badge.approved { background: rgba(66,184,131,0.12); color: var(--green); }
.plan-badge.pending { background: rgba(212,160,23,0.12); color: var(--yellow); }
.plan-badge.executed { background: rgba(91,156,245,0.12); color: var(--accent); }

/* Metrics grid */
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
.metric { padding: 10px 14px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.metric:nth-child(4n) { border-right: none; }
.metric:nth-last-child(-n+4) { border-bottom: none; }
.metric-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
.metric-value { font-size: 15px; font-weight: 600; font-family: var(--mono); }

/* Tasks */
.task-columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.task-col-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding-bottom: 8px; margin-bottom: 8px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 6px; }
.task-col-head .dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-upcoming { background: var(--yellow); }
.dot-active { background: var(--accent); }
.dot-done { background: var(--green); }
.task-item { padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; font-size: 12px; line-height: 1.5; background: var(--surface-2); border: 1px solid transparent; transition: border-color 0.15s; }
.task-item:hover { border-color: var(--border); }
.task-item.done { color: var(--text-dim); text-decoration: line-through; text-decoration-color: rgba(108,122,141,0.4); }
.task-empty { color: var(--text-dim); font-size: 12px; font-style: italic; padding: 8px 10px; }

.empty { text-align: center; padding: 24px; color: var(--text-dim); font-size: 13px; }

/* Plotly overrides */
.js-plotly-plot .plotly .modebar { top: 4px !important; right: 4px !important; }
.js-plotly-plot .plotly .modebar-btn { color: var(--text-dim) !important; }
.js-plotly-plot .plotly .modebar-btn:hover { color: var(--accent) !important; }

/* Responsive */
@media (max-width: 1000px) { .cards { grid-template-columns: repeat(2, 1fr); } .two-col { grid-template-columns: 1fr; } .metrics-grid { grid-template-columns: repeat(3, 1fr); } .metric:nth-child(3n) { border-right: none; } }
@media (max-width: 700px) { .cards { grid-template-columns: repeat(2, 1fr); } .task-columns { grid-template-columns: 1fr; } .pnl-grid { grid-template-columns: repeat(2, 1fr); } .pnl-item:nth-child(2) { border-right: none; } .pnl-item:nth-child(1), .pnl-item:nth-child(2) { border-bottom: 1px solid var(--border); } .metrics-grid { grid-template-columns: repeat(2, 1fr); } .metric:nth-child(2n) { border-right: none; } }
@media (max-width: 480px) { .cards { grid-template-columns: 1fr; } .card-value { font-size: 20px; } }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="header-left">
      <div class="logo"><span>Atlas</span></div>
      <span class="version" id="version"></span>
    </div>
    <div class="header-right">
      <span class="pulse"></span>
      <span class="updated" id="updated"></span>
    </div>
  </div>

  <!-- Top KPI Cards -->
  <div class="cards" id="cards"></div>

  <!-- P&L Breakdown -->
  <div class="section">
    <div class="section-head" onclick="toggle('pnl')">
      <div class="section-title">💰 P&L Breakdown</div>
      <span class="chevron down" id="chev-pnl">▾</span>
    </div>
    <div class="section-body" id="body-pnl"></div>
  </div>

  <!-- Equity Curve (Plotly) -->
  <div class="section" id="sec-equity">
    <div class="section-head" onclick="toggle('equity')">
      <div class="section-title">📈 Performance</div>
      <span class="chevron down" id="chev-equity">▾</span>
    </div>
    <div class="section-body" id="body-equity">
      <div id="equity-chart" style="width:100%;height:320px"></div>
    </div>
  </div>

  <!-- Two-col: Positions + Plan -->
  <div class="two-col">
    <div class="section">
      <div class="section-head" onclick="toggle('positions')">
        <div class="section-title">💼 Open Positions <span class="section-count" id="pos-count">0</span></div>
        <span class="chevron down" id="chev-positions">▾</span>
      </div>
      <div class="section-body" id="body-positions"></div>
    </div>

    <div class="section">
      <div class="section-head" onclick="toggle('plan')">
        <div class="section-title">📋 Today's Plan <span class="plan-badge" id="plan-status"></span></div>
        <span class="chevron down" id="chev-plan">▾</span>
      </div>
      <div class="section-body" id="body-plan"></div>
    </div>
  </div>

  <!-- Backtest Metrics -->
  <div class="section" id="sec-backtest">
    <div class="section-head" onclick="toggle('backtest')">
      <div class="section-title">🧪 Backtest Reference</div>
      <span class="chevron down" id="chev-backtest">▾</span>
    </div>
    <div class="section-body" id="body-backtest"></div>
  </div>

  <!-- Tasks -->
  <div class="section">
    <div class="section-head" onclick="toggle('tasks')">
      <div class="section-title">📌 Tasks</div>
      <span class="chevron down" id="chev-tasks">▾</span>
    </div>
    <div class="section-body" id="body-tasks"></div>
  </div>

  <!-- Closed Trades -->
  <div class="section" id="sec-closed" style="display:none">
    <div class="section-head" onclick="toggle('closed')">
      <div class="section-title">📒 Trade History <span class="section-count" id="closed-count">0</span></div>
      <span class="chevron down" id="chev-closed">▾</span>
    </div>
    <div class="section-body" id="body-closed"></div>
  </div>

</div>

<script>
// ── Helpers ──
function $(v) { return (v >= 0 ? '' : '-') + '$' + Math.abs(v).toLocaleString('en-AU', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function pct(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
function cls(v) { return v > 0.005 ? 'up' : v < -0.005 ? 'down' : 'flat'; }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function strat(s) { return s ? '<span class="strat strat-' + s + '">' + s.replace(/_/g,' ') + '</span>' : ''; }
function ago(ts) {
  try {
    var d = new Date(ts); var s = Math.floor((Date.now() - d) / 1000);
    if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago'; return Math.floor(s/86400) + 'd ago';
  } catch(e) { return ''; }
}

function toggle(id) {
  var body = document.getElementById('body-' + id);
  var chev = document.getElementById('chev-' + id);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    if (chev) { chev.classList.remove('right'); chev.classList.add('down'); }
  } else {
    body.classList.add('collapsed');
    if (chev) { chev.classList.remove('down'); chev.classList.add('right'); }
  }
}

// ── Sort ──
var sortState = {};
function sortTable(tableId, col, type) {
  var table = document.getElementById(tableId);
  if (!table) return;
  var tbody = table.querySelector('tbody');
  var rows = Array.from(tbody.querySelectorAll('tr'));
  var key = tableId + '-' + col;
  var asc = sortState[key] === 'asc' ? 'desc' : 'asc';
  sortState[key] = asc;
  rows.sort(function(a, b) {
    var av = a.cells[col].getAttribute('data-v') || a.cells[col].textContent;
    var bv = b.cells[col].getAttribute('data-v') || b.cells[col].textContent;
    if (type === 'num') { av = parseFloat(av) || 0; bv = parseFloat(bv) || 0; }
    if (av < bv) return asc === 'asc' ? -1 : 1;
    if (av > bv) return asc === 'asc' ? 1 : -1;
    return 0;
  });
  rows.forEach(function(r) { tbody.appendChild(r); });
}

// ── Plotly Equity Chart ──
function drawEquityChart(btCurve, liveCurve, startEq) {
  var el = document.getElementById('equity-chart');
  if (!btCurve.length && !liveCurve.length) {
    el.innerHTML = '<div class="empty">No equity data available yet</div>';
    el.style.height = 'auto';
    return;
  }

  var traces = [];

  // Backtest equity curve
  if (btCurve.length > 1) {
    var btDates = btCurve.map(function(p) { return p.date; });
    var btEq = btCurve.map(function(p) { return p.equity; });

    traces.push({
      x: btDates, y: btEq,
      type: 'scatter', mode: 'lines',
      name: 'Backtest',
      line: { color: 'rgba(91,156,245,0.7)', width: 1.5 },
      fill: 'tozeroy',
      fillcolor: 'rgba(91,156,245,0.05)',
      hovertemplate: '<b>%{x}</b><br>$%{y:,.2f}<extra>Backtest</extra>'
    });

    // Drawdown trace
    var peak = btEq[0];
    var dd = btEq.map(function(eq) {
      if (eq > peak) peak = eq;
      return ((eq - peak) / peak) * 100;
    });
    traces.push({
      x: btDates, y: dd,
      type: 'scatter', mode: 'lines',
      name: 'Drawdown',
      line: { color: 'rgba(229,83,75,0.6)', width: 1 },
      fill: 'tozeroy',
      fillcolor: 'rgba(229,83,75,0.1)',
      yaxis: 'y2',
      hovertemplate: '<b>%{x}</b><br>%{y:.2f}%<extra>Drawdown</extra>'
    });
  }

  // Live paper trading curve
  if (liveCurve.length > 0) {
    var liveDates = liveCurve.map(function(p) { return p.date; });
    var liveEq = liveCurve.map(function(p) { return p.equity; });

    traces.push({
      x: liveDates, y: liveEq,
      type: 'scatter',
      mode: liveCurve.length === 1 ? 'markers' : 'lines+markers',
      name: 'Paper Trading',
      line: { color: '#42b883', width: 2.5 },
      marker: { color: '#42b883', size: liveCurve.length === 1 ? 10 : 4 },
      fill: liveCurve.length > 1 ? 'tozeroy' : 'none',
      fillcolor: 'rgba(66,184,131,0.08)',
      hovertemplate: '<b>%{x}</b><br>$%{y:,.2f}<extra>Paper</extra>'
    });
  }

  // Starting equity reference
  var allDates = [];
  if (btCurve.length) allDates = allDates.concat(btCurve.map(function(p){return p.date;}));
  if (liveCurve.length) allDates = allDates.concat(liveCurve.map(function(p){return p.date;}));
  if (allDates.length > 1) {
    traces.push({
      x: [allDates[0], allDates[allDates.length-1]],
      y: [startEq, startEq],
      type: 'scatter', mode: 'lines',
      name: 'Starting ($' + startEq.toLocaleString() + ')',
      line: { color: 'rgba(108,122,141,0.4)', width: 1, dash: 'dash' },
      hoverinfo: 'skip',
      showlegend: true
    });
  }

  var layout = {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    font: { family: '-apple-system, BlinkMacSystemFont, Inter, sans-serif', color: '#6c7a8d', size: 11 },
    margin: { t: 10, r: 50, b: 40, l: 60 },
    legend: {
      orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center',
      font: { size: 11, color: '#6c7a8d' },
      bgcolor: 'rgba(0,0,0,0)'
    },
    xaxis: {
      gridcolor: 'rgba(37,45,56,0.6)', gridwidth: 1,
      linecolor: 'rgba(37,45,56,0.8)',
      tickfont: { size: 10, family: 'SF Mono, JetBrains Mono, monospace' },
      rangeslider: { visible: false },
      rangeselector: {
        buttons: [
          { count: 1, label: '1M', step: 'month', stepmode: 'backward' },
          { count: 3, label: '3M', step: 'month', stepmode: 'backward' },
          { count: 6, label: '6M', step: 'month', stepmode: 'backward' },
          { count: 1, label: '1Y', step: 'year', stepmode: 'backward' },
          { step: 'all', label: 'All' }
        ],
        bgcolor: '#1a2028', activecolor: '#252d38',
        bordercolor: '#252d38', borderwidth: 1,
        font: { size: 10, color: '#6c7a8d' }
      }
    },
    yaxis: {
      title: { text: 'Equity ($)', font: { size: 11 } },
      gridcolor: 'rgba(37,45,56,0.6)', gridwidth: 1,
      linecolor: 'rgba(37,45,56,0.8)',
      tickfont: { size: 10, family: 'SF Mono, JetBrains Mono, monospace' },
      tickprefix: '$', tickformat: ',.0f',
      side: 'left'
    },
    yaxis2: {
      title: { text: 'Drawdown (%)', font: { size: 11 } },
      overlaying: 'y', side: 'right',
      gridcolor: 'rgba(0,0,0,0)',
      tickfont: { size: 10, family: 'SF Mono, JetBrains Mono, monospace', color: 'rgba(229,83,75,0.5)' },
      ticksuffix: '%',
      showgrid: false,
      range: [-15, 0]
    },
    hovermode: 'x unified',
    hoverlabel: {
      bgcolor: '#1a2028', bordercolor: '#252d38',
      font: { family: 'SF Mono, JetBrains Mono, monospace', size: 12, color: '#d8dee8' }
    }
  };

  var config = {
    responsive: true,
    displaylogo: false,
    modeBarButtonsToRemove: ['select2d', 'lasso2d', 'autoScale2d'],
    toImageButtonOptions: { format: 'png', filename: 'atlas-equity', scale: 2 }
  };

  Plotly.newPlot(el, traces, layout, config);
}

// ── Render ──
function render(d) {
  var p = d.portfolio || {};
  var risk = d.risk || {};
  var bt = d.backtest || {};

  // Header
  document.getElementById('version').textContent = d.config_version || '';
  document.getElementById('updated').textContent = 'Updated ' + ago(d.timestamp);

  // Cards — 4 KPIs
  var todayPnl = (p.market_pnl || 0) + (p.realized_pnl || 0);
  var cards = [
    { label: 'Equity', value: $(p.equity || 0), c: cls(p.total_pnl), sub: pct(p.total_pnl_pct || 0) + ' from ' + $(p.starting_equity) },
    { label: 'Positions', value: (p.num_open || 0) + '<span style="font-size:14px;color:var(--text-dim)"> / ' + (risk.max_positions || 10) + '</span>', c: 'flat', sub: (risk.exposure_pct || 0).toFixed(0) + '% deployed' },
    { label: 'Net P&L', value: $(p.total_pnl || 0), c: cls(p.total_pnl), sub: risk.halted ? '⛔ HALTED' : 'Paper trading' },
    { label: 'Win Rate', value: (d.closed_trades || []).length > 0 ? p.win_rate.toFixed(0) + '%' : '—', c: 'flat', sub: (d.closed_trades || []).length + ' closed trades' },
  ];
  var ch = '';
  cards.forEach(function(c) {
    ch += '<div class="card"><div class="card-label">' + c.label + '</div>';
    ch += '<div class="card-value ' + c.c + '">' + c.value + '</div>';
    ch += '<div class="card-sub">' + c.sub + '</div></div>';
  });
  document.getElementById('cards').innerHTML = ch;

  // P&L Breakdown
  var pnlHtml = '<div class="pnl-grid">';
  pnlHtml += '<div class="pnl-item"><div class="pnl-label">Unrealized P&L</div><div class="pnl-value ' + cls(p.market_pnl) + '">' + $(p.market_pnl || 0) + '</div><div class="pnl-sub">Open positions</div></div>';
  pnlHtml += '<div class="pnl-item"><div class="pnl-label">Realized P&L</div><div class="pnl-value ' + cls(p.realized_pnl) + '">' + $(p.realized_pnl || 0) + '</div><div class="pnl-sub">' + (d.closed_trades || []).length + ' closed trades</div></div>';
  pnlHtml += '<div class="pnl-item"><div class="pnl-label">Total Fees</div><div class="pnl-value down">-' + $(p.total_commissions || 0) + '</div><div class="pnl-sub">' + (p.num_open || 0) + ' entries × $' + (p.commission_per_trade || 0).toFixed(2) + '</div></div>';
  var netPnl = (p.market_pnl || 0) + (p.realized_pnl || 0) - (p.total_commissions || 0);
  pnlHtml += '<div class="pnl-item"><div class="pnl-label">Net Total</div><div class="pnl-value ' + cls(netPnl) + '">' + $(netPnl) + '</div><div class="pnl-sub">' + pct((netPnl / (p.starting_equity || 5000)) * 100) + ' return</div></div>';
  pnlHtml += '</div>';

  // Strategy breakdown
  var strats = d.strategy_summary || [];
  if (strats.length > 0) {
    pnlHtml += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">';
    pnlHtml += '<div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">By Strategy</div>';
    pnlHtml += '<div style="display:flex;gap:16px;flex-wrap:wrap">';
    strats.forEach(function(s) {
      pnlHtml += '<div style="display:flex;align-items:center;gap:8px">';
      pnlHtml += strat(s.strategy);
      pnlHtml += '<span class="mono" style="font-size:12px">' + s.positions + ' pos</span>';
      pnlHtml += '<span class="mono ' + cls(s.unrealized_pnl) + '" style="font-size:12px">' + $(s.unrealized_pnl) + '</span>';
      pnlHtml += '</div>';
    });
    pnlHtml += '</div></div>';
  }
  document.getElementById('body-pnl').innerHTML = pnlHtml;

  // Equity chart (Plotly)
  var btCurve = bt.equity_curve || [];
  var liveCurve = d.equity_curve || [];
  drawEquityChart(btCurve, liveCurve, p.starting_equity || 5000);

  // Positions table
  var pos = p.open_positions || [];
  document.getElementById('pos-count').textContent = pos.length;
  if (pos.length === 0) {
    document.getElementById('body-positions').innerHTML = '<div class="empty">No open positions</div>';
  } else {
    var h = '<table id="tbl-pos"><thead><tr>';
    h += '<th onclick="sortTable(\'tbl-pos\',0,\'str\')">Ticker</th>';
    h += '<th onclick="sortTable(\'tbl-pos\',1,\'str\')">Strategy</th>';
    h += '<th onclick="sortTable(\'tbl-pos\',2,\'num\')">Entry</th>';
    h += '<th onclick="sortTable(\'tbl-pos\',3,\'num\')">Current</th>';
    h += '<th onclick="sortTable(\'tbl-pos\',4,\'num\')">P&L</th>';
    h += '<th onclick="sortTable(\'tbl-pos\',5,\'num\')">P&L %</th>';
    h += '<th onclick="sortTable(\'tbl-pos\',6,\'num\')">Stop</th>';
    h += '<th onclick="sortTable(\'tbl-pos\',7,\'num\')">Days</th>';
    h += '</tr></thead><tbody>';
    pos.sort(function(a,b) { return Math.abs(b.pnl) - Math.abs(a.pnl); });
    pos.forEach(function(p) {
      var c = cls(p.pnl);
      h += '<tr>';
      h += '<td style="font-weight:600" data-v="' + esc(p.ticker) + '">' + esc(p.ticker) + '</td>';
      h += '<td>' + strat(p.strategy) + '</td>';
      h += '<td class="mono" data-v="' + p.entry_price + '">' + $(p.entry_price) + '</td>';
      h += '<td class="mono" data-v="' + p.current_price + '">' + $(p.current_price) + '</td>';
      h += '<td class="mono ' + c + '" data-v="' + p.pnl + '">' + $(p.pnl) + '</td>';
      h += '<td class="mono ' + c + '" data-v="' + p.pnl_pct + '">' + pct(p.pnl_pct) + '</td>';
      h += '<td class="mono" data-v="' + p.stop_price + '">' + $(p.stop_price) + '</td>';
      h += '<td data-v="' + p.days_held + '">' + p.days_held + 'd</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
    document.getElementById('body-positions').innerHTML = h;
  }

  // Plan
  var plan = d.plan;
  var planEl = document.getElementById('body-plan');
  var statusEl = document.getElementById('plan-status');
  if (!plan) {
    statusEl.textContent = '';
    planEl.innerHTML = '<div class="empty">No plan for today</div>';
  } else {
    var st = plan.status || 'UNKNOWN';
    statusEl.textContent = st.replace(/_/g, ' ');
    statusEl.className = 'plan-badge ' + (st.includes('APPROVED') ? 'approved' : st.includes('EXECUTED') ? 'executed' : 'pending');

    var ph = '';
    var entries = plan.entries || [];
    var exits = plan.exits || [];

    if (entries.length) {
      ph += '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Entries (' + entries.length + ')</div>';
      entries.forEach(function(e) {
        ph += '<div class="plan-entry">';
        ph += '<span class="plan-ticker">' + esc(e.ticker) + '</span>';
        ph += strat(e.strategy);
        ph += '<span class="plan-detail">@ <b>' + $(e.entry_price) + '</b> → stop ' + $(e.stop_price) + '</span>';
        if (e.confidence) ph += '<span class="plan-detail">' + (e.confidence * 100).toFixed(0) + '% conf</span>';
        ph += '</div>';
      });
      ph += '</div>';
    }

    if (exits.length) {
      ph += '<div><div style="font-size:11px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Exits (' + exits.length + ')</div>';
      exits.forEach(function(e) {
        ph += '<div class="plan-entry">';
        ph += '<span class="plan-ticker">' + esc(e.ticker) + '</span>';
        ph += '<span class="plan-detail">' + esc(e.reason || e.exit_reason || '') + '</span>';
        ph += '</div>';
      });
      ph += '</div>';
    }

    if (!entries.length && !exits.length) {
      ph = '<div class="empty">No entries or exits planned — holding ' + (p.num_open || 0) + ' positions</div>';
    }
    planEl.innerHTML = ph;
  }

  // Backtest metrics — use full WFO metrics (matches equity curve), not phase5 OOS report
  var btMetrics = bt.metrics || {};
  var hasBt = Object.keys(btMetrics).length > 0;
  document.getElementById('sec-backtest').style.display = hasBt ? '' : 'none';
  if (hasBt) {
    var m = btMetrics;
    var bh = '<div style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Walk-forward backtest · ' + (bt.equity_curve || []).length + ' trading days · ' + (m.total_trades || '—') + ' trades</div>';
    bh += '<div class="metrics-grid">';
    bh += metric('CAGR', m.cagr ? (m.cagr * 100).toFixed(1) + '%' : '—');
    bh += metric('Max Drawdown', m.max_drawdown ? (m.max_drawdown * 100).toFixed(2) + '%' : '—');
    bh += metric('Sharpe', m.sharpe ? m.sharpe.toFixed(2) : '—');
    bh += metric('Win Rate', m.win_rate ? (m.win_rate * 100).toFixed(1) + '%' : '—');
    bh += metric('Profit Factor', m.profit_factor ? m.profit_factor.toFixed(2) : '—');
    bh += metric('Total Trades', m.total_trades || '—');
    bh += metric('Net P&L', m.total_pnl ? '$' + m.total_pnl.toFixed(0) : '—');
    bh += metric('Return/DD', m.total_return && m.max_drawdown ? (m.total_return / m.max_drawdown).toFixed(1) + 'x' : '—');
    bh += '</div>';

    // Extra metrics row
    if (m.avg_trade || m.avg_hold_days) {
      bh += '<div class="metrics-grid" style="border-top:1px solid var(--border)">';
      bh += metric('Avg Trade', m.avg_trade ? '$' + m.avg_trade.toFixed(2) : '—');
      bh += metric('Avg Hold', m.avg_hold_days ? m.avg_hold_days.toFixed(1) + 'd' : '—');
      bh += metric('Avg Winner', m.avg_winner ? '$' + m.avg_winner.toFixed(2) : '—');
      bh += metric('Avg Loser', m.avg_loser ? '$' + m.avg_loser.toFixed(2) : '—');
      bh += '</div>';
    }

    document.getElementById('body-backtest').innerHTML = bh;
  }

  // Tasks
  var tasks = d.tasks || {};
  var upcoming = tasks.upcoming || [];
  var active = tasks.in_progress || [];
  var done = tasks.done || [];
  var th2 = '<div class="task-columns">';
  th2 += '<div>';
  th2 += '<div class="task-col-head"><span class="dot dot-upcoming"></span> Upcoming (' + upcoming.length + ')</div>';
  if (upcoming.length) { upcoming.forEach(function(t) { th2 += '<div class="task-item">' + esc(t) + '</div>'; }); }
  else { th2 += '<div class="task-empty">Nothing planned</div>'; }
  th2 += '</div>';
  th2 += '<div>';
  th2 += '<div class="task-col-head"><span class="dot dot-active"></span> In Progress (' + active.length + ')</div>';
  if (active.length) { active.forEach(function(t) { th2 += '<div class="task-item">' + esc(t) + '</div>'; }); }
  else { th2 += '<div class="task-empty">Nothing in flight</div>'; }
  th2 += '</div>';
  th2 += '<div>';
  th2 += '<div class="task-col-head"><span class="dot dot-done"></span> Done (' + done.length + ')</div>';
  if (done.length) { done.forEach(function(t) { th2 += '<div class="task-item done">' + esc(t) + '</div>'; }); }
  else { th2 += '<div class="task-empty">Nothing completed yet</div>'; }
  th2 += '</div></div>';
  document.getElementById('body-tasks').innerHTML = th2;

  // Closed trades
  var closed = d.closed_trades || [];
  if (closed.length) {
    document.getElementById('sec-closed').style.display = '';
    document.getElementById('closed-count').textContent = closed.length;
    var ch2 = '<table id="tbl-closed"><thead><tr>';
    ch2 += '<th onclick="sortTable(\'tbl-closed\',0,\'str\')">Ticker</th>';
    ch2 += '<th>Strategy</th>';
    ch2 += '<th onclick="sortTable(\'tbl-closed\',2,\'str\')">Entry Date</th>';
    ch2 += '<th onclick="sortTable(\'tbl-closed\',3,\'num\')">Entry</th>';
    ch2 += '<th onclick="sortTable(\'tbl-closed\',4,\'num\')">Exit</th>';
    ch2 += '<th onclick="sortTable(\'tbl-closed\',5,\'num\')">P&L</th>';
    ch2 += '<th onclick="sortTable(\'tbl-closed\',6,\'num\')">Days</th>';
    ch2 += '<th>Reason</th>';
    ch2 += '</tr></thead><tbody>';
    closed.forEach(function(t) {
      var c = cls(t.pnl || t.realized_pnl || 0);
      ch2 += '<tr>';
      ch2 += '<td style="font-weight:600">' + esc(t.ticker) + '</td>';
      ch2 += '<td>' + strat(t.strategy) + '</td>';
      ch2 += '<td class="mono">' + esc(t.entry_date || '') + '</td>';
      ch2 += '<td class="mono" data-v="' + (t.entry_price||0) + '">' + $(t.entry_price) + '</td>';
      ch2 += '<td class="mono" data-v="' + (t.exit_price||0) + '">' + $(t.exit_price) + '</td>';
      ch2 += '<td class="mono ' + c + '" data-v="' + (t.pnl||t.realized_pnl||0) + '">' + $(t.pnl || t.realized_pnl || 0) + '</td>';
      ch2 += '<td data-v="' + (t.days_held||0) + '">' + (t.days_held || '-') + '</td>';
      ch2 += '<td style="color:var(--text-dim)">' + esc(t.exit_reason || t.reason || '') + '</td>';
      ch2 += '</tr>';
    });
    ch2 += '</tbody></table>';
    document.getElementById('body-closed').innerHTML = ch2;
  }
}

function metric(label, value) {
  return '<div class="metric"><div class="metric-label">' + label + '</div><div class="metric-value">' + esc(String(value)) + '</div></div>';
}

// ── Load ──
function load() {
  fetch('data/dashboard-data.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(render)
    .catch(function(e) {
      console.error('Load failed:', e);
      document.getElementById('updated').textContent = 'Load failed — check data/dashboard-data.json';
    });
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
